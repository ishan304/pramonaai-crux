        </button>
        {err && <div style={{color:'#E07A5F',fontSize:10}}>{err}</div>}
      </div>
    )}

    {/* Sub-items — only after unlock; no further password ever */}
    {adminUnlocked && (<>
      {subs.map(s => (
        <div key={s.id}
             className={`nav-item ${page===s.id?'active':''}`}
             onClick={()=>setPage(s.id)}
             style={{paddingLeft:36,fontSize:12}}>
          <span style={{color:'var(--grey-2)',marginRight:6}}>›</span>
          <span>{s.label}</span>
        </div>
      ))}
      <div onClick={onAdminLock}
           style={{paddingLeft:36,fontSize:11,color:'var(--grey-2)',cursor:'pointer',padding:'6px 0 6px 36px'}}>
        <span style={{marginRight:6}}>🔒</span>
        <span>Lock admin</span>
      </div>
    </>)}
  </>);
}

    { id: "dashboard",    label: "Dashboard",                  icon: <Icon.Dashboard />, badge: null },
    { id: "vault",        label: "Evidence Vault",             icon: <Icon.Vault />,     badge: docCount > 0 ? String(docCount) : null },
    { id: "compare",      label: "Potential Conflicts",        icon: <Icon.Compare />,   badge: null },
    { id: "feasibility",  label: "Analyze Contract Feasibility", icon: <Icon.Feasibility />, badge: null },
    { id: "chat",         label: "Document Chat",              icon: <Icon.Chat />,      badge: null },
  ];
  const supportSubs = [
    { id: "support-letter", label: "Letter Reply" },

            {n.badge && <span className={`nav-badge ${n.id==='vault'?'warn':''}`}>{n.badge}</span>}
          </div>

        </div>
        {supOpen && supportSubs.map(s => (
          <div key={s.id}
               className={`nav-item ${page===s.id?'active':''}`}
               onClick={()=>setPage(s.id)}
               style={{paddingLeft:36,fontSize:12}}>
            <span style={{color:'var(--grey-2)',marginRight:6}}>›</span>
            <span>{s.label}</span>
          </div>
        ))}
      </div>
      <div className="sidebar-divider"/>
      <div>
        <div className="sidebar-label">System</div>

        {/* ── Admin (single entry above Settings; visible only to admin users) ── */}
        {isAdmin && <AdminNav page={page} setPage={setPage}
                              adminUnlocked={adminUnlocked}
                              onAdminUnlock={onAdminUnlock}
                              onAdminLock={onAdminLock} />}

        <div className={`nav-item ${page==='settings'?'active':''}`} onClick={()=>setPage('settings')}>
          <span className="nav-icon"><Icon.Settings /></span>
          <span>Settings</span>
        </div>
      </div>
      <div style={{marginTop:'auto',padding:'16px 12px'}}>
        <div style={{fontSize:9,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--grey-2)',marginBottom:6}}>Version</div>
        <div style={{fontSize:11,color:'var(--grey-1)',fontWeight:600}}>CRUX v1.0.0-alpha</div>
        <div style={{fontSize:10,color:'var(--grey-2)',marginTop:2}}>Pramona AI · 2026</div>
      </div>
    </div>
  );
}

/* ── THE CRUX BLOCK ── */
function CruxBlock({ crux }) {
  const tagClass = {
    critical: "tag-danger", high: "tag-warn", warn: "tag-warn",
    medium: "tag-steel", clear: "tag-ok", "fully-compliant": "tag-ok",
    "revision-mismatch": "tag-danger", "signature-absent": "tag-danger",
    "missing-signature": "tag-warn", "ifc-issue": "tag-warn",
    "coordinate-ambiguity": "tag-steel",
  };
  return (
    <div className="crux-block pop-crux">
      <div className="crux-header">
        <div className="crux-icon"><Icon.Crux /></div>
        <div>
          <div className="crux-label">The Crux</div>
          <div className="crux-sublabel">Primary Forensic Finding — Review Immediately</div>
        </div>
      </div>
      <div className="crux-body">
        <div className="crux-finding">{crux.finding}</div>
        <div className="crux-desc">{crux.desc}</div>
        <div className="crux-tags">
          {crux.tags.map(t => (
            <span key={t} className={`tag ${tagClass[t]||'tag-steel'}`}>{t.replace(/-/g,' ')}</span>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── DASHBOARD PAGE ── */
function DashboardPage({ docs, mockDocs, onSelectDoc }) {
  // Use real docs if available, fall back to mock for demo data
  const displayDocs = docs.length > 0 ? docs : mockDocs;
  const bars = [60,80,45,90,55,75,88,40,70,95,50,82];
  const colors = ["var(--steel)","var(--steel)","var(--steel)","var(--gold)","var(--steel)","var(--steel)","var(--gold)","var(--steel)","var(--steel)","var(--danger)","var(--steel)","var(--gold)"];

function PipelineQueueCard() {
  const [data,    setData]    = useState(null);
  const [logLines, setLogLines] = useState([]);
  const [showLog,  setShowLog]  = useState(false);
  const logRef = React.useRef(null);
  const logUserScrolled = React.useRef(false);
  const prevActive = React.useRef(false);

  // Auto-show log when processing starts
  const hasActive = data?.queue?.some(i => i.active);
  useEffect(() => {
    if (hasActive && !prevActive.current) setShowLog(true);
    prevActive.current = !!hasActive;
  }, [hasActive]);

  // Poll queue status every 3s
  useEffect(() => {
    let active = true;
    const poll = async () => {
      try {
        const r = await apiFetch('/pipeline/queue');
        if (!active) return;
        if (r.ok) setData(await r.json());
      } catch {}
    };
    poll();
    const id = setInterval(poll, 3000);
    return () => { active = false; clearInterval(id); };
  }, []);

  // Poll live log every 2s only when there's an active doc
  useEffect(() => {
    if (!hasActive) return;
    let active = true;
    const poll = async () => {
      try {
        const r = await apiFetch('/pipeline/nb-log?lines=120');
        if (!active) return;
        if (r.ok) {
          const d = await r.json();
          setLogLines(d.lines || []);
        }
      } catch {}
    };
    poll();
    const id = setInterval(poll, 2000);
    return () => { active = false; clearInterval(id); };
  }, [hasActive]);

  // Auto-scroll log to bottom — only if user hasn't scrolled up
  useEffect(() => {
    if (showLog && logRef.current && !logUserScrolled.current) {
      logRef.current.scrollTop = logRef.current.scrollHeight;
    }
  }, [logLines, showLog]);
  const onLogScroll = () => {
    const el = logRef.current;
    if (!el) return;
    logUserScrolled.current = el.scrollHeight - el.scrollTop - el.clientHeight > 40;
  };

  if (!data) return null;
  const { queue = [], completed = [] } = data;
  if (queue.length === 0 && completed.length === 0) return null;

  const active  = queue.find(i => i.active);
  const waiting = queue.filter(i => !i.active);

  const stageColor = (label) => {
    if (!label) return 'var(--grey-2)';
    if (label.includes('01')) return 'var(--sapphire)';
    if (label.includes('02')) return 'var(--topaz)';
    if (label.includes('03') || label.toLowerCase().includes('vision')) return 'var(--amethyst)';
    if (label.includes('04') || label.toLowerCase().includes('compact')) return 'var(--gold)';
    if (label.toLowerCase().includes('complete') || label.toLowerCase().includes('done')) return 'var(--success)';
    return 'var(--gold)';
  };

  // Colour-code log lines by content
  const logLineColor = (line) => {
    if (line.startsWith('=')) return 'var(--gold)';
    if (line.startsWith('[Stage')) return 'var(--gold)';
    if (/error|fail|exception/i.test(line)) return '#ff6b6b';
    if (/\[NbConvertApp\]/.test(line)) return 'var(--grey-2)';
    if (/OK|done|complete|success/i.test(line)) return 'var(--success)';
    if (/->|→/.test(line)) return 'var(--topaz)';
    if (/skip|warning/i.test(line)) return '#f4a261';
    return 'var(--grey-1)';
  };

  return (
    <div className="card" style={{marginBottom:20}}>
      <div className="card-header" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span className="card-title">Pipeline Queue</span>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          {hasActive && (
            <button onClick={() => setShowLog(v => !v)} style={{
              background:'none',border:'1px solid rgba(107,103,98,0.3)',borderRadius:4,
              color:'var(--grey-1)',fontSize:10,padding:'2px 8px',cursor:'pointer',
              fontFamily:'monospace',letterSpacing:'0.04em',
            }}>
              {showLog ? 'HIDE LOG' : 'LIVE LOG'}
            </button>
          )}
          <span style={{fontSize:10,color:'var(--grey-2)',fontFamily:'monospace'}}>
            {queue.length} processing · {completed.length} done · live
          </span>
        </div>
      </div>

      {/* ── Active doc ── */}
      {active && (
        <div style={{padding:'14px 20px', borderBottom:'1px solid rgba(107,103,98,0.18)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
            <div className="pipeline-active-dot"/>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:'var(--white)'}}>{active.name || active.doc_id}</div>
              <div style={{fontSize:10,color:'var(--grey-2)',marginTop:1}}>{active.project || ''}</div>
            </div>
            <span style={{
              fontSize:10,fontWeight:600,letterSpacing:'0.06em',
              color: stageColor(active.stage_label),
              padding:'2px 8px',borderRadius:3,background:'rgba(107,103,98,0.15)',
            }}>
              {active.stage_label || 'Starting…'}
            </span>
          </div>
          {active.stage_detail && (
            <div style={{fontSize:11,color:'var(--grey-1)',fontFamily:'monospace',marginBottom:6,paddingLeft:18}}>
              {active.stage_detail}
            </div>
          )}
          <div className="pipeline-bar-track">
            {active.stage_pct > 0
              ? <div style={{height:'100%',borderRadius:2,background:'var(--gold)',width:`${active.stage_pct}%`,transition:'width 1s ease'}}/>
              : <div className="pipeline-bar-fill" style={{width:'100%'}}/>
            }
          </div>
          {active.stage_pct > 0 && (
            <div style={{fontSize:9,color:'var(--grey-2)',marginTop:3,textAlign:'right',fontFamily:'monospace'}}>
              {active.stage_pct}%
            </div>
          )}

          {/* ── Live log terminal ── */}
          {showLog && (
            <div ref={logRef} onScroll={onLogScroll} style={{
              marginTop:12,
              background:'#0d0d0e',
              border:'1px solid rgba(107,103,98,0.2)',
              borderRadius:6,
              padding:'10px 12px',
              height:220,
              overflowY:'auto',
              fontFamily:'monospace',
              fontSize:11,
              lineHeight:1.55,
            }}>
              {logLines.length === 0
                ? <span style={{color:'var(--grey-2)'}}>Waiting for output…</span>
                : logLines.map((line, i) => (
                  <div key={i} style={{color: logLineColor(line), whiteSpace:'pre-wrap', wordBreak:'break-all'}}>
                    {line || '\u00a0'}
                  </div>
                ))
              }
            </div>
          )}
        </div>
      )}

      {/* ── Waiting docs ── */}
      {waiting.length > 0 && (
        <div style={{padding:'10px 20px', borderBottom: completed.length > 0 ? '1px solid rgba(107,103,98,0.18)' : 'none'}}>
          <div style={{fontSize:10,color:'var(--grey-2)',fontWeight:600,letterSpacing:'0.06em',marginBottom:8}}>
            QUEUED ({waiting.length})
          </div>
          {waiting.map(item => (
            <div key={item.doc_id} style={{display:'flex',alignItems:'center',gap:10,padding:'5px 0',borderBottom:'1px solid rgba(107,103,98,0.07)'}}>
              <span style={{width:18,height:18,borderRadius:'50%',background:'rgba(107,103,98,0.25)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'var(--steel-light)',flexShrink:0}}>
                {item.position}
              </span>
              <span style={{flex:1,fontSize:12,color:'var(--grey-1)'}}>{item.name || item.doc_id}</span>
              <span style={{fontSize:10,color:'var(--grey-2)'}}>{item.project || ''}</span>
              <span className="tag tag-steel" style={{fontSize:9}}>queued</span>
            </div>
          ))}
        </div>
      )}

      {/* ── Completed docs ── */}
      {completed.length > 0 && (
        <div style={{padding:'10px 20px'}}>
          <div style={{fontSize:10,color:'var(--grey-2)',fontWeight:600,letterSpacing:'0.06em',marginBottom:8}}>
            RECENTLY COMPLETED ({completed.length})
          </div>
          {completed.slice(0, 6).map(doc => (
            <div key={doc.doc_id} style={{display:'flex',alignItems:'center',gap:10,padding:'5px 0',borderBottom:'1px solid rgba(107,103,98,0.07)'}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:'var(--success)',flexShrink:0}}/>
              <span style={{flex:1,fontSize:12,color:'var(--white)'}}>{doc.name || doc.doc_id}</span>
              <span style={{fontSize:10,color:'var(--grey-2)',fontFamily:'monospace'}}>{doc.pages||0}p · {doc.figures||0}fig</span>
              <span className="tag tag-ok" style={{fontSize:9}}>extracted</span>
            </div>
          ))}
          {completed.length > 6 && (
            <div style={{fontSize:10,color:'var(--grey-2)',marginTop:6,textAlign:'center'}}>
              +{completed.length - 6} more completed
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function VaultPage({ docs, onRefresh, onView }) {
  const [projects, setProjects]   = useState([]);
  const [search, setSearch]       = useState("");
  const [sort, setSort]           = useState("recent");
  const [openProject, setOpenProject] = useState(null);
  const [selectedDoc, setSelectedDoc] = useState(null);
  const [creating, setCreating]   = useState(false);
  const [newName, setNewName]     = useState("");
  const [saving, setSaving]       = useState(false);
  const [structure, setStructure] = useState(null);
  const [structLoading, setStructLoading] = useState(false);
  const [structAnalysing, setStructAnalysing] = useState(false);
  const [structProgress, setStructProgress] = useState([]);
  const [structDrawingOpen, setStructDrawingOpen] = useState(null);
  const [visionRunning, setVisionRunning] = useState(false);
  const [visionProgress, setVisionProgress] = useState([]);
  // Upload state (inline in project drill-down)
  const [dragging, setDragging]   = useState(false);
  const [files, setFiles]         = useState([]);
  const [uploading, setUploading] = useState(false);
  const [uploadResults, setUploadResults] = useState([]);
  // Compact state (keyed by doc_id) — supports streaming progress
  const [compactingIds, setCompactingIds] = useState({});
  const [compactProgress, setCompactProgress] = useState({}); // doc_id → {pct, step}
  const [compactResults, setCompactResults] = useState({});
  const [compactErrors,  setCompactErrors]  = useState({});
  // Per-doc choice: Original / Compacted inside Vault (for total calculation)
  const [vaultCompacted, setVaultCompacted] = useState({}); // legacy bool (kept for back-compat)
  const [vaultSource, setVaultSource]       = useState({}); // doc_id → "raw" | "compacted"
  const vaultSrcFor = (d) => {
    const s = vaultSource[d.doc_id];
    const hasCompacted = d.compacted || d.gemini_trained;
    if (s === 'compacted' && hasCompacted) return 'compacted';
    if (s === 'raw')                       return 'raw';
    return hasCompacted ? 'compacted' : 'raw';
  };
  const vaultTokFor = (d, s) => s === 'compacted'
    ? (d.gemini_tokens || d.compacted_tokens || 0)
    : (d.token_count || 0);
  const runCompact = async (docId) => {
    setCompactingIds(p=>({...p,[docId]:true}));
    setCompactResults(p=>({...p,[docId]:null}));
    setCompactErrors(p=>({...p,[docId]:""}));
    setCompactProgress(p=>({...p,[docId]:{pct:0,step:'Starting…'}}));
    try {
      const r = await apiFetch(`/document/${encodeURIComponent(docId)}/compact/stream`, {method:'POST'});
      if (!r.ok) {
        const txt = await r.text();
        setCompactErrors(p=>({...p,[docId]:`HTTP ${r.status} — ${txt.slice(0,200)}`}));
        setCompactingIds(p=>({...p,[docId]:false}));
        return;
      }
      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";
      let finalEvt = null;
      while (true) {
        const {value, done} = await reader.read();
        if (done) break;
        buf += decoder.decode(value, {stream:true});
        const lines = buf.split("\n");
        buf = lines.pop();
        for (const line of lines) {
          const ln = line.trim();
          if (!ln) continue;
          try {
            const evt = JSON.parse(ln);
            if (evt.error) {
              setCompactErrors(p=>({...p,[docId]:evt.step||evt.error}));
            } else {
              setCompactProgress(p=>({...p,[docId]:{pct:evt.pct||0,step:evt.step||''}}));
              if (evt.done) finalEvt = evt;
            }
          } catch {}
        }
      }
      if (finalEvt) {
        setCompactResults(p=>({...p,[docId]:finalEvt}));
        await onRefresh();
      }
    } catch (err) {
      setCompactErrors(p=>({...p,[docId]:String(err)}));
    }
    setCompactingIds(p=>({...p,[docId]:false}));
  };

  const deleteDoc = async (docId, docName) => {
    let pw = sessionStorage.getItem('crux_admin_pw') || "";
    if (!pw) {
      pw = window.prompt(`Delete "${docName}" permanently?\n\nEnter admin password to confirm:`, "");
      if (!pw) return;
    } else {
      if (!window.confirm(`Delete "${docName}" permanently?\n\nThis removes the contract, extracted data, compacted copy, images, and uploaded PDF.`)) return;
    }
    try {
      const r = await apiFetch(`/document/${encodeURIComponent(docId)}`, {
        method: 'DELETE',
        headers: { "X-Admin-Password": pw },
      });
      if (r.status === 401) {
        sessionStorage.removeItem('crux_admin_pw');
        alert("Wrong admin password.");
        return;
      }
      const j = await r.json().catch(()=>({}));
      if (!r.ok) {
        alert(`Delete failed — ${j.detail || `HTTP ${r.status}`}`);
        return;
      }
      // Cache password for the session once successful
      sessionStorage.setItem('crux_admin_pw', pw);
      await onRefresh();
    } catch (e) {
      alert(`Delete failed — ${e}`);
    }
  };

  const deleteContract = async (contractName, docCount) => {
    let pw = sessionStorage.getItem('crux_admin_pw') || "";
    if (!pw) {
      pw = window.prompt(`Delete contract "${contractName}" and ALL ${docCount} document${docCount!==1?'s':''}?\n\nEnter admin password to confirm:`, "");
      if (!pw) return;
    } else {
      if (!window.confirm(`Delete contract "${contractName}" and ALL ${docCount} document${docCount!==1?'s':''}?\n\nThis removes every extracted file, compacted copy, image, uploaded PDF, and saved conflict report for this contract.\n\nThis cannot be undone.`)) return;
    }
    try {
      const r = await apiFetch(`/contract/${encodeURIComponent(contractName)}`, {
        method: 'DELETE',
        headers: { "X-Admin-Password": pw },
      });
      if (r.status === 401) {
        sessionStorage.removeItem('crux_admin_pw');
        alert("Wrong admin password.");
        return;
      }
      const j = await r.json().catch(()=>({}));
      if (!r.ok) {
        alert(`Delete failed — ${j.detail || `HTTP ${r.status}`}`);
        return;
      }
      sessionStorage.setItem('crux_admin_pw', pw);
      await onRefresh();
    } catch (e) {
      alert(`Delete contract failed — ${e}`);
    }
  };

  const addFiles = (incoming) => {
    const pdfs = Array.from(incoming).filter(f => f.name.toLowerCase().endsWith('.pdf'));
    setFiles(prev => {
      const existing = new Set(prev.map(f => f.name));
      return [...prev, ...pdfs.filter(f => !existing.has(f.name))];
    });
  };
  const removeFile = (name) => setFiles(prev => prev.filter(f => f.name !== name));
  const handleDrop = (e) => { e.preventDefault(); setDragging(false); addFiles(e.dataTransfer.files); };
  const handleUploadSubmit = async () => {
    if (!files.length || uploading || !openProject) return;
    setUploading(true); setUploadResults([]);
    const res = [];
    for (const file of files) {
      const form = new FormData();
      form.append('file', file);
      form.append('project_name', openProject);
      try {
        const r    = await apiFetch('/upload', { method: 'POST', body: form });
        const data = await r.json();
        if (!r.ok) {
          const detail = data.detail || `HTTP ${r.status}`;
          res.push({ name: file.name, status: 'error', message: r.status === 401 ? `Not logged in — sign out and log in again. (${detail})` : `Upload failed — ${detail}` });
        } else {
          res.push({ name: file.name, status: 'ok', message: `Queued — job ${data.job_id}. Pipeline running automatically.` });
        }
      } catch (e) {
        res.push({ name: file.name, status: 'error', message: `Upload failed — backend not reachable. Run start.bat.` });
      }
      setUploadResults([...res]);
    }
    setUploading(false); setFiles([]);
    if (res.some(r => r.status === "ok")) { onRefresh(); loadProjects(); }
  };

  const TAXONOMY_ORDER = ["GS","TS","DRC","CA","PC","BOQ","DWG","MS","APP","SCHED","RFI","SHOP","NCA"];
  const TAXONOMY_LABELS = {
    GS:"General Specification", TS:"Technical Specification", DRC:"Design Review Comment",
    CA:"Contract Agreement", PC:"Particular Conditions", BOQ:"Bills of Quantities",
    DWG:"Drawings Package", MS:"Method Statement",
    APP:"Appendix / Annexure", SCHED:"Programme / Schedule", RFI:"Request for Information",
    SHOP:"Shop Drawings", NCA:"Notice of Commencement",
  };

  const loadProjects = async () => {
    try {
      const r = await apiFetch("/projects");
      if (r.ok) { const d = await r.json(); setProjects(d.projects || []); }
    } catch {}
  };

  const loadStructure = async (projectName) => {
    setStructure(null); setStructLoading(true); setStructDrawingOpen(null);
    try {
      const r = await apiFetch(`/contracts/${encodeURIComponent(projectName)}/structure`);
      if (r.ok) { const d = await r.json(); setStructure(d); }
    } catch {}
    setStructLoading(false);
  };

  const runAutosense = async (projectName) => {
    setStructAnalysing(true); setStructProgress([]); setStructDrawingOpen(null);
    try {
      const r = await apiFetch(`/contracts/${encodeURIComponent(projectName)}/analyse-structure`, { method: 'POST' });
      if (!r.ok) { setStructProgress(['Error: ' + r.status]); setStructAnalysing(false); return; }
      const reader = r.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (line === '__DONE__') { break; }
          if (line.trim()) setStructProgress(prev => [...prev, line]);
        }
      }
    } catch (e) { setStructProgress(prev => [...prev, 'Error: ' + e.message]); }
    setStructAnalysing(false);
    // Reload saved structure after analysis
    await loadStructure(projectName);
  };

  const runVision = async () => {
    if (!openProject) return;
    setVisionRunning(true); setVisionProgress([`Starting Stage 03 for project: ${openProject}…`]);
    try {
      const r = await apiFetch('/panel/run/03', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ project_name: openProject }),
      });
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        setVisionProgress([`Error: ${err.detail || r.status}`]);
        setVisionRunning(false);
        return;
      }
      // Poll logs until stage finishes
      let lastCount = 0;
      const poll = setInterval(async () => {
        try {
          const ls = await apiFetch('/panel/status');
          const data = await ls.json();
          const stage = (data.stages || {})['03'] || {};
          // Fetch recent log lines
          const lr = await apiFetch('/panel/logs');
          const lines = await lr.json();
          const newLines = lines.slice(lastCount);
          lastCount = lines.length;
          if (newLines.length) setVisionProgress(prev => [...prev, ...newLines.filter(l => l.trim())]);
          if (stage.status !== 'running') {
            clearInterval(poll);
            setVisionRunning(false);
          }
        } catch {}
      }, 2000);
    } catch(e) { setVisionProgress(prev => [...prev, 'Error: ' + e.message]); setVisionRunning(false); }
  };

  useEffect(() => { loadProjects(); }, [docs]);
  useEffect(() => { if (openProject) loadStructure(openProject); }, [openProject]);

  const handleRefresh = () => { onRefresh(); loadProjects(); };

  const createProject = async () => {
    if (!newName.trim()) return;
    setSaving(true);
    try {
      await apiFetch("/projects", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: newName.trim() }),
      });
      setCreating(false); setNewName("");
      loadProjects();
    } catch {}
    setSaving(false);
  };

  const fmtDate = (iso) => iso ? iso.slice(0, 10) : "—";

  const statusTag = (doc) => {
    const s = doc.status;
    const last = doc.last_stage_done;
    if (s === "extracted" && last === "04") return <span className="tag tag-ok">Complete</span>;
    if (s === "extracted" && last === "03") return <span className="tag" style={{color:'#c9974a',borderColor:'#c9974a55'}}>Compact pending</span>;
    if (s === "extracted" && last === "02") return <span className="tag" style={{color:'#5b9bd5',borderColor:'#5b9bd544'}}>Vision pending</span>;
    if (s === "extracted") return <span className="tag tag-ok">Extracted</span>;
    if (s === "queued")    return <span className="tag tag-steel">Queued</span>;
    return <span className="tag tag-steel">{s}</span>;
  };

  // Build sorted + filtered project list
  const displayProjects = React.useMemo(() => {
    let list = [...projects];
    if (search) list = list.filter(p => p.name.toLowerCase().includes(search.toLowerCase()));
    if (sort === "recent") list.sort((a, b) => (b.last_added||b.created||"").localeCompare(a.last_added||a.created||""));
    if (sort === "name")   list.sort((a, b) => a.name.localeCompare(b.name));
    if (sort === "count")  list.sort((a, b) => b.doc_count - a.doc_count);
    return list;
  }, [projects, search, sort]);

  // ── Project detail (drill-down) ──
  if (openProject !== null) {
    const projDocs = docs.filter(d => (d.project_name || "") === openProject);
    const filteredDocs = projDocs.filter(d => d.name.toLowerCase().includes(search.toLowerCase()));
    return (
      <div className="full-layout">
        <div className="main" style={{flex:1}}>
          <div className="page-header">
            <div className="page-header-row">
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <button className="btn btn-ghost" onClick={()=>{ setOpenProject(null); setSelectedDoc(null); setSearch(""); }}>
                  ← Vault
                </button>
                <div>
                  <div className="page-title">{openProject}</div>
                  <div className="page-sub">
                    {projDocs.length} document{projDocs.length!==1?"s":""} · {projDocs.filter(d=>d.status==="extracted").length} extracted
                  </div>
                </div>
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <div className="search-wrap" style={{width:220}}>
                  <span className="search-icon"><Icon.Search /></span>
                  <input className="search-input" placeholder="Search documents…" value={search} onChange={e=>setSearch(e.target.value)}/>
                </div>
                <button className="btn btn-ghost" onClick={handleRefresh}>Refresh</button>
              </div>
            </div>
          </div>

          {projDocs.length === 0 ? (
            <div className="card" style={{textAlign:'center',padding:'56px 24px'}}>
              <div style={{fontSize:36,marginBottom:12}}>📂</div>
              <div style={{fontSize:14,fontWeight:600,color:'var(--white)',marginBottom:8}}>No documents yet</div>
              <div style={{fontSize:12,color:'var(--grey-1)'}}>
                Drop PDFs below to start processing.
              </div>
            </div>
          ) : (
            <div className="card">
              <div className="card-header">
                <span className="card-title">Documents ({filteredDocs.length})</span>
                <span className="tag tag-ok">{projDocs.filter(d=>d.status==="extracted").length} Ready</span>
              </div>
              <div style={{padding:0}}>
                <table className="evidence-table">
                  <thead>
                    <tr>
                      <th style={{width:32}}/><th>Document</th>
                      <th>Status</th><th>Pages</th><th>Figures</th>
                      <th>Tokens</th><th>Uploaded</th><th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {filteredDocs.map(d => (
                      <tr key={d.doc_id} className={selectedDoc?.doc_id===d.doc_id?'selected':''}
                          onClick={()=>setSelectedDoc(selectedDoc?.doc_id===d.doc_id ? null : d)}>
                        <td><div className={`severity-dot ${d.status==="extracted"?"sev-clear":"sev-medium"}`}/></td>
                        <td>
                          <div className="doc-name">
                            <Icon.File style={{width:13,height:13,flexShrink:0,color:'var(--steel-light)'}}/>
                            {d.name}
                            {d.duplicate_of && <span className="tag tag-steel" style={{marginLeft:6,fontSize:9}}>cached</span>}
                          </div>
                        </td>
                        <td>{statusTag(d)}</td>
                        <td>{d.pages||"—"}</td>
                        <td>{d.figures||"—"}</td>
                        <td style={{fontSize:11,fontFamily:'monospace',color:'var(--grey-1)'}}>
                          {(() => {
                            const n = vaultTokFor(d, vaultSrcFor(d));
                            return n ? (n/1e6).toFixed(2)+'M' : '—';
                          })()}
                        </td>
                        <td>{fmtDate(d.added)}</td>
                        <td style={{minWidth:220}}>
                          {d.status === "extracted" && (
                            <div style={{display:'flex',flexDirection:'column',gap:4}}>
                              <div style={{display:'flex',gap:4,flexWrap:'wrap',alignItems:'center'}}>
                                <button className="btn btn-ghost" style={{fontSize:10,padding:'3px 8px'}}
                                  onClick={e=>{ e.stopPropagation(); onView && onView({doc_id:d.doc_id,name:d.name,compacted:!!d.compacted,gemini_trained:!!d.gemini_trained}); }}>
                                  View
                                </button>
                                {!compactingIds[d.doc_id] && (
                                  <button className="btn btn-ghost"
                                    style={{fontSize:10,padding:'3px 8px'}}
                                    title={d.compacted ? "Re-run compactor with latest learned rules" : "Compact this document"}
                                    onClick={e=>{ e.stopPropagation(); runCompact(d.doc_id); }}>
                                    {d.compacted ? 'Re-compact' : 'Compact'}
                                  </button>
                                )}
                                {(() => { const curSrc = vaultSrcFor(d); const compTok = d.gemini_tokens || d.compacted_tokens; return [
                                  ['raw','Original',d.token_count,true],
                                  ['compacted','Compacted',compTok,!!(d.compacted||d.gemini_trained)],
                                ].map(([key,label,tok,enabled])=>{
                                  const active = curSrc === key;
                                  const disabled = !enabled;
                                  return (
                                    <button key={key} disabled={disabled}
                                      title={disabled ? 'Run Compact on this doc first' : ''}
                                      onClick={e=>{
                                        e.stopPropagation();
                                        if (disabled) return;
                                        setVaultSource(p=>({...p,[d.doc_id]: key}));
                                        setVaultCompacted(p=>({...p,[d.doc_id]: key==='compacted'}));
                                      }}
                                      style={{
                                        padding:'3px 8px',borderRadius:3,fontSize:9,
                                        cursor: disabled ? 'not-allowed' : 'pointer',
                                        background: active?'rgba(201,151,74,0.18)':'transparent',
                                        color: disabled ? 'rgba(107,103,98,0.5)' : (active?'var(--gold)':'var(--grey-2)'),
                                        border:`1px solid ${active?'rgba(201,151,74,0.45)':'rgba(107,103,98,0.3)'}`,
                                        fontWeight:600,letterSpacing:'0.04em',
                                        opacity: disabled ? 0.45 : 1,
                                      }}>
                                      {label} {tok ? `(${(tok/1e6).toFixed(2)}M)` : (enabled ? '' : '—')}
                                    </button>
                                  );
                                }); })()}
                              </div>
                              {compactingIds[d.doc_id] && (() => {
                                const pct = Math.round((compactProgress[d.doc_id]?.pct || 0) * 100);
                                return (
                                <div style={{width:'100%'}}>
                                  {/* Tractor clearing uneven road */}
                                  <div style={{
                                    position:'relative',height:16,
                                    background:'repeating-linear-gradient(90deg,rgba(107,103,98,0.35) 0 4px,rgba(107,103,98,0.15) 4px 10px,rgba(107,103,98,0.4) 10px 13px,rgba(107,103,98,0.18) 13px 22px)',
                                    borderRadius:2,overflow:'hidden',
                                    border:'1px solid rgba(107,103,98,0.4)',
                                  }}>
                                    {/* Cleared (golden) road behind the tractor */}
                                    <div style={{
                                      position:'absolute',left:0,top:0,bottom:0,
                                      width: `${pct}%`,
                                      background:'linear-gradient(90deg, rgba(201,151,74,0.85), rgba(201,151,74,0.55))',
                                      transition:'width 0.35s cubic-bezier(.4,0,.2,1)',
                                      boxShadow:'inset 0 -1px 0 rgba(0,0,0,0.3)',
                                    }}/>
                                    {/* Shimmer sweep on the cleared section */}
                                    <div style={{
                                      position:'absolute',left:0,top:0,bottom:0,
                                      width:`${pct}%`,overflow:'hidden',
                                    }}>
                                      <div style={{
                                        position:'absolute',top:0,bottom:0,width:40,
                                        background:'linear-gradient(90deg,transparent,rgba(255,220,140,0.45),transparent)',
                                        animation:'crux-tractor-shimmer 1.6s linear infinite',
                                      }}/>
                                    </div>
                                    {/* Tractor at the leading edge */}
                                    <div style={{
                                      position:'absolute',
                                      left:`calc(${pct}% - 10px)`,
                                      top:'50%',transform:'translateY(-50%)',
                                      fontSize:14,lineHeight:1,
                                      transition:'left 0.35s cubic-bezier(.4,0,.2,1)',
                                      textShadow:'0 0 4px rgba(0,0,0,0.6)',
                                      filter:'drop-shadow(0 0 2px rgba(201,151,74,0.6))',
                                    }}>
                                      🚜
                                    </div>
                                  </div>
                                  <div style={{fontSize:9,color:'var(--grey-2)',marginTop:3,display:'flex',justifyContent:'space-between'}}>
                                    <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:160}}>
                                      {compactProgress[d.doc_id]?.step || 'Starting…'}
                                    </span>
                                    <span style={{fontFamily:'monospace',color:'var(--gold)',fontWeight:600}}>
                                      {pct}%
                                    </span>
                                  </div>
                                </div>
                                );
                              })()}
                              {compactErrors[d.doc_id] && (
                                <span style={{fontSize:9,color:'var(--danger)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}
                                      title={compactErrors[d.doc_id]}>
                                  {compactErrors[d.doc_id]}
                                </span>
                              )}
                            </div>
                          )}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                {/* Total tokens (honours per-doc Original/Compacted/AI choice) */}
                {filteredDocs.some(d => d.token_count) && (() => {
                  const total = filteredDocs.reduce((s,d) => s + vaultTokFor(d, vaultSrcFor(d)), 0);
                  const totalFull = filteredDocs.reduce((s,d) => s + (d.token_count||0), 0);
                  const anyCompacted = filteredDocs.some(d => vaultSrcFor(d) !== 'raw');
                  const diff = totalFull - total;
                  return (
                    <div style={{padding:'10px 16px',borderTop:'1px solid rgba(107,103,98,0.18)',
                      display:'flex',justifyContent:'space-between',alignItems:'center',
                      background:'rgba(107,103,98,0.05)'}}>
                      <span style={{fontSize:11,color:'var(--grey-2)',letterSpacing:'0.04em'}}>
                        {filteredDocs.length} doc{filteredDocs.length!==1?'s':''}
                        {anyCompacted && <span style={{color:'var(--success)',marginLeft:8}}>· {diff>0?(diff/1e6).toFixed(2)+'M saved':'—'}</span>}
                      </span>
                      <span style={{fontSize:12,fontFamily:'monospace',color:'var(--gold)',fontWeight:700}}>
                        {(total/1e6).toFixed(2)}M tokens total
                      </span>
                    </div>
                  );
                })()}
              </div>
            </div>
          )}

          {/* ── Upload Zone ── */}
          <div className="card" style={{marginTop:16}}>
            <div className="card-header">
              <span className="card-title">Upload Documents</span>
              <span className="tag tag-steel" style={{fontFamily:"'Cinzel',serif",letterSpacing:'0.08em'}}>{openProject}</span>
            </div>
            <div className="card-body">
              <input type="file" id="vault-pdf-input" multiple accept=".pdf"
                style={{display:'none'}}
                onChange={e => { addFiles(e.target.files); e.target.value = ''; }}
              />
              <label htmlFor="vault-pdf-input" style={{display:'block',cursor:'pointer'}}>
              <div className="upload-zone"
                style={dragging?{borderColor:'var(--gold)',background:'rgba(201,151,74,0.05)',boxShadow:'0 0 20px rgba(201,151,74,0.2)'}:{}}
                onDragOver={e=>{e.preventDefault();setDragging(true)}}
                onDragLeave={()=>setDragging(false)}
                onDrop={handleDrop}>
                <div className="upload-icon">
                  <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" strokeWidth="1.5">
                    <rect x="6" y="10" width="36" height="30" rx="3"/>
                    <polyline points="17,24 24,17 31,24"/>
                    <line x1="24" y1="17" x2="24" y2="34"/>
                    <line x1="8" y1="8" x2="40" y2="8"/>
                  </svg>
                </div>
                <div className="upload-title">Drop PDFs here or click to browse</div>
                <div className="upload-sub">Multiple files supported — all go into <strong style={{color:'var(--gold)'}}>{openProject}</strong></div>
                <div className="upload-formats">
                  {["PDF","DWG (soon)","TIFF (soon)"].map(f=>(
                    <span key={f} className="tag tag-steel">{f}</span>
                  ))}
                </div>
              </div>
              </label>

              {files.length > 0 && (
                <div style={{marginTop:16}}>
                  <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--grey-2)',marginBottom:8}}>
                    {files.length} file{files.length>1?'s':''} selected
                  </div>
                  {files.map(f=>(
                    <div key={f.name} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',background:'var(--charcoal-3)',borderRadius:6,marginBottom:4}}>
                      <div>
                        <div style={{fontSize:13,color:'var(--white)'}}>{f.name}</div>
                        <div style={{fontSize:11,color:'var(--grey-2)'}}>{(f.size/1024/1024).toFixed(1)} MB · PDF</div>
                      </div>
                      <button onClick={e=>{e.stopPropagation();removeFile(f.name)}}
                        style={{background:'none',border:'none',color:'var(--grey-2)',cursor:'pointer',fontSize:18,lineHeight:1,padding:'0 4px'}}>×</button>
                    </div>
                  ))}
                </div>
              )}

              {uploadResults.length > 0 && (
                <div style={{marginTop:16}}>
                  {uploadResults.map(r=>(
                    <div key={r.name} style={{padding:'8px 12px',borderRadius:6,marginBottom:4,
                      background:r.status==='error'?'rgba(232,23,74,0.08)':'rgba(39,174,96,0.08)',
                      borderLeft:`2px solid ${r.status==='error'?'var(--danger)':'var(--success)'}`}}>
                      <div style={{fontSize:12,fontWeight:600,color:r.status==='error'?'var(--danger)':'var(--success)'}}>{r.name}</div>
                      <div style={{fontSize:11,color:'var(--grey-1)',marginTop:2}}>{r.message}</div>
                    </div>
                  ))}
                </div>
              )}

              <button className="btn btn-primary"
                style={{width:'100%',marginTop:16,padding:'12px 0',fontSize:13,letterSpacing:'0.1em',
                  opacity:(!files.length||uploading)?0.45:1,
                  cursor:(!files.length||uploading)?'not-allowed':'pointer'}}
                onClick={handleUploadSubmit} disabled={!files.length || uploading}>
                {uploading ? 'Uploading…' : `Upload ${files.length||''} File${files.length!==1?'s':''} to ${openProject}`}
              </button>
            </div>
          </div>

          {/* ── Document Structure Table ── */}
          {(() => {
            const sectionsByType = {};
            ((structure||{}).sections||[]).forEach(s => {
              if (!sectionsByType[s.type]) sectionsByType[s.type] = [];
              sectionsByType[s.type].push(s);
            });
            const extraTypes = Object.keys(sectionsByType).filter(t => !TAXONOMY_ORDER.includes(t));
            const allTypes   = [...TAXONOMY_ORDER, ...extraTypes];
            const analysedAt = (structure||{}).analysed_at;

            return (
              <div className="card" style={{marginTop:16}}>
                <div className="card-header" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span className="card-title">Document Structure</span>
                    {analysedAt && (
                      <span style={{fontSize:10,color:'var(--grey-2)'}}>
                        analysed {analysedAt.slice(0,10)}
                      </span>
                    )}
                  </div>
                  <button className="btn btn-ghost" style={{fontSize:10,padding:'4px 10px'}}
                    onClick={()=>runAutosense(openProject)} disabled={structAnalysing || structLoading}>
                    {structAnalysing ? 'Analysing…' : structure?.sections ? 'Refresh' : 'Analyse'}
                  </button>
                </div>

                {structAnalysing && (
                  <div style={{padding:'16px 20px',fontFamily:'monospace',fontSize:11,color:'var(--grey-1)',lineHeight:1.8}}>
                    {structProgress.length === 0
                      ? <span style={{color:'var(--grey-2)'}}>Starting…</span>
                      : structProgress.map((l,i) => (
                          <div key={i} style={{color: l.startsWith('✓') ? 'var(--success)' : l.startsWith('ERROR') ? 'var(--danger)' : 'var(--grey-1)'}}>
                            {l}
                          </div>
                        ))
                    }
                  </div>
                )}

                {!structAnalysing && !structure?.sections && (
                  <div style={{padding:'20px 24px'}}>
                    <div style={{fontSize:12,color:'var(--grey-1)'}}>
                      No structure analysis yet. Click <strong style={{color:'var(--gold)'}}>Analyse</strong> to classify document types automatically.
                    </div>
                  </div>
                )}

                {!structAnalysing && !structLoading && structure?.sections && (
                  <div style={{padding:0}}>
                    <table className="evidence-table">
                      <thead>
                        <tr>
                          <th style={{width:28}}/>
                          <th style={{width:70}}>Type</th>
                          <th>Document Part</th>
                          <th>Source PDF</th>
                          <th style={{width:110}}>Pages</th>
                        </tr>
                      </thead>
                      <tbody>
                        {allTypes.map(code => {
                          const matches = sectionsByType[code] || [];
                          const found   = matches.length > 0;
                          const label   = TAXONOMY_LABELS[code] || (matches[0]?.label || code);
                          const isDrawing = (code === 'DWG' || code === 'SHOP') && found;
                          const expanded  = structDrawingOpen === code;

                          if (!found) return (
                            <tr key={code} style={{opacity:0.45}}>
                              <td><span style={{fontSize:13,color:'var(--danger)'}}>✗</span></td>
                              <td><span style={{fontSize:10,fontWeight:700,color:'var(--grey-2)',letterSpacing:'0.08em'}}>{code}</span></td>
                              <td style={{color:'var(--grey-2)',fontSize:12}}>{label}</td>
                              <td style={{color:'var(--grey-2)',fontSize:11}}>—</td>
                              <td style={{color:'var(--grey-2)',fontSize:11}}>Not found</td>
                            </tr>
                          );

                          return (
                            <React.Fragment key={code}>
                              {matches.map((s, si) => (
                                <tr key={si}
                                  style={{cursor: isDrawing ? 'pointer' : 'default'}}
                                  onClick={isDrawing ? () => setStructDrawingOpen(expanded ? null : code) : undefined}
                                  title={s.summary || ''}>
                                  <td>
                                    {si === 0 && <span style={{fontSize:13,color:'var(--success)'}}>✓</span>}
                                  </td>
                                  <td>
                                    {si === 0 && <span style={{fontSize:10,fontWeight:700,color:'var(--gold)',letterSpacing:'0.08em'}}>{code}</span>}
                                  </td>
                                  <td style={{fontSize:12,fontWeight: si===0 ? 600 : 400, color: si===0 ? 'var(--white)' : 'var(--grey-1)'}}>
                                    {si === 0 ? label : <span style={{paddingLeft:12,fontSize:11}}>↳ {s.doc_name}</span>}
                                    {isDrawing && si === 0 && (

                                              <td style={{padding:'5px 12px',color:'var(--grey-1)',fontSize:11}}>{drw.summary}</td>

                                          {allDrawings.length > 15000 && (

                                              … and {allDrawings.length - 15000} more pages
                                            </td></tr>
                                          )}
                                        </tbody>
                                      </table>
                                    </td>
                                  </tr>
                                );
                              })()}
                            </React.Fragment>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            );
          })()}

          <PipelineQueueCard />
        </div>

        {selectedDoc && (
          <div className="detail-panel pop-card">
            <div className="detail-header">
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8}}>
                <div>

                    {[
                      {k:"Status",      v: selectedDoc.status},

              {selectedDoc.status === "extracted" && (

                  <button className="btn btn-primary" style={{width:'100%'}}
                    onClick={()=>onView && onView({doc_id:selectedDoc.doc_id, name:selectedDoc.name, compacted:!!selectedDoc.compacted, gemini_trained:!!selectedDoc.gemini_trained})}>

                  Pipeline is processing — check back shortly.

  // ── Contract cards grid ──
  return (

/* ── UPLOAD PAGE — project-first ── */
function UploadPage({ docs, onUploaded, initialProject }) {
  const [selectedProject, setSelectedProject] = useState(initialProject || null);
  const [newProjectName, setNewProjectName]   = useState("");
  const [creatingNew, setCreatingNew]         = useState(false);
  const [dragging, setDragging]   = useState(false);
  const [files, setFiles]         = useState([]);
  const [uploading, setUploading] = useState(false);
  const [results, setResults]     = useState([]);

  // Existing projects from docs
  const existingProjects = React.useMemo(() => {
    const names = new Set(docs.map(d => d.project_name).filter(Boolean));
    return Array.from(names).sort();
  }, [docs]);

  const addFiles = (incoming) => {
    const pdfs = Array.from(incoming).filter(f => f.name.toLowerCase().endsWith('.pdf'));
    setFiles(prev => {
      const existing = new Set(prev.map(f => f.name));
      return [...prev, ...pdfs.filter(f => !existing.has(f.name))];
    });
  };
  const removeFile = (name) => setFiles(prev => prev.filter(f => f.name !== name));
  const handleDrop = (e) => { e.preventDefault(); setDragging(false); addFiles(e.dataTransfer.files); };

  const handleSubmit = async () => {
    if (!files.length || uploading || !selectedProject) return;
    setUploading(true); setResults([]);
    const res = [];
    for (const file of files) {
      const form = new FormData();
      form.append('file', file);
      form.append('project_name', selectedProject);
      try {
        const r    = await apiFetch('/upload', { method: 'POST', body: form });
        const data = await r.json();
        if (!r.ok) {
          const detail = data.detail || `HTTP ${r.status}`;
          res.push({ name: file.name, status: 'error',
            message: r.status === 401
              ? `Not logged in — please sign out and log in again. (${detail})`
              : `Upload failed — ${detail}` });
        } else {
          res.push({ name: file.name, status: 'ok',
            message: `Queued — job ${data.job_id}. Pipeline running automatically.` });
        }
      } catch (e) {
        res.push({ name: file.name, status: 'error',
          message: `Upload failed — backend not reachable at ${API_BASE}. Run start.bat.` });
      }
      setResults([...res]);
    }
    setUploading(false); setFiles([]);
    if (res.some(r => r.status === "ok") && onUploaded) onUploaded();
  };

  // ── Step 1: Project selector ──
  if (!selectedProject) {
    return (
      <div className="main">
        <div className="page-header">
          <div className="page-title">New Audit</div>
          <div className="page-sub">Select a project to upload documents into, or create a new one</div>
        </div>

        <div style={{maxWidth:680}}>
          <div className="project-grid">
            {existingProjects.map((p, i) => (
              <div key={p} className={`project-card pop-card d${Math.min(i+1,5)}`}
                onClick={()=>setSelectedProject(p)}>
                <div className="project-card-name">{p}</div>
                <div className="project-card-meta">
                  {docs.filter(d=>d.project_name===p).length} document{docs.filter(d=>d.project_name===p).length!==1?"s":""}
                </div>
                <div className="project-card-badges">
                  <span className="tag tag-steel">Click to upload here</span>
                </div>
              </div>
            ))}
            <div className="project-card-new pop-card" onClick={()=>setCreatingNew(true)}>
              <span style={{fontSize:20}}>+</span>
              <span>New Project</span>
            </div>
          </div>

          {creatingNew && (
            <div className="card">
              <div className="card-header"><span className="card-title">Create New Project</span></div>
              <div className="card-body">
                <div style={{display:'flex',gap:10}}>
                  <input className="login-input" style={{flex:1}}
                    placeholder="Project name e.g. Metro Rail Phase 2"
                    value={newProjectName}
                    onChange={e=>setNewProjectName(e.target.value)}
                    onKeyDown={e=>{ if(e.key==="Enter" && newProjectName.trim()) setSelectedProject(newProjectName.trim()); }}
                    autoFocus
                  />
                  <button className="btn btn-primary"
                    disabled={!newProjectName.trim()}
                    onClick={()=>setSelectedProject(newProjectName.trim())}>
                    Create & Select
                  </button>
                  <button className="btn btn-ghost" onClick={()=>{ setCreatingNew(false); setNewProjectName(""); }}>
                    Cancel
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── Step 2: Upload zone for selected project ──
  return (
    <div className="main">
      <div className="page-header">
        <div className="page-header-row">
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <button className="btn btn-ghost" onClick={()=>{ setSelectedProject(null); setFiles([]); setResults([]); }}>
              ← Projects
            </button>
            <div>
              <div className="page-title">Upload to: {selectedProject}</div>
              <div className="page-sub">All uploaded PDFs will be added to this project</div>
            </div>
          </div>
        </div>
      </div>

      <div style={{maxWidth:640}}>
        <div className="card">
          <div className="card-header">
            <span className="card-title">Upload Documents</span>
            <span className="tag tag-steel" style={{fontFamily:"'Cinzel',serif",letterSpacing:'0.08em'}}>{selectedProject}</span>
          </div>
          <div className="card-body">
            <input type="file" id="pdf-file-input" multiple accept=".pdf"
              style={{display:'none'}}
              onChange={e => { addFiles(e.target.files); e.target.value = ''; }}
            />
            <label htmlFor="pdf-file-input" style={{display:'block',cursor:'pointer'}}>
            <div className="upload-zone"
              style={dragging?{borderColor:'var(--gold)',background:'rgba(201,151,74,0.05)',boxShadow:'0 0 20px rgba(201,151,74,0.2)'}:{}}
              onDragOver={e=>{e.preventDefault();setDragging(true)}}
              onDragLeave={()=>setDragging(false)}
              onDrop={handleDrop}>
              <div className="upload-icon">
                <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" strokeWidth="1.5">
                  <rect x="6" y="10" width="36" height="30" rx="3"/>
                  <polyline points="17,24 24,17 31,24"/>
                  <line x1="24" y1="17" x2="24" y2="34"/>
                  <line x1="8" y1="8" x2="40" y2="8"/>
                </svg>
              </div>
              <div className="upload-title">Drop PDFs here or click to browse</div>
              <div className="upload-sub">Multiple files supported — all go into <strong style={{color:'var(--gold)'}}>{selectedProject}</strong></div>
              <div className="upload-formats">
                {["PDF","DWG (soon)","TIFF (soon)"].map(f=>(
                  <span key={f} className="tag tag-steel">{f}</span>
                ))}
              </div>
            </div>
            </label>

            {files.length > 0 && (
              <div style={{marginTop:16}}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--grey-2)',marginBottom:8}}>
                  {files.length} file{files.length>1?'s':''} selected
                </div>
                {files.map(f=>(
                  <div key={f.name} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',background:'var(--charcoal-3)',borderRadius:6,marginBottom:4}}>
                    <div>
                      <div style={{fontSize:13,color:'var(--white)'}}>{f.name}</div>
                      <div style={{fontSize:11,color:'var(--grey-2)'}}>{(f.size/1024/1024).toFixed(1)} MB · PDF</div>
                    </div>
                    <button onClick={e=>{e.stopPropagation();removeFile(f.name)}}
                      style={{background:'none',border:'none',color:'var(--grey-2)',cursor:'pointer',fontSize:18,lineHeight:1,padding:'0 4px'}}>×</button>
                  </div>
                ))}
              </div>
            )}

            {results.length > 0 && (
              <div style={{marginTop:16}}>
                {results.map(r=>(
                  <div key={r.name} style={{padding:'8px 12px',borderRadius:6,marginBottom:4,
                    background:r.status==='error'?'rgba(232,23,74,0.08)':'rgba(39,174,96,0.08)',
                    borderLeft:`2px solid ${r.status==='error'?'var(--danger)':'var(--success)'}`}}>
                    <div style={{fontSize:12,fontWeight:600,color:r.status==='error'?'var(--danger)':'var(--success)'}}>{r.name}</div>
                    <div style={{fontSize:11,color:'var(--grey-1)',marginTop:2}}>{r.message}</div>
                  </div>
                ))}
              </div>
            )}

            {/* ── Per-PDF Pipeline Queue ── */}
            {(() => {
              const projDocs = docs.filter(d => (d.project_name||'') === selectedProject);
              if (!projDocs.length) return null;
              const stage2 = projDocs.filter(d => d.status !== 'extracted');
              const stage3 = projDocs.filter(d => d.status === 'extracted' && d.last_stage_done === '02');
              const stage4 = projDocs.filter(d => d.status === 'extracted' && d.last_stage_done === '03' && !d.compacted);
              const done   = projDocs.filter(d => d.status === 'extracted' && (d.last_stage_done === '04' || d.compacted));
              if (!stage2.length && !stage3.length && !stage4.length && !done.length) return null;
              const Row = ({doc, stageLabel, stageColor, dot}) => (
                <div style={{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderBottom:'1px solid rgba(107,103,98,0.1)'}}>
                  <div style={{width:7,height:7,borderRadius:'50%',background:dot,flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,color:'var(--white)',fontWeight:500}}>{doc.name}</div>
                    <div style={{fontSize:10,color:'var(--grey-2)'}}>{doc.pages||'—'} pages · {doc.figures||0} figures</div>
                  </div>
                  <span style={{fontSize:9,fontWeight:700,letterSpacing:'0.06em',padding:'2px 7px',borderRadius:3,
                    border:`1px solid ${stageColor}44`,color:stageColor,background:'rgba(0,0,0,0.2)',whiteSpace:'nowrap'}}>
                    {stageLabel}
                  </span>
                </div>
              );
              return (
                <div style={{marginTop:20}}>
                  <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--grey-2)',marginBottom:10}}>
                    Pipeline Queue — {selectedProject}
                  </div>
                  {stage2.map(d => <Row key={d.doc_id} doc={d} stageLabel="STAGE 2 — OCR" stageColor="#c9974a" dot="var(--gold)"/>)}
                  {stage3.map(d => <Row key={d.doc_id} doc={d} stageLabel="STAGE 3 — VISION" stageColor="#5b9bd5" dot="#5b9bd5"/>)}
                  {stage4.map(d => <Row key={d.doc_id} doc={d} stageLabel="STAGE 4 — COMPACT" stageColor="#c9974a" dot="var(--gold)"/>)}
                  {done.map(d =>  <Row key={d.doc_id} doc={d} stageLabel="COMPLETE" stageColor="#4caf82" dot="var(--success)"/>)}
                </div>
              );
            })()}

            <div style={{marginTop:24,display:'flex',gap:12}}>
              <button className="btn btn-primary"
                style={{flex:1,padding:'12px 0',fontSize:13,letterSpacing:'0.1em',
                  opacity:(!files.length||uploading)?0.45:1,
                  cursor:(!files.length||uploading)?'not-allowed':'pointer'}}
                onClick={handleSubmit} disabled={!files.length || uploading}>
                {uploading ? 'Uploading…' :
                  files.length > 0 ? `Begin Forensic Audit (${files.length} file${files.length>1?'s':''})` :
                  'Begin Forensic Audit'}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Time formatter: humanise seconds → "45s" / "1m 23s" / "1h 12m 5s" ──
//   Used everywhere a duration is shown. Negative or non-finite → "?".
function fmtDur(secs) {
  const n = Number(secs);
  if (!isFinite(n) || n < 0) return '?';
  const s = Math.round(n);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60), rs = s % 60;
  if (m < 60) return rs ? `${m}m ${rs}s` : `${m}m`;
  const h = Math.floor(m / 60), rm = m % 60;
  if (rm && rs) return `${h}h ${rm}m ${rs}s`;
  if (rm) return `${h}h ${rm}m`;
  if (rs) return `${h}h ${rs}s`;
  return `${h}h`;
}

// Rewrite any `[+NNs]` or `T+NNs` time tokens inside a log line to humanised form.
function humaniseLogTimes(line) {
  if (typeof line !== 'string') return line;
  return line
    .replace(/\[\+(\d+(?:\.\d+)?)s\]/g, (_, s) => '[+' + fmtDur(parseFloat(s)) + ']')
    .replace(/T\+(\d+(?:\.\d+)?)s/g,    (_, s) => 'T+' + fmtDur(parseFloat(s)))
    .replace(/in (\d+(?:\.\d+)?)s\b/g,  (_, s) => 'in ' + fmtDur(parseFloat(s)))
    .replace(/\((\d+(?:\.\d+)?)s\)/g,   (_, s) => '(' + fmtDur(parseFloat(s)) + ')')
    .replace(/est\. (\d+(?:\.\d+)?)s\b/g, (_, s) => 'est. ' + fmtDur(parseFloat(s)));
}

// ── Model catalog: shared by Conflicts panel + Chat panel selectors. ──
//   Adding a model = append entry. UI dropdown auto-renders categories.
// cost = rough $ per c4-scale audit (~1.1M total ctx).
//        pairwise: C(N,2) cross-pair calls (each one finds intra-A + intra-B + A×B
//          in a single call) + 1 judge call + 30-50 detail items. c4 (N=4) = 6 calls.
//        N=1 fallback: one self-pair call instead.
//        single-call: one pass at full ctx + per-item detail.
const MODEL_CATALOG = [
  { name: 'Pairwise — long-list audit, judge-merge, ₹-rank', models: [

/* ── CITATION PARSER — extract page refs from conflicts markdown ── */
function parseConflictCitations(text) {
  if (!text) return [];
  const items = [];
  const stripQuote = (q) => {
    if (!q) return '';
    return q.trim().replace(/^[\s"*]+|[\s"*]+$/g, '').trim();
  };
  const hasCit = (arr, label, pg) => arr.some(c => c.doc_label === label && c.page === pg);
  // Normalize source label to base doc type: "TS Div02000" → "TS", "GS" → "GS"
  const baseLabel = (src) => {
    const s = src.trim().toUpperCase();
    if (s.startsWith('TS')) return 'TS';
    if (s.startsWith('GS') || /VI-?1/i.test(s)) return 'GS';
    if (s.startsWith('DRC') || /VI-?2/i.test(s)) return 'DRC';
    if (/VI-?3/i.test(s)) return 'TS';
    return s;
  };

  // Parse "## N. Title" detail sections
  const sections = text.split(/(?=^## \d+\.)/m);
  for (const sec of sections) {
    const headMatch = sec.match(/^## (\d+)\.\s+(.*)/m);
    if (!headMatch) continue;
    const itemNum = parseInt(headMatch[1]);
    const title = headMatch[2].trim();
    const citations = [];

    // 1) Table rows — flexible Source column: "TS Div02000", "GS", "DRC", etc.
    //    | Source (anything) | clause | p. XX | quote |
    //    Skip header row (contains "Source" or "Document") and separator row (---)
    const tableRowRe = /^\|([^|]+)\|([^|]+)\|\s*p\.?\s*(\d+)[^|]*\|([^|]*)\|/gm;
    let rm;
    while ((rm = tableRowRe.exec(sec)) !== null) {
      const srcRaw = rm[1].trim();
      if (/^[-\s]+$/.test(srcRaw) || /Source|Document/i.test(srcRaw)) continue;
      const clause = rm[2].trim();
      const page = parseInt(rm[3]);
      const rawQuote = rm[4].trim();
      if (rawQuote === '\u2014' || rawQuote === '-' || /^[-\s]+$/.test(rawQuote)) continue;
      const label = baseLabel(srcRaw);
      citations.push({ doc_label: label, clause, page, quote: stripQuote(rawQuote), doc_id: null });
    }

    // 2) Legacy support: **Additional TS reference:** lines (from old format reports)
    const addlLines = sec.match(/\*\*Additional TS reference[s]?:\*\*\s*(.+)/g) || [];
    for (const addlLine of addlLines) {
      const fullLine = addlLine.replace(/\*\*Additional TS reference[s]?:\*\*\s*/, '');
      const simplePRe = /\(p\.?\s*(\d+)(?:\s*[\u2013\-]\s*\d+)?[^)]*\)/g;
      let sm;
      while ((sm = simplePRe.exec(fullLine)) !== null) {
        const page = parseInt(sm[1]);
        if (!hasCit(citations, 'TS', page)) {
          // Try to extract quote from *"..."* nearby
          const after = fullLine.slice(sm.index);
          const qm = after.match(/\*"([^"]{10,})"\*/);
          citations.push({ doc_label: 'TS', clause: '', page, quote: qm ? stripQuote(qm[1]) : '', doc_id: null });
        }
      }
    }

    if (citations.length > 0) items.push({ itemNum, title, citations });
  }

  // Also parse INDEX lines: [RISK] N. Title — TS Div02000 p.X / TS Div03000 p.Y
  const indexLines = text.match(/^\[(CRITICAL|HIGH|MEDIUM|LOW)\]\s+\[?\d+\]?\.\s+.+/gm) || [];
  for (const line of indexLines) {
    const m = line.match(/^\[(CRITICAL|HIGH|MEDIUM|LOW)\]\s+\[?(\d+)\]?\.\s+(.+)/);
    if (!m) continue;
    const itemNum = parseInt(m[2]);
    if (items.find(it => it.itemNum === itemNum)) continue;
    const rest = m[3];
    const title = rest.split(/\s+\u2014\s+/)[0].trim();
    const citations = [];
    // Match "TS Div02000 p.36", "TS p.36", "GS p.15", "DRC p.42"
    const refRe = /(GS|TS|DRC)(?:\s+Div\d+)?\s+p\.?\s*(\d+)/gi;
    let rm2;
    while ((rm2 = refRe.exec(rest)) !== null) {
      const label = rm2[1].toUpperCase();
      const page = parseInt(rm2[2]);
      if (!hasCit(citations, label, page)) {
        citations.push({ doc_label: label, clause: '', page, quote: '', doc_id: null });
      }
    }
    if (citations.length > 0) items.push({ itemNum, title, citations });
  }
  return items;
}

// Map doc labels (GS/TS/DRC) to actual doc_ids using the selected contract's docs
function resolveCitationDocIds(citationItems, contractDocs) {
  if (!contractDocs || !citationItems) return citationItems;
  // Build label→doc_id map from doc names + doc_ids
  const labelMap = {};
  for (const d of contractDocs) {
    const name = (d.name || d.doc_id || '').toUpperCase();
    const docId = d.doc_id;
    // Direct doc_id as key (e.g. VI-1_GS → doc_id)
    labelMap[docId] = docId;
    labelMap[docId.toUpperCase()] = docId;
    // Match GS/TS/DRC in name or doc_id
    if (name.includes('GS') || name.includes('GENERAL')) labelMap['GS'] = docId;
    if (name.includes('TS') || name.includes('TECHNICAL')) labelMap['TS'] = docId;
    if (name.includes('DRC') || name.includes('DESIGN REVIEW')) labelMap['DRC'] = docId;
    // Match VI-1, VI-2, VI-3 patterns
    const viMatch = name.match(/VI-?(\d)/i);
    if (viMatch) {
      const n = viMatch[1];
      if (n === '1') labelMap['GS'] = docId;
      else if (n === '2') labelMap['DRC'] = docId;
      else if (n === '3') labelMap['TS'] = docId;
    }
  }
  // Normalize a doc label to a base label (strip VI- prefix etc.)
  const normalize = (lbl) => {
    if (!lbl) return lbl;
    const up = lbl.toUpperCase().trim();
    if (labelMap[up]) return labelMap[up];
    // "VI-1_GS" → try "GS"
    const parts = up.replace(/[_\s-]+/g, ' ').split(' ');
    for (const p of parts) {
      if (labelMap[p]) return labelMap[p];
    }
    return labelMap[lbl] || null;
  };
  return citationItems.map(item => ({
    ...item,
    citations: item.citations.map(c => ({
      ...c,
      doc_id: c.doc_id || normalize(c.doc_label) || c.doc_label,
      doc_name: c.doc_label,
    }))
  }));
}

/* ── MARKDOWN RENDERER (lightweight, no library needed) ── */
function renderMd(text, opts = {}) {
  // opts: { citationItems, onCitationClick, onItemClick, selectedItemNum }
  if (!text) return null;
  const lines = text.split('\n');
  const out = [];
  let i = 0;
  const citMap = {};
  if (opts.citationItems) opts.citationItems.forEach(ci => { citMap[ci.itemNum] = ci; });
  // Inline formatting: bold, italic, inline-code
  const inlineFmt = (txt) => {
    const parts = txt.split(/(\*\*[^*]+\*\*|`[^`]+`)/g);
    return parts.map((p,pi) => {
      if (p.startsWith('**') && p.endsWith('**')) return <strong key={pi} style={{color:'var(--white)',fontWeight:700}}>{p.slice(2,-2)}</strong>;
      if (p.startsWith('`') && p.endsWith('`')) return <code key={pi} style={{background:'rgba(107,103,98,0.3)',padding:'1px 5px',borderRadius:3,fontFamily:'monospace',fontSize:11}}>{p.slice(1,-1)}</code>;
      return p;
    });
  };
  const RISK_COLORS = {
    CRITICAL: { gem:'#e8174a', bg:'rgba(232,23,74,0.07)',  border:'rgba(232,23,74,0.28)',  label:'#ff6b8a' },
    HIGH:     { gem:'#B87333', bg:'rgba(184,115,51,0.08)', border:'rgba(184,115,51,0.32)', label:'#C08040' },
    MEDIUM:   { gem:'#D4A24C', bg:'rgba(212,162,76,0.07)', border:'rgba(212,162,76,0.28)', label:'#D4A24C' },
    LOW:      { gem:'#4caf82', bg:'rgba(76,175,130,0.07)', border:'rgba(76,175,130,0.28)', label:'#4caf82' },
  };

  while (i < lines.length) {
    const line = lines[i];

    // Conflict index line: [CRITICAL] [1]. Title — GS p.X / TS p.Y / DRC p.Z
    const riskLine = line.match(/^\[(CRITICAL|HIGH|MEDIUM|LOW)\]\s+\[?(\d+)\]?\.\s+(.*)/);
    if (riskLine) {
      const [, risk, num, rest] = riskLine;
      const itemNum = parseInt(num);
      const c = RISK_COLORS[risk];
      const dashIdx = rest.lastIndexOf(' \u2014 ');
      const title = dashIdx >= 0 ? rest.slice(0, dashIdx).trim() : rest.trim();
      const refs  = dashIdx >= 0 ? rest.slice(dashIdx + 3).trim() : '';
      const citItem = citMap[itemNum];
      out.push(
        <div key={i} style={{display:'flex',alignItems:'center',gap:10,
          padding:'7px 12px',marginBottom:3,borderRadius:6,cursor:citItem?'pointer':'default',
          background:c.bg,border:`1px solid ${c.border}`}}
          onClick={()=>{
            if(citItem && opts.onItemClick) opts.onItemClick(itemNum, citItem.citations);
            // Scroll to detail section
            const el = document.getElementById(`conflict-item-${itemNum}`);
            if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
          }}>
          <div style={{width:8,height:8,borderRadius:'50%',background:c.gem,
            flexShrink:0,boxShadow:`0 0 6px ${c.gem}99`}}/>
          <span style={{fontSize:11,color:'var(--grey-2)',flexShrink:0,minWidth:22,
            fontVariantNumeric:'tabular-nums',textAlign:'right'}}>{num}.</span>
          <span style={{flex:1,fontSize:12,color:'var(--white)',fontWeight:500,lineHeight:1.45}}>{title}</span>
          {refs && <span style={{fontSize:10,color:'var(--grey-2)',flexShrink:0,
            whiteSpace:'nowrap',opacity:0.75}}>{refs}</span>}
          <span style={{fontSize:9,fontWeight:700,letterSpacing:'0.06em',flexShrink:0,
            padding:'2px 7px',borderRadius:3,border:`1px solid ${c.border}`,
            color:c.label,background:'rgba(0,0,0,0.2)',whiteSpace:'nowrap'}}>
            {risk}
          </span>
        </div>
      );
      i++; continue;
    }

    // Table block — collect consecutive | lines
    if (line.trim().startsWith('|')) {
      const tableLines = [];
      while (i < lines.length && lines[i].trim().startsWith('|')) {
        tableLines.push(lines[i]);
        i++;
      }
      const parseRow = l => l.split('|').slice(1,-1).map(c => c.trim());
      const header = parseRow(tableLines[0]);
      const rows = tableLines.slice(2).map(parseRow);
      out.push(
        <div key={i} style={{overflowX:'auto',marginBottom:12}}>
          <table style={{borderCollapse:'collapse',fontSize:12,width:'100%',minWidth:300}}>
            <thead>
              <tr>{header.map((h,j)=>(
                <th key={j} style={{padding:'6px 10px',background:'rgba(107,103,98,0.25)',
                  border:'1px solid rgba(107,103,98,0.3)',color:'var(--white)',
                  fontWeight:700,textAlign:'left',whiteSpace:'nowrap'}}>{inlineFmt(h)}</th>
              ))}</tr>
            </thead>
            <tbody>
              {rows.map((row,ri)=>(
                <tr key={ri} style={{background:ri%2===0?'transparent':'rgba(107,103,98,0.08)'}}>
                  {row.map((cell,ci)=>(
                    <td key={ci} style={{padding:'5px 10px',
                      border:'1px solid rgba(107,103,98,0.2)',color:'var(--grey-1)',
                      verticalAlign:'top'}}>{inlineFmt(cell)}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
      continue;
    }
    // Headings
    if (line.startsWith('### ')) { out.push(<div key={i} style={{fontWeight:700,fontSize:13,color:'var(--white)',marginTop:10,marginBottom:4}}>{inlineFmt(line.slice(4))}</div>); i++; continue; }
    if (line.startsWith('## '))  {
      const itemMatch = line.match(/^## (\d+)\.\s+(.*)/);
      const itemNum = itemMatch ? parseInt(itemMatch[1]) : null;
      const citItem = itemNum ? citMap[itemNum] : null;
      const isSelected = opts.selectedItemNum === itemNum;
      out.push(
        <div key={i} id={itemNum ? `conflict-item-${itemNum}` : undefined}
          style={{fontWeight:700,fontSize:15,color:'var(--white)',marginTop:24,marginBottom:8,
            borderBottom:'1px solid rgba(107,103,98,0.3)',paddingBottom:6,
            borderLeft:isSelected?'3px solid var(--copper)':'none',
            paddingLeft:isSelected?10:0,
            background:isSelected?'rgba(184,115,51,0.06)':'transparent',
            borderRadius:isSelected?'0 4px 4px 0':'0',
            cursor:citItem?'pointer':'default'}}
          onClick={()=>{ if(citItem && opts.onItemClick) opts.onItemClick(itemNum, citItem.citations); }}>
          {inlineFmt(line.slice(3))}
          {citItem && citItem.citations.length > 0 && (
            <div className="citations-row" style={{marginTop:6}}>
              {citItem.citations.map((cit, ci) => (
                <span key={ci} className="source-pill" onClick={(e) => {
                  e.stopPropagation();
                  if (opts.onCitationClick) opts.onCitationClick([cit]);
                }}>
                  {cit.doc_label || cit.doc_name} p.{cit.page}
                </span>
              ))}
            </div>
          )}
        </div>
      );
      i++; continue;
    }
    if (line.startsWith('# '))   { out.push(<div key={i} style={{fontWeight:700,fontSize:16,color:'var(--gold)',marginTop:20,marginBottom:10,letterSpacing:'0.02em'}}>{inlineFmt(line.slice(2))}</div>); i++; continue; }
    // HR
    if (/^---+$/.test(line.trim())) { out.push(<hr key={i} style={{border:'none',borderTop:'1px solid rgba(107,103,98,0.2)',margin:'10px 0'}}/>); i++; continue; }
    // Bullet
    if (line.match(/^[\s]*[-*] /)) { out.push(<div key={i} style={{paddingLeft:16,marginBottom:2,color:'var(--grey-1)',display:'flex',gap:6}}><span style={{flexShrink:0}}>•</span><span>{inlineFmt(line.replace(/^[\s]*[-*] /,''))}</span></div>); i++; continue; }
    // Numbered list
    if (line.match(/^[\s]*\d+\. /)) {
      const numMatch = line.match(/^[\s]*(\d+)\. /);
      const num = numMatch ? numMatch[1] : '';
      const rest = line.replace(/^[\s]*\d+\. /,'');
      out.push(<div key={i} style={{paddingLeft:16,marginBottom:2,color:'var(--grey-1)',display:'flex',gap:6}}><span style={{minWidth:20,flexShrink:0,color:'var(--grey-2)'}}>{num}.</span><span>{inlineFmt(rest)}</span></div>);
      i++; continue;
    }
    // Blank line → spacer
    if (line.trim() === '') { out.push(<div key={i} style={{height:6}}/>); i++; continue; }
    // Normal paragraph
    out.push(<div key={i} style={{marginBottom:4,color:'var(--grey-1)',lineHeight:1.7}}>{inlineFmt(line)}</div>);
    i++;
  }
  return out;
}

/* ── WORD EXPORT ── */
function markdownToWordHtml(text) {
  if (!text) return '';
  const lines = text.split('\n');
  let html = '';
  let inList = false;
  let inOList = false;
  let i = 0;

  // Inline formatting: bold, italic, inline-code
  const inlineFmt = s => s
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/(?<!\*)\*(?!\*)([^*]+)(?<!\*)\*(?!\*)/g, '<em>$1</em>');

  // Color headings by risk level
  const applyRiskColor = txt => {
    if (/CRITICAL/i.test(txt)) return `<span style="color:#CC0000">${txt}</span>`;
    if (/HIGH RISK/i.test(txt)) return `<span style="color:#CC6600">${txt}</span>`;
    if (/MEDIUM RISK/i.test(txt)) return `<span style="color:#997700">${txt}</span>`;
    return txt;
  };

  const closeOpenLists = () => {
    if (inList)  { html += '</ul>'; inList  = false; }
    if (inOList) { html += '</ol>'; inOList = false; }
  };

  while (i < lines.length) {
    const line = lines[i];

    // Table block
    if (line.trim().startsWith('|')) {
      closeOpenLists();
      const tableLines = [];
      while (i < lines.length && lines[i].trim().startsWith('|')) { tableLines.push(lines[i]); i++; }
      const parseRow = l => l.split('|').slice(1,-1).map(c => inlineFmt(c.trim()));
      const header = parseRow(tableLines[0]);
      const dataRows = tableLines.slice(2).map(parseRow);
      html += '<table><thead><tr>' + header.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
      dataRows.forEach((row, ri) => {
        html += `<tr class="${ri%2===0?'even':'odd'}">` + row.map(cell => `<td>${cell}</td>`).join('') + '</tr>';
      });
      html += '</tbody></table>';
      continue;
    }

    // Headings
    if (line.startsWith('### ')) { closeOpenLists(); html += `<h3>${applyRiskColor(inlineFmt(line.slice(4)))}</h3>`; i++; continue; }
    if (line.startsWith('## '))  { closeOpenLists(); html += `<h2>${applyRiskColor(inlineFmt(line.slice(3)))}</h2>`; i++; continue; }
    if (line.startsWith('# '))   { closeOpenLists(); html += `<h1>${applyRiskColor(inlineFmt(line.slice(2)))}</h1>`; i++; continue; }

    // HR
    if (/^---+$/.test(line.trim())) { closeOpenLists(); html += '<hr>'; i++; continue; }

    // Bullet list
    if (line.match(/^[\s]*[-*] /)) {
      if (inOList) { html += '</ol>'; inOList = false; }
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${inlineFmt(line.replace(/^[\s]*[-*] /,''))}</li>`;
      i++; continue;
    }

    // Numbered list
    if (line.match(/^[\s]*\d+\. /)) {
      if (inList) { html += '</ul>'; inList = false; }
      if (!inOList) { html += '<ol>'; inOList = true; }
      html += `<li>${inlineFmt(line.replace(/^[\s]*\d+\. /,''))}</li>`;
      i++; continue;
    }

    closeOpenLists();
    if (line.trim() === '') { html += '<p style="margin:4pt 0"></p>'; i++; continue; }
    html += `<p>${inlineFmt(line)}</p>`;
    i++;
  }
  closeOpenLists();
  return html;
}

async function copyTextRobust(text) {
  const s = String(text == null ? "" : text);
  try {
    if (navigator.clipboard && window.isSecureContext !== false) {
      await navigator.clipboard.writeText(s);
      return true;
    }
  } catch (_) {}
  try {
    const ta = document.createElement('textarea');
    ta.value = s;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed';
    ta.style.top = '0'; ta.style.left = '0';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select(); ta.setSelectionRange(0, ta.value.length);
    const ok = document.execCommand && document.execCommand('copy');
    document.body.removeChild(ta);
    return !!ok;
  } catch (_) { return false; }
}

async function exportChatToWord(messages, sessionName, mode, citationItems) {
  const all = messages.filter(m => m.content && m.content.trim());
  if (!all.length) return;

  // For 'last' mode: pick the last user+assistant pair
  let valid = all;
  if (mode === 'last') {
    const lastAsstIdx = [...all].map((m,i)=>({m,i})).filter(x=>x.m.role==='assistant').slice(-1)[0]?.i;
    if (lastAsstIdx !== undefined) {
      const lastUserIdx = [...all].slice(0, lastAsstIdx).map((m,i)=>({m,i})).filter(x=>x.m.role==='user').slice(-1)[0]?.i;
      valid = lastUserIdx !== undefined ? all.slice(lastUserIdx, lastAsstIdx+1) : [all[lastAsstIdx]];
    }
  }
  if (!valid.length) return;

  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Auto-generate title from first user question in the export slice
  const firstUserMsg = valid.find(m => m.role === 'user');
  const rawTitle = firstUserMsg
    ? firstUserMsg.content.split('\n')[0].replace(/[?!.]+$/, '').trim()
    : null;
  const autoTitle = rawTitle && rawTitle.length >= 6
    ? (rawTitle.length > 80 ? rawTitle.slice(0, 78) + '\u2026' : rawTitle)
    : (sessionName || 'Document Chat');

  const exportDate = new Date().toLocaleDateString('en-AU', {day:'2-digit',month:'long',year:'numeric'});
  const exportTime = new Date().toLocaleTimeString('en-AU', {hour:'2-digit',minute:'2-digit'});
  const qaCount = valid.filter(m => m.role === 'user').length;
  const safeTitle = esc(autoTitle);
  const safeSubtitle = esc(sessionName || '');

  // Cover page
  const coverPage = `<div style="page-break-after:always;padding:80pt 40pt 40pt;">
  <p style="font-size:9pt;color:#999;letter-spacing:0.12em;text-transform:uppercase;margin:0 0 24pt 0;">CRUX by Pramona AI</p>
  <p style="font-size:26pt;font-weight:bold;color:#7A4F0F;border-bottom:3pt solid #C9974A;padding-bottom:14pt;margin:0 0 16pt 0;line-height:1.25;">${safeTitle}</p>
  <p style="font-size:11pt;color:#555;margin:0 0 48pt 0;">Source: <strong>${safeSubtitle}</strong></p>
  <table style="border:none;border-collapse:collapse;width:auto;">
    <tr><td style="border:none;padding:5pt 16pt 5pt 0;color:#999;font-size:9pt;white-space:nowrap;">Exported</td><td style="border:none;padding:5pt 0;color:#333;font-size:9pt;">${exportDate} at ${exportTime}</td></tr>
    <tr><td style="border:none;padding:5pt 16pt 5pt 0;color:#999;font-size:9pt;white-space:nowrap;">Questions</td><td style="border:none;padding:5pt 0;color:#333;font-size:9pt;">${qaCount} Q&amp;A${qaCount!==1?'s':''}</td></tr>
    <tr><td style="border:none;padding:5pt 16pt 5pt 0;color:#999;font-size:9pt;white-space:nowrap;">Model</td><td style="border:none;padding:5pt 0;color:#333;font-size:9pt;">CRUX &mdash; Pramona AI</td></tr>
  </table>
</div>`;

  let body = '';
  let userBlockCount = 0;
  valid.forEach(msg => {
    if (msg.role === 'user') {
      const pgBreak = userBlockCount > 0 ? '<div style="page-break-before:always;margin:0;padding:0;"></div>' : '';
      userBlockCount++;
      body += `${pgBreak}<div class="user-block"><p class="role-label">You</p><p class="user-text">${esc(msg.content).replace(/\n/g,'<br>')}</p></div>`;
    } else {
      body += `<div class="asst-block"><p class="role-label">CRUX</p><div class="asst-content">${markdownToWordHtml(msg.content)}</div></div>`;
    }
  });

  // ── Build appendix with referenced page images ──
  let appendix = '';
  if (citationItems && citationItems.length > 0) {
    // Collect all unique (doc_id, page) pairs with their item numbers
    const pageRefs = [];
    const seen = new Set();
    for (const item of citationItems) {
      for (const cit of item.citations) {
        const key = `${cit.doc_id}_${cit.page}`;
        if (!seen.has(key)) {
          seen.add(key);
          pageRefs.push({ doc_id: cit.doc_id, page: cit.page, doc_label: cit.doc_label || cit.doc_name, items: [item.itemNum] });
        } else {
          const existing = pageRefs.find(p => `${p.doc_id}_${p.page}` === key);
          if (existing && !existing.items.includes(item.itemNum)) existing.items.push(item.itemNum);
        }
      }
    }
    // Fetch page images as base64 for Word embedding
    const imageResults = await Promise.all(
      pageRefs.map(async (ref) => {
        try {
          const r = await apiFetch(`/document/${encodeURIComponent(ref.doc_id)}/page-image/${ref.page}`);
          if (!r.ok) return { ...ref, dataUrl: null };
          const blob = await r.blob();
          return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = () => resolve({ ...ref, dataUrl: reader.result });
            reader.onerror = () => resolve({ ...ref, dataUrl: null });
            reader.readAsDataURL(blob);
          });
        } catch { return { ...ref, dataUrl: null }; }
      })
    );
    const validImages = imageResults.filter(r => r.dataUrl);
    if (validImages.length > 0) {
      appendix = `<div style="page-break-before:always;"></div>
        <h1 style="font-size:16pt;color:#7A4F0F;border-bottom:2pt solid #C9974A;padding-bottom:8pt;">Appendix — Referenced Pages</h1>

          <div style="background:#F2EBD9;padding:6pt 10pt;font-size:9pt;font-weight:bold;color:#7A4F0F;">
            ${esc(img.doc_label || img.doc_id)} — Page ${img.page} &nbsp;&nbsp;
            <span style="color:#999;font-weight:normal;">Referenced in item${img.items.length>1?'s':''} ${img.items.join(', ')}</span>
          </div>
          <div style="padding:4pt;">
            <img src="${img.dataUrl}" style="width:100%;max-width:550pt;" alt="Page ${img.page}"/>
          </div>
        </div>`;
      }
    }
  }

  const htmlDoc = `<!DOCTYPE html>

  h3{font-size:11pt;color:#444;margin:8pt 0 2pt;}
  table{border-collapse:collapse;margin:10pt 0;}

  td{border:1pt solid #ccc;padding:4pt 8pt;text-align:left;font-size:10pt;vertical-align:top;}

  <table width="100%" style="border:none;border-collapse:collapse;"><tr>

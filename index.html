        <div style={{marginLeft:'auto',display:'inline-flex',alignItems:'center',gap:8,background:'var(--charcoal-3)',border:'1px solid rgba(107,103,98,0.4)',borderRadius:6,padding:'6px 10px',minWidth:240}}>
          <span style={{color:'var(--grey-2)'}}><Icon.Search/></span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search clause #, title, text…"
                 style={{flex:1,background:'transparent',border:'none',color:'var(--white)',fontSize:12,outline:'none',fontFamily:'Inter, sans-serif'}}/>
          {search && (
            <span onClick={()=>setSearch("")} style={{cursor:'pointer',color:'var(--grey-2)',fontSize:11}}>✕</span>
          )}
        </div>
      </div>

      {/* ── Two-pane layout: register table + detail editor ─────── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18,alignItems:'flex-start'}}>
        {/* LEFT: register */}
        <div className="card" style={{margin:0,minHeight:520}}>
          <div className="card-header">
            <div className="card-title">Register · {visible.length} of {total}</div>
            <div style={{fontSize:10,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--grey-2)'}}>
              click row to edit
            </div>
          </div>
          <div style={{maxHeight:620,overflowY:'auto'}}>
            {visible.length === 0 ? (
              <div style={{padding:'36px 24px',textAlign:'center',color:'var(--grey-2)',fontSize:12}}>
                No clauses match the current filter.
              </div>
            ) : (
              <table className="evidence-table">
                <thead>
                  <tr>
                    <th style={{width:64}}>Ref</th>
                    <th>Title</th>
                    <th style={{width:90}}>Category</th>
                    <th style={{width:140}}>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {visible.map(e => {
                    const meta = SOCSOD_STATUS_META[e.status];
                    const isActive = e.id === activeId;
                    return (
                      <tr key={e.id} onClick={()=>setActiveId(e.id)}
                          style={{background:isActive?'rgba(184,115,51,0.08)':undefined,
                                  borderLeft:isActive?'3px solid var(--copper)':'3px solid transparent'}}>
                        <td style={{fontFamily:'Cinzel, serif',fontWeight:700,color:'var(--gold)'}}>{e.ref}</td>
                        <td>
                          <div style={{color:'var(--white)',fontWeight:500,marginBottom:2}}>{e.title}</div>
                          <div style={{fontSize:11,color:'var(--grey-2)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:280}}>
                            {e.text}
                          </div>
                        </td>
                        <td>
                          <span style={{fontSize:10,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--grey-1)',fontWeight:600}}>
                            {e.cat}
                          </span>
                        </td>
                        <td>
                          <div style={{display:'flex',alignItems:'center',gap:8}}>
                            <span className={`tag ${meta.tag}`}>{meta.label}</span>
                            {e.status==='deviate' && e.severity && (
                              <span style={{fontSize:9,color:SOCSOD_SEVERITY_META[e.severity]?.color,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase'}}>
                                · {SOCSOD_SEVERITY_META[e.severity]?.label}
                              </span>
                            )}
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}
          </div>
        </div>

        {/* RIGHT: detail editor */}
        <div className="card" style={{margin:0,position:'sticky',top:12}}>
          {!active ? (
            <div className="card-body" style={{padding:'40px 24px',textAlign:'center',color:'var(--grey-2)',fontSize:12}}>
              Select a clause from the register to edit.
            </div>
          ) : (
            <>
              <div className="card-header">
                <div>
                  <div style={{fontFamily:'Cinzel, serif',fontWeight:700,color:'var(--gold)',fontSize:16,letterSpacing:'0.06em'}}>
                    Clause {active.ref}
                  </div>
                  <div style={{fontSize:11,color:'var(--grey-1)',marginTop:2}}>{active.title} · {active.cat}</div>
                </div>
                <span className={`tag ${SOCSOD_STATUS_META[active.status].tag}`}>{SOCSOD_STATUS_META[active.status].label}</span>
              </div>
              <div className="card-body" style={{padding:'18px 22px'}}>
                {/* Clause text quote */}
                <div style={{padding:'12px 14px',borderLeft:'3px solid var(--copper)',background:'rgba(184,115,51,0.05)',borderRadius:'0 6px 6px 0',marginBottom:18}}>
                  <div style={{fontSize:9,letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--gold-dim)',fontWeight:700,marginBottom:6}}>Specification text</div>
                  <div style={{fontSize:12,color:'var(--grey-1)',lineHeight:1.6,fontStyle:'italic'}}>"{active.text}"</div>
                </div>

                {/* Status radio group */}
                <div style={{marginBottom:18}}>
                  <div style={{fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',color:'var(--grey-2)',fontWeight:700,marginBottom:8}}>Compliance status</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                    {Object.entries(SOCSOD_STATUS_META).map(([key,meta]) => {
                      const isSel = active.status === key;
                      return (
                        <button key={key} onClick={()=>updateActive({ status:key, severity: key==='deviate'?(active.severity||'minor'):null })}
                                style={{padding:'9px 12px',borderRadius:6,cursor:'pointer',
                                        background: isSel ? 'rgba(184,115,51,0.12)' : 'var(--charcoal-3)',
                                        border: isSel ? '1px solid var(--copper)' : '1px solid rgba(107,103,98,0.4)',
                                        color: isSel ? 'var(--white)' : 'var(--grey-1)',
                                        display:'flex',alignItems:'center',gap:8,fontSize:11,fontWeight:600,letterSpacing:'0.04em',textAlign:'left',
                                        transition:'all 0.12s'}}>
                          <span style={{width:8,height:8,borderRadius:'50%',background:meta.dot,flexShrink:0}}/>
                          {meta.label}
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* Common fields: proposal reference + comment (when applicable) */}
                {(active.status==='comply' || active.status==='comment' || active.status==='noted') && (
                  <div style={{marginBottom:14}}>
                    <div style={{fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',color:'var(--grey-2)',fontWeight:700,marginBottom:6}}>Proposal reference</div>
                    <input value={active.proposalRef||""} onChange={e=>updateActive({ proposalRef:e.target.value })}
                           placeholder="e.g. §4.2 — Datasheet Q-101"
                           style={{width:'100%',padding:'9px 12px',borderRadius:6,background:'var(--charcoal-3)',
                                   border:'1px solid rgba(107,103,98,0.4)',color:'var(--white)',
                                   fontSize:12,fontFamily:'Inter, sans-serif',outline:'none'}}/>
                  </div>
                )}

                {active.status==='comment' && (
                  <div style={{marginBottom:14}}>
                    <div style={{fontSize:10,letterSpacing:'0.16em',textTransform:'uppercase',color:'var(--grey-2)',fontWeight:700,marginBottom:6}}>Comment</div>
                    <textarea value={active.comment||""} onChange={e=>updateActive({ comment:e.target.value })}
                              rows={3}
                              placeholder="Add the qualifying comment that accompanies compliance…"
                              style={{width:'100%',padding:'9px 12px',borderRadius:6,background:'var(--charcoal-3)',
                                      border:'1px solid rgba(107,103,98,0.4)',color:'var(--white)',
                                      fontSize:12,fontFamily:'Inter, sans-serif',outline:'none',resize:'vertical'}}/>
                  </div>
                )}

                {/* Deviation block */}
                {active.status==='deviate' && (
                  <div style={{padding:'14px 16px',borderRadius:8,background:'rgba(232,23,74,0.04)',border:'1px solid rgba(232,23,74,0.25)',marginBottom:8}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                      <div style={{fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--danger)',fontWeight:700}}>SOD Entry</div>
                      <select value={active.severity||'minor'} onChange={e=>updateActive({ severity:e.target.value })}
                              style={{padding:'5px 10px',borderRadius:5,background:'var(--charcoal-3)',
                                      border:'1px solid rgba(107,103,98,0.4)',color:'var(--white)',fontSize:11,fontFamily:'Inter, sans-serif'}}>
                        {Object.entries(SOCSOD_SEVERITY_META).map(([k,m])=>(
                          <option key={k} value={k}>Severity: {m.label}</option>
                        ))}
                      </select>
                    </div>

                    {[
                      { k:"summary",     label:"Deviation summary",      rows:2, ph:"One-line description of the deviation." },
                      { k:"reason",      label:"Reason / justification", rows:3, ph:"Why bidder cannot fully comply." },
                      { k:"alternative", label:"Alternative offered",    rows:3, ph:"What the bidder proposes instead, with attachments." },
                    ].map(f => (
                      <div key={f.k} style={{marginBottom:10}}>
                        <div style={{fontSize:10,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--grey-1)',fontWeight:700,marginBottom:5}}>{f.label}</div>
                        <textarea value={active.deviation?.[f.k]||""} onChange={e=>updateActiveDeviation({ [f.k]:e.target.value })}
                                  rows={f.rows} placeholder={f.ph}
                                  style={{width:'100%',padding:'8px 11px',borderRadius:5,background:'var(--charcoal-3)',
                                          border:'1px solid rgba(107,103,98,0.4)',color:'var(--white)',
                                          fontSize:12,fontFamily:'Inter, sans-serif',outline:'none',resize:'vertical'}}/>
                      </div>
                    ))}

                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginTop:6}}>
                      {[
                        { k:"tech",  label:"Technical impact" },
                        { k:"sched", label:"Schedule impact"  },
                        { k:"comm",  label:"Commercial impact"},
                      ].map(f => (
                        <div key={f.k}>
                          <div style={{fontSize:9,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--grey-1)',fontWeight:700,marginBottom:5}}>{f.label}</div>
                          <textarea value={active.deviation?.[f.k]||""} onChange={e=>updateActiveDeviation({ [f.k]:e.target.value })}
                                    rows={2} placeholder="—"
                                    style={{width:'100%',padding:'7px 10px',borderRadius:5,background:'var(--charcoal-3)',
                                            border:'1px solid rgba(107,103,98,0.4)',color:'var(--white)',
                                            fontSize:11,fontFamily:'Inter, sans-serif',outline:'none',resize:'vertical'}}/>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Footer hint */}
                <div style={{marginTop:14,paddingTop:12,borderTop:'1px solid rgba(107,103,98,0.25)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div style={{fontSize:10,color:'var(--grey-2)',letterSpacing:'0.06em'}}>
                    Edits save automatically · {active.status==='deviate' ? 'Routes to SOD' : 'Routes to SOC'}
                  </div>
                  <div style={{display:'flex',gap:6}}>
                    <button className="btn btn-ghost" onClick={()=>{
                      const i = visible.findIndex(e=>e.id===active.id);
                      if (i > 0) setActiveId(visible[i-1].id);
                    }} style={{fontSize:10,padding:'6px 10px'}}>‹ Prev</button>
                    <button className="btn btn-ghost" onClick={()=>{
                      const i = visible.findIndex(e=>e.id===active.id);
                      if (i < visible.length-1) setActiveId(visible[i+1].id);
                    }} style={{fontSize:10,padding:'6px 10px'}}>Next ›</button>
                  </div>
                </div>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── COMPACTOR ADMIN ─────────────────────────────────────────────────────────
   Gemini-driven self-improving compactor. Admin sees a table of every doc
   with training status (Tier 1 cached Gemini output + Tier 2 learned rules).
   Selecting untrained docs → streams training via /admin/compactor/train/.
*/
function CompactorAdminPage() {
  const [pw, setPw]             = useState("");
  const [pwInput, setPwInput]   = useState("");
  const [err, setErr]           = useState("");
  const [rows, setRows]         = useState([]);
  const [rulesData, setRulesData] = useState(null);
  const [rulesV, setRulesV]     = useState(0);
  const [serverLog, setServerLog] = useState({ lines: [], size_bytes: 0, path: "" });
  const [logAutoRefresh, setLogAutoRefresh] = useState(true);
  const [logFilter, setLogFilter] = useState("");
  const logTailRef = useRef(null);
  const [loading, setLoading]   = useState(false);
  const [selected, setSelected] = useState(new Set());
  const [activeTab, setActiveTab] = useState("catalog");   // catalog | rules
  const [training, setTraining] = useState(false);
  const [trainLog, setTrainLog] = useState([]);             // [{doc_id, msg, pct}]
  const [currentDoc, setCurrentDoc] = useState(null);
  const abortRef = useRef(null);
  const unlocked = !!pw;

  const fetchCatalog = async (useP) => {
    if (!useP) { setErr("Password required"); return; }
    setLoading(true); setErr("");
    try {
      const r = await apiFetch('/admin/compactor/catalog', { headers: { "X-Admin-Password": useP } });
      const j = await r.json();
      if (!r.ok) {
        if (r.status === 401) { setPw(""); setPwInput(""); setErr("Wrong password"); }
        else setErr(j.detail || `HTTP ${r.status}`);
      } else {
        setRows(j.rows || []);
        setRulesV(j.current_rules_version || 0);
      }
    } catch(e) { setErr(String(e)); }
    setLoading(false);
  };

  const fetchRules = async () => {
    if (!pw) return;
    try {
      const r = await apiFetch('/admin/compactor/rules', { headers: { "X-Admin-Password": pw } });
      const j = await r.json();
      if (r.ok) setRulesData(j);
    } catch(e) {}
  };

  const fetchServerLog = async () => {
    if (!pw) return;
    try {
      const r = await apiFetch('/admin/server-log?lines=800', { headers: { "X-Admin-Password": pw } });
      const j = await r.json();
      if (r.ok) setServerLog(j);
    } catch(e) {}
  };

  const clearServerLog = async () => {
    if (!pw) return;
    if (!confirm("Clear the server log file? This cannot be undone.")) return;
    try {
      await apiFetch('/admin/server-log/clear', {
        method: 'POST',
        headers: { "X-Admin-Password": pw },
      });
      await fetchServerLog();
    } catch(e) {}
  };

  const submitPw = async (e) => {
    e.preventDefault();
    setErr("");
    await fetchCatalog(pwInput);
    setPw(pwInput);
  };

  const toggle = (doc_id) => {
    const s = new Set(selected);
    if (s.has(doc_id)) s.delete(doc_id); else s.add(doc_id);
    setSelected(s);
  };

  const selectAllUntrained = () => {
    setSelected(new Set(rows.filter(r => !r.trained).map(r => r.doc_id)));
  };

  const clearSelection = () => setSelected(new Set());

  // Train one doc. If the backend short-circuits with already_trained=true,
  // prompt for confirmation and re-POST with ?force=true.
  const trainOne = async (row, { force = false } = {}) => {
    try {
      const ctrl = new AbortController();
      abortRef.current = ctrl;
      const url = `/admin/compactor/train/${encodeURIComponent(row.doc_id)}/stream`
        + (force ? "?force=true" : "");
      const r = await apiFetch(url, {
        method: 'POST',
        headers: { "X-Admin-Password": pw },
        signal: ctrl.signal,
      });
      if (!r.ok) {
        const txt = await r.text();
        setTrainLog(prev => [...prev, { doc_id: row.doc_id, msg: `✗ HTTP ${r.status}: ${txt.slice(0,200)}`, pct: 0 }]);
        return;
      }
      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";
      let alreadyTrainedEvt = null;
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        let nl;
        while ((nl = buf.indexOf("\n")) >= 0) {
          const line = buf.slice(0, nl).trim();
          buf = buf.slice(nl + 1);
          if (!line) continue;
          try {
            const evt = JSON.parse(line);
            const ts = new Date().toTimeString().slice(0,8);
            setTrainLog(prev => [...prev, {
              doc_id: row.doc_id,
              msg: evt.step,
              pct: evt.pct,
              done: evt.done,
              ts,
              // Preserve the full event so the KPI strip can read extras
              raw_tokens: evt.raw_tokens,
              gemini_tokens: evt.gemini_tokens,
              savings_pct: evt.savings_pct,
              rules_count: evt.rules_count,
            }]);
            if (evt.already_trained) alreadyTrainedEvt = evt;
          } catch {}
        }
      }
      // If the stream short-circuited with already_trained, prompt to retrain.
      if (alreadyTrainedEvt && !force) {
        const pct = alreadyTrainedEvt.savings_pct != null ? alreadyTrainedEvt.savings_pct + "% saved" : "—";
        const rules = alreadyTrainedEvt.rules_count != null ? alreadyTrainedEvt.rules_count + " rules" : "—";
        const when = alreadyTrainedEvt.trained_at ? alreadyTrainedEvt.trained_at.slice(0, 19).replace('T', ' ') : "—";
        const msg = `${row.doc_id} has already contributed to the shared ruleset.\n\n`
          + `Previous pass: ${pct} · ${rules} · ${when}\n\n`
          + `Run another additive training pass? New rules will be appended — nothing is removed.`;
        if (confirm(msg)) {
          setTrainLog(prev => [...prev, { doc_id: row.doc_id, msg: `▶ additive pass on ${row.doc_id}`, pct: 0 }]);
          await trainOne(row, { force: true });
        }
      }
    } catch(e) {
      if (e.name === 'AbortError') {
        setTrainLog(prev => [...prev, { doc_id: row.doc_id, msg: '— aborted —', pct: 0 }]);
        throw e;
      }
      setTrainLog(prev => [...prev, { doc_id: row.doc_id, msg: `✗ ${String(e)}`, pct: 0 }]);
    }
  };

  // Train a list of docs sequentially.
  const trainSelected = async () => {
    if (training || selected.size === 0) return;
    setTraining(true);
    setTrainLog([]);
    const list = rows.filter(r => selected.has(r.doc_id));
    try {
      for (const row of list) {
        setCurrentDoc(row.doc_id);
        setTrainLog(prev => [...prev, { doc_id: row.doc_id, msg: `▶ starting ${row.doc_id}`, pct: 0 }]);
        await trainOne(row);
      }
    } catch (e) {
      if (e.name !== 'AbortError') console.error(e);
    }
    setTraining(false);
    setCurrentDoc(null);
    await fetchCatalog(pw);
  };

  // Train (or retrain) a single doc from the per-row button.
  const trainSingle = async (row) => {
    if (training) return;
    setTraining(true);
    setTrainLog([]);
    setCurrentDoc(row.doc_id);
    setTrainLog(prev => [...prev, { doc_id: row.doc_id, msg: `▶ starting ${row.doc_id}`, pct: 0 }]);
    try {
      await trainOne(row);
    } catch (e) {
      if (e.name !== 'AbortError') console.error(e);
    }
    setTraining(false);
    setCurrentDoc(null);
    await fetchCatalog(pw);
  };

  const stopTraining = () => { abortRef.current?.abort(); setTraining(false); };

  const revertDoc = async (doc_id) => {
    if (!confirm(`Revert ${doc_id} to heuristic-only? Deletes the Gemini-cached file.`)) return;
    try {
      const r = await apiFetch(`/admin/compactor/train/${encodeURIComponent(doc_id)}`, {
        method: 'DELETE',
        headers: { "X-Admin-Password": pw },
      });
      if (r.ok) await fetchCatalog(pw);
    } catch(e) { alert(String(e)); }
  };

  useEffect(() => {
    if ((activeTab === 'rules' || activeTab === 'history') && pw && !rulesData) fetchRules();
  }, [activeTab, pw]);

  // Live-tail the server log while the tab is open
  useEffect(() => {
    if (activeTab !== 'serverlog' || !pw) return;
    fetchServerLog();
    if (!logAutoRefresh) return;
    const id = setInterval(fetchServerLog, 2000);
    return () => clearInterval(id);
  }, [activeTab, pw, logAutoRefresh]);

  // Auto-scroll the log pane to the bottom as new lines arrive
  useEffect(() => {
    if (activeTab === 'serverlog' && logTailRef.current) {
      logTailRef.current.scrollTop = logTailRef.current.scrollHeight;
    }
  }, [serverLog.lines.length, activeTab]);

  // ── Password gate ──
  if (!unlocked) {
    return (
      <div className="main">
        <div className="page-header">
          <div className="page-title">Compactor Admin</div>
          <div className="page-sub">Opus-driven training · learned rules index</div>
        </div>
        <div className="card" style={{padding:24,maxWidth:420}}>
          <div style={{fontSize:11,letterSpacing:'0.14em',textTransform:'uppercase',
                       color:'var(--gold)',fontWeight:600,marginBottom:12}}>
            Admin Access
          </div>
          <form onSubmit={submitPw}>
            <input type="password" value={pwInput} onChange={e=>setPwInput(e.target.value)}
              placeholder="Admin password"
              style={{width:'100%',padding:'10px 12px',background:'rgba(0,0,0,0.3)',
                     border:'1px solid var(--grey-2)',color:'var(--text)',fontSize:13,
                     borderRadius:3,marginBottom:12}}/>
            <button type="submit" className="btn btn-gold"
              style={{width:'100%'}} disabled={!pwInput || loading}>
              {loading ? "Checking…" : "Unlock"}
            </button>
          </form>
          {err && <div style={{fontSize:11,color:'#e86a6a',marginTop:10}}>{err}</div>}
        </div>
      </div>
    );
  }

  const untrainedCount = rows.filter(r => !r.trained).length;
  const trainedCount   = rows.filter(r => r.trained).length;

  return (
    <div className="main">
      <div className="page-header">
        <div className="page-title">Compactor Admin</div>
        <div className="page-sub">
          {rows.length} docs · {trainedCount} trained · {untrainedCount} untrained · rules v{rulesV}
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',gap:0,borderBottom:'1px solid rgba(107,103,98,0.3)',marginBottom:14}}>
        {[['catalog','Catalog'],['rules','Rules Index'],['history','History'],['serverlog','Server Log']].map(([t,label]) => (
          <div key={t} onClick={()=>setActiveTab(t)}
            style={{padding:'10px 18px',fontSize:12,fontWeight:600,cursor:'pointer',
              letterSpacing:'0.06em',textTransform:'uppercase',
              color: activeTab===t ? 'var(--gold)' : 'var(--grey-1)',
              borderBottom: activeTab===t ? '2px solid var(--gold)' : '2px solid transparent',
              marginBottom:-1}}>
            {label}
          </div>
        ))}
      </div>

      {activeTab === 'catalog' && (
        <div style={{display:'grid',gridTemplateColumns: training ? '1fr 360px' : '1fr',gap:14}}>
          <div className="card" style={{padding:0,overflow:'hidden'}}>
            <div style={{padding:'12px 14px',borderBottom:'1px solid rgba(107,103,98,0.3)',
                         display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
              <button onClick={()=>fetchCatalog(pw)} className="btn btn-ghost" style={{fontSize:11}}>
                ↻ Refresh
              </button>
              <button onClick={selectAllUntrained} className="btn btn-ghost" style={{fontSize:11}}
                disabled={untrainedCount === 0}>
                Select all untrained ({untrainedCount})
              </button>
              <button onClick={clearSelection} className="btn btn-ghost" style={{fontSize:11}}
                disabled={selected.size === 0}>
                Clear selection
              </button>
              <div style={{flex:1}}/>
              {training
                ? <button onClick={stopTraining} className="btn"
                    style={{fontSize:11,fontWeight:700,color:'#e86a6a',
                      background:'rgba(232,106,106,0.08)',border:'1px solid rgba(232,106,106,0.35)'}}>
                    ■ STOP
                  </button>
                : <button onClick={trainSelected} className="btn btn-gold"
                    style={{fontSize:11}} disabled={selected.size === 0}>
                    Train {selected.size} selected
                  </button>}
            </div>
            <div style={{overflow:'auto',maxHeight:'calc(100vh - 280px)'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr style={{background:'rgba(0,0,0,0.3)',position:'sticky',top:0}}>
                    <th style={thStyle}></th>
                    <th style={thStyle}>Doc ID</th>
                    <th style={thStyle}>Contract</th>
                    <th style={{...thStyle,textAlign:'right'}}>Pages</th>
                    <th style={{...thStyle,textAlign:'right'}}>Raw tok</th>
                    <th style={{...thStyle,textAlign:'right'}}>Heur tok</th>
                    <th style={{...thStyle,textAlign:'right'}}>Trained tok</th>
                    <th style={thStyle}>Status</th>
                    <th style={thStyle}>Trained at</th>
                    <th style={thStyle}></th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map(row => (
                    <tr key={row.doc_id}
                      style={{borderBottom:'1px solid rgba(107,103,98,0.15)',
                        background: currentDoc===row.doc_id ? 'rgba(210,163,61,0.08)' : 'transparent'}}>
                      <td style={tdStyle}>
                        <input type="checkbox" checked={selected.has(row.doc_id)}
                          onChange={()=>toggle(row.doc_id)}/>
                      </td>
                      <td style={{...tdStyle,fontFamily:'ui-monospace,monospace'}}>{row.doc_id}</td>
                      <td style={tdStyle}>{row.project_name || '—'}</td>
                      <td style={{...tdStyle,textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{row.pages || '—'}</td>
                      <td style={{...tdStyle,textAlign:'right',fontVariantNumeric:'tabular-nums'}}>
                        {row.raw_tokens?.toLocaleString() || '—'}
                      </td>
                      <td style={{...tdStyle,textAlign:'right',fontVariantNumeric:'tabular-nums',color:'var(--grey-1)'}}>
                        {row.heuristic_tokens?.toLocaleString() || '—'}
                      </td>
                      <td style={{...tdStyle,textAlign:'right',fontVariantNumeric:'tabular-nums',
                        color: row.gemini_tokens ? 'var(--gold)' : 'var(--grey-2)',fontWeight: row.gemini_tokens?600:400}}>
                        {row.gemini_tokens?.toLocaleString() || '—'}
                      </td>
                      <td style={tdStyle}>
                        {row.trained
                          ? <span style={{color:'#6eb87a',fontWeight:600,fontSize:10,letterSpacing:'0.06em'}}>✓ TRAINED v{row.rules_version_at_train || '?'}</span>
                          : <span style={{color:'var(--grey-2)',fontSize:10,letterSpacing:'0.06em'}}>HEURISTIC</span>
                        }
                      </td>
                      <td style={{...tdStyle,color:'var(--grey-2)',fontSize:10}}>
                        {row.trained_at ? row.trained_at.slice(0,19).replace('T',' ') : '—'}
                      </td>
                      <td style={{...tdStyle,whiteSpace:'nowrap'}}>
                        <button onClick={()=>trainSingle(row)}
                          disabled={training}
                          title={row.trained ? "Run another additive pass — new rules merged into the shared ruleset, nothing removed" : "Train this doc — newly discovered rules are appended to the shared ruleset"}
                          style={{fontSize:10,padding:'2px 8px',marginRight:6,
                            color: row.trained ? 'var(--grey-1)' : 'var(--gold)',
                            background: row.trained ? 'rgba(107,103,98,0.10)' : 'rgba(210,163,61,0.10)',
                            border: row.trained ? '1px solid rgba(107,103,98,0.35)' : '1px solid rgba(210,163,61,0.45)',
                            borderRadius:3,cursor: training?'not-allowed':'pointer',fontWeight:600,
                            opacity: training?0.5:1}}>
                          {row.trained ? '↻ retrain' : '▶ train'}
                        </button>
                        {row.trained && (
                          <button onClick={()=>revertDoc(row.doc_id)}
                            title="Revert to heuristic"
                            style={{fontSize:10,padding:'2px 8px',color:'#e86a6a',
                              background:'rgba(232,106,106,0.08)',border:'1px solid rgba(232,106,106,0.25)',
                              borderRadius:3,cursor:'pointer'}}>
                            ↺ revert
                          </button>
                        )}
                      </td>
                    </tr>
                  ))}
                  {rows.length === 0 && (
                    <tr><td colSpan={10} style={{...tdStyle,textAlign:'center',color:'var(--grey-2)',padding:30}}>
                      No documents. Upload docs in the Evidence Vault first.
                    </td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>
          {training && (() => {
            // Prefer authoritative fields on the final event; otherwise parse
            // running stats from the event stream (savings%, rules, raw tokens).
            let rawTok = 0, savings = null, rules = null, phase = "", lastPct = 0;
            const phaseFromMsg = (m) => {
              const match = /Phase\s+\d+[^·]*|Loop\s+\d+\/\d+[^·]*|^[A-Z][^·]{2,60}/m.exec(m || "");
              return match ? match[0].trim().replace(/\s+/g," ").slice(0,60) : "";
            };
            for (const l of trainLog) {
              const m = l.msg || "";
              lastPct = l.pct || lastPct;
              if (l.raw_tokens)    rawTok = l.raw_tokens;
              if (l.savings_pct != null) savings = l.savings_pct;
              if (l.rules_count != null) rules = l.rules_count;
              if (rawTok === 0) {
                const pp = /(\d{1,3}(?:,\d{3})*|\d+)\s*tokens?/i.exec(m);
                if (pp) rawTok = parseInt(pp[1].replace(/,/g,""), 10);
              }
              if (savings == null) {
                const ps = /(\d+(?:\.\d+)?)\s*%/.exec(m);
                if (ps) savings = parseFloat(ps[1]);
              }
              if (rules == null) {
                const pr = /(\d+)\s*rules?/i.exec(m);
                if (pr) rules = parseInt(pr[1], 10);
              }
              const ph = phaseFromMsg(m);
              if (ph) phase = ph;
            }
            const savedTok = (rawTok && savings != null)
              ? Math.round(rawTok * savings / 100) : null;
            const pctFill = Math.round(lastPct * 100);

            // Build the per-pass history by walking trainLog in order.
            const passes = [];
            {
              let cur = null;
              for (const l of trainLog) {
                const m = l.msg || "";
                const ms = m.match(/^Pass (\d+)\/\d+.*?\(([\d,]+) chars/);
                if (ms) {
                  if (cur) passes.push(cur);
                  cur = { n: +ms[1], started_ts: l.ts,
                          input_chars: parseInt(ms[2].replace(/,/g,""),10) };
                  continue;
                }
                const mo = m.match(/^\s*part \d+\/\d+.*Opus reading/);
                if (mo && cur && !cur.opus_started_ts) { cur.opus_started_ts = l.ts; continue; }
                const mr = m.match(/^\s*part \d+\s*→\s*\+(\d+) new rule/);
                if (mr && cur) { cur.opus_ended_ts = l.ts; continue; }
                const md = m.match(/Pass \d+ done.*?\+(\d+) rules.*?savings ([\d.]+)%\s*→\s*([\d.]+)%\s*\(Δ\s*([+-]?[\d.]+)pp\)/);
                if (md && cur) {
                  cur.rules_added  = +md[1];
                  cur.savings_from = parseFloat(md[2]);
                  cur.savings_to   = parseFloat(md[3]);
                  cur.delta        = parseFloat(md[4]);
                  cur.ended_ts     = l.ts;
                  passes.push(cur);
                  cur = null;
                }
              }
              if (cur) { cur._inProgress = true; passes.push(cur); }
            }
            const toSecs = (ts) => {
              if (!ts) return null;
              const parts = ts.split(":").map(Number);
              return parts[0]*3600 + parts[1]*60 + parts[2];
            };
            const dur = (a,b) => (a && b) ? Math.max(0, toSecs(b)-toSecs(a)) : null;
            const fmtDur = (s) => s==null ? '—' : `${Math.floor(s/60)}m${String(s%60).padStart(2,'0')}s`;
            return (
              <div className="card" style={{padding:0,overflow:'hidden',display:'flex',flexDirection:'column',
                background:'#0a0a0a',border:'1px solid rgba(201,151,74,0.4)',borderRadius:6}}>
                {/* Header */}
                <div style={{padding:'12px 14px',borderBottom:'1px solid rgba(201,151,74,0.25)',
                  display:'flex',alignItems:'center',gap:10,
                  background:'linear-gradient(180deg,rgba(201,151,74,0.08),rgba(0,0,0,0.5))'}}>
                  <span style={{color:'var(--gold)',fontWeight:700,letterSpacing:'0.14em',
                    textTransform:'uppercase',fontSize:11}}>● Training</span>
                  <span style={{color:'#d8d3c8',fontFamily:'ui-monospace,monospace',fontSize:11}}>
                    {currentDoc || '—'}
                  </span>
                  <div style={{flex:1}}/>
                  <span style={{color:'var(--gold)',fontFamily:'ui-monospace,monospace',
                    fontWeight:700,fontSize:12}}>{pctFill}%</span>
                </div>

                {/* Gold fill progress bar */}
                <div style={{height:6,background:'rgba(107,103,98,0.25)',position:'relative',
                  borderBottom:'1px solid rgba(201,151,74,0.2)'}}>
                  <div style={{position:'absolute',left:0,top:0,bottom:0,width:`${pctFill}%`,
                    background:'linear-gradient(90deg,rgba(201,151,74,0.9),rgba(245,200,100,0.85))',
                    transition:'width 0.4s cubic-bezier(.4,0,.2,1)',
                    boxShadow:'0 0 8px rgba(201,151,74,0.5)'}}/>
                </div>

                {/* KPI strip — strategy / tokens saved */}
                <div style={{display:'grid',gridTemplateColumns:'repeat(4, 1fr)',gap:0,
                  borderBottom:'1px solid rgba(201,151,74,0.2)'}}>
                  {[
                    ['Phase',       phase || '—'],
                    ['Raw tokens',  rawTok ? rawTok.toLocaleString() : '—'],
                    ['Saved',       (savedTok != null)
                                      ? `${savedTok.toLocaleString()}  (${savings}%)`
                                      : '—'],
                    ['Rules',       rules != null ? `${rules}` : '—'],
                  ].map(([k,v],i) => (
                    <div key={k} style={{padding:'10px 12px',
                      borderRight: i<3 ? '1px solid rgba(201,151,74,0.15)' : 'none',
                      background: k==='Saved' && savedTok != null
                        ? 'linear-gradient(180deg,rgba(201,151,74,0.08),transparent)'
                        : 'transparent'}}>
                      <div style={{fontSize:9,letterSpacing:'0.16em',textTransform:'uppercase',
                        color:'var(--grey-2)',marginBottom:3}}>{k}</div>
                      <div style={{fontSize:13,fontWeight:600,fontFamily:'ui-monospace,monospace',
                        color:k==='Saved' && savedTok!=null ? 'var(--gold)' : '#d8d3c8'}}>
                        {v}
                      </div>
                    </div>
                  ))}
                </div>

                {/* Pass history — rules added / savings / delta per pass */}
                {passes.length > 0 && (
                  <div style={{borderBottom:'1px solid rgba(201,151,74,0.2)',
                    maxHeight:220,overflow:'auto',background:'#060606'}}>
                    <table style={{width:'100%',fontSize:10,
                      fontFamily:'ui-monospace,Menlo,Consolas,monospace',
                      borderCollapse:'collapse'}}>
                      <thead>
                        <tr style={{background:'rgba(201,151,74,0.06)',
                          color:'var(--gold)',letterSpacing:'0.14em',
                          textTransform:'uppercase',fontWeight:700,fontSize:9,
                          position:'sticky',top:0}}>
                          <th style={{padding:'7px 10px',textAlign:'left'}}>Pass</th>
                          <th style={{padding:'7px 10px',textAlign:'right'}}>Rules +</th>
                          <th style={{padding:'7px 10px',textAlign:'right'}}>Savings</th>
                          <th style={{padding:'7px 10px',textAlign:'right'}}>Δ pp</th>
                          <th style={{padding:'7px 10px',textAlign:'right'}}>Input tok</th>
                          <th style={{padding:'7px 10px',textAlign:'right'}}>Opus time</th>
                        </tr>
                      </thead>
                      <tbody>
                        {passes.map(p => {
                          const opusS = dur(p.opus_started_ts, p.opus_ended_ts);
                          const deltaColor = p.delta == null ? '#6b6762'
                                           : p.delta >= 5 ? '#6eb87a'
                                           : p.delta >= 1 ? 'var(--gold)'
                                           : '#d2a33d';
                          const inputTok = p.input_chars ? Math.round(p.input_chars/4) : null;
                          return (
                            <tr key={p.n} style={{
                              borderBottom:'1px solid rgba(107,103,98,0.12)',
                              background: p._inProgress
                                ? 'linear-gradient(90deg,rgba(201,151,74,0.06),transparent)'
                                : 'transparent'}}>
                              <td style={{padding:'5px 10px',color:'var(--gold)',fontWeight:700}}>
                                {p.n}
                                {p._inProgress && <span style={{color:'#d2a33d',
                                  marginLeft:6,fontSize:9}}>running…</span>}
                              </td>
                              <td style={{padding:'5px 10px',textAlign:'right',color:'#d8d3c8'}}>
                                {p.rules_added != null ? `+${p.rules_added}` : '—'}
                              </td>
                              <td style={{padding:'5px 10px',textAlign:'right',color:'#d8d3c8'}}>
                                {p.savings_from != null
                                  ? `${p.savings_from}% → ${p.savings_to}%`
                                  : '—'}
                              </td>
                              <td style={{padding:'5px 10px',textAlign:'right',
                                color:deltaColor,fontWeight:600}}>
                                {p.delta != null
                                  ? `${p.delta >= 0 ? '+' : ''}${p.delta}`
                                  : '—'}
                              </td>
                              <td style={{padding:'5px 10px',textAlign:'right',color:'var(--grey-2)'}}>
                                {inputTok != null ? inputTok.toLocaleString() : '—'}
                              </td>
                              <td style={{padding:'5px 10px',textAlign:'right',color:'var(--grey-2)'}}>
                                {fmtDur(opusS)}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}

                {/* Live log — black+gold, time-stamped */}
                <div style={{flex:1,overflow:'auto',background:'#000',padding:'10px 14px',
                  fontSize:11,fontFamily:'ui-monospace,Menlo,Consolas,monospace',lineHeight:1.55,
                  maxHeight:'calc(100vh - 380px)'}}>
                  {trainLog.length === 0 ? (
                    <div style={{color:'var(--grey-2)',fontStyle:'italic'}}>
                      (waiting for first event…)
                    </div>
                  ) : trainLog.map((l, i) => {
                    const ts = new Date().toISOString().slice(11,19);
                    const color = l.done ? '#6eb87a'
                                : (l.msg||'').startsWith('✗') ? '#e86a6a'
                                : (l.msg||'').match(/^\s*\(warn/) ? '#d2a33d'
                                : '#d8d3c8';
                    return (
                      <div key={i} style={{color,padding:'1px 0',whiteSpace:'pre-wrap',wordBreak:'break-word'}}>
                        <span style={{color:'#6b6762',marginRight:8}}>{l.ts || ts}</span>
                        <span style={{color:'var(--gold)',fontWeight:600}}>
                          [{(l.pct*100).toFixed(0).padStart(3,' ')}%]
                        </span>{' '}
                        <span style={{color:'var(--grey-2)'}}>{l.doc_id}</span>{' · '}
                        {l.msg}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}
        </div>
      )}

      {activeTab === 'rules' && (
        <div className="card" style={{padding:0,overflow:'hidden'}}>
          <div style={{padding:'12px 14px',borderBottom:'1px solid rgba(107,103,98,0.3)',fontSize:11}}>
            <span style={{color:'var(--gold)',fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase'}}>
              Rules v{rulesData?.rules?.version || 0}
            </span>
            {' · '}
            <span style={{color:'var(--grey-1)'}}>
              {rulesData?.rules?.rules?.length || 0} deterministic rule{(rulesData?.rules?.rules?.length||0)===1?'':'s'} feeding the heuristic engine
            </span>
          </div>
          <div style={{overflow:'auto',maxHeight:'calc(100vh - 240px)'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
              <thead>
                <tr style={{background:'rgba(0,0,0,0.3)',position:'sticky',top:0}}>
                  <th style={thStyle}>ID</th>
                  <th style={thStyle}>Type</th>
                  <th style={thStyle}>Value</th>
                  <th style={thStyle}>Rationale</th>
                  <th style={thStyle}>Source doc</th>
                </tr>
              </thead>
              <tbody>
                {(rulesData?.rules?.rules || []).map(r => (
                  <tr key={r.id} style={{borderBottom:'1px solid rgba(107,103,98,0.15)'}}>
                    <td style={{...tdStyle,fontFamily:'ui-monospace,monospace',color:'var(--grey-2)'}}>{r.id}</td>
                    <td style={{...tdStyle,color:'var(--gold)'}}>{r.type}</td>
                    <td style={{...tdStyle,fontFamily:'ui-monospace,monospace',fontSize:10,maxWidth:280,
                      overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={r.value}>
                      {r.value}
                    </td>
                    <td style={{...tdStyle,color:'var(--grey-1)'}}>{r.rationale}</td>
                    <td style={{...tdStyle,color:'var(--grey-2)'}}>{r.source_doc}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <details style={{padding:'10px 14px',borderTop:'1px solid rgba(107,103,98,0.3)'}}>
            <summary style={{fontSize:11,cursor:'pointer',color:'var(--gold)',fontWeight:600,
              letterSpacing:'0.08em',textTransform:'uppercase'}}>Techniques audit log</summary>
            <pre style={{fontSize:10,color:'var(--grey-1)',whiteSpace:'pre-wrap',marginTop:10,
              maxHeight:400,overflow:'auto',fontFamily:'ui-monospace,monospace'}}>
              {rulesData?.techniques_log || '(empty)'}
            </pre>
          </details>
        </div>
      )}

      {activeTab === 'history' && (() => {
        const contribs = [...(rulesData?.rules?.contributors || [])]
          .sort((a, b) => (b.at || '').localeCompare(a.at || ''));
        const fmt = (n) => (n == null ? '—' : typeof n === 'number' ? n.toLocaleString() : n);
        const fmtDate = (iso) => {
          if (!iso) return '—';
          const s = String(iso).replace('T', ' ').slice(0, 19);
          return s + ' UTC';
        };
        return (
          <div className="card" style={{padding:0,overflow:'hidden',
            background:'#0a0a0a',border:'1px solid rgba(201,151,74,0.3)',borderRadius:6}}>
            <div style={{padding:'12px 14px',borderBottom:'1px solid rgba(201,151,74,0.25)',
              fontSize:11,display:'flex',alignItems:'center',gap:10,
              background:'linear-gradient(180deg,rgba(201,151,74,0.05),rgba(0,0,0,0.4))'}}>
              <span style={{color:'var(--gold)',fontWeight:700,letterSpacing:'0.14em',
                textTransform:'uppercase',fontSize:11}}>● Training history</span>
              <span style={{color:'var(--grey-2)',fontSize:10,fontFamily:'ui-monospace,monospace'}}>
                {contribs.length} run{contribs.length===1?'':'s'} · accumulator v{rulesData?.rules?.version || 0} · {rulesData?.rules?.rules?.length || 0} total rules
              </span>
              <div style={{flex:1}}/>
              <button onClick={fetchRules} className="btn btn-ghost" style={{fontSize:10}}>↻ Refresh</button>
            </div>
            <div style={{overflow:'auto',maxHeight:'calc(100vh - 240px)'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:11,
                fontFamily:'ui-monospace,Menlo,Consolas,monospace'}}>
                <thead>
                  <tr style={{background:'rgba(201,151,74,0.06)',position:'sticky',top:0,
                    color:'var(--gold)',letterSpacing:'0.12em',textTransform:'uppercase',
                    fontWeight:700,fontSize:9}}>
                    <th style={{padding:'8px 10px',textAlign:'left'}}>Doc</th>
                    <th style={{padding:'8px 10px',textAlign:'left'}}>Trained at</th>
                    <th style={{padding:'8px 10px',textAlign:'right'}}>Savings</th>
                    <th style={{padding:'8px 10px',textAlign:'right'}}>Rules +</th>
                    <th style={{padding:'8px 10px',textAlign:'right'}}>Pass 1 ✓</th>
                    <th style={{padding:'8px 10px',textAlign:'right'}}>Review ✓</th>
                    <th style={{padding:'8px 10px',textAlign:'right'}}>Passes</th>
                  </tr>
                </thead>
                <tbody>
                  {contribs.length === 0 ? (
                    <tr><td colSpan={7} style={{padding:30,textAlign:'center',
                      color:'var(--grey-2)',fontStyle:'italic'}}>
                      (no training runs recorded yet — click Train on a doc in the Catalog tab)
                    </td></tr>
                  ) : contribs.map((c, i) => {
                    const savingsColor = c.savings_pct == null ? 'var(--grey-2)'
                                       : c.savings_pct >= 50 ? '#6eb87a'
                                       : c.savings_pct >= 30 ? 'var(--gold)'
                                       : '#d2a33d';
                    return (
                      <tr key={i} style={{borderBottom:'1px solid rgba(107,103,98,0.15)'}}>
                        <td style={{padding:'6px 10px',color:'#d8d3c8',fontWeight:600}}>{c.doc_id || '—'}</td>
                        <td style={{padding:'6px 10px',color:'var(--grey-1)'}}>{fmtDate(c.at)}</td>
                        <td style={{padding:'6px 10px',textAlign:'right',color:savingsColor,fontWeight:700}}>
                          {c.savings_pct != null ? `${c.savings_pct}%` : '—'}
                        </td>
                        <td style={{padding:'6px 10px',textAlign:'right',color:'var(--gold)',fontWeight:600}}>
                          {c.rules_added != null ? `+${c.rules_added}` : '—'}
                        </td>
                        <td style={{padding:'6px 10px',textAlign:'right',color:'#d8d3c8'}}>
                          {fmt(c.first_pass_accepted ?? c.gemini_accepted)}
                        </td>
                        <td style={{padding:'6px 10px',textAlign:'right',color:'#d8d3c8'}}>
                          {fmt(c.review_pass_accepted ?? c.claude_accepted)}
                        </td>
                        <td style={{padding:'6px 10px',textAlign:'right',color:'var(--grey-2)'}}>
                          {fmt(c.passes)}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div style={{padding:'8px 14px',borderTop:'1px solid rgba(201,151,74,0.2)',
              fontSize:9,color:'var(--grey-2)',fontFamily:'ui-monospace,monospace',
              background:'rgba(0,0,0,0.5)'}}>
              Source: <code>output/compactor_rules.yaml</code> · <code>contributors[]</code> · append-only, one row per training run
            </div>
          </div>
        );
      })()}

      {activeTab === 'serverlog' && (() => {
        const all = serverLog.lines || [];
        const filtered = logFilter
          ? all.filter(l => l.toLowerCase().includes(logFilter.toLowerCase()))
          : all;
        const colorFor = (ln) => {
          if (/\bERROR\b|Traceback|Exception|\b5\d\d\b/.test(ln)) return '#e86a6a';
          if (/\bWARN(ING)?\b|\b4\d\d\b/.test(ln))                 return '#d2a33d';
          if (/\bINFO\b/.test(ln))                                 return '#d8d3c8';
          if (/\bDEBUG\b/.test(ln))                                return '#6b6762';
          return 'var(--grey-1)';
        };
        return (
          <div className="card" style={{padding:0,overflow:'hidden',background:'#0a0a0a',
            border:'1px solid rgba(201,151,74,0.3)',borderRadius:6}}>
            <div style={{padding:'10px 14px',borderBottom:'1px solid rgba(201,151,74,0.25)',
              display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',
              background:'linear-gradient(180deg, rgba(201,151,74,0.05), rgba(0,0,0,0.4))'}}>
              <span style={{color:'var(--gold)',fontWeight:700,letterSpacing:'0.14em',
                textTransform:'uppercase',fontSize:11}}>● Server Log</span>
              <span style={{color:'var(--grey-2)',fontSize:10,fontFamily:'ui-monospace,monospace'}}>
                {filtered.length.toLocaleString()}{logFilter ? ` / ${all.length.toLocaleString()}` : ''} lines
                {' · '}{(serverLog.size_bytes/1024).toFixed(1)} KB
              </span>
              <input value={logFilter} onChange={e=>setLogFilter(e.target.value)}
                placeholder="filter…" spellCheck={false}
                style={{background:'rgba(0,0,0,0.5)',border:'1px solid rgba(201,151,74,0.3)',
                  color:'var(--gold)',padding:'4px 8px',fontSize:11,borderRadius:3,
                  fontFamily:'ui-monospace,monospace',minWidth:160}}/>
              <label style={{fontSize:10,color:'var(--grey-1)',cursor:'pointer',
                display:'flex',alignItems:'center',gap:5}}>
                <input type="checkbox" checked={logAutoRefresh}
                  onChange={e=>setLogAutoRefresh(e.target.checked)}/>
                auto-refresh (2s)
              </label>
              <div style={{flex:1}}/>
              <button onClick={fetchServerLog} className="btn btn-ghost" style={{fontSize:10}}>
                ↻ Refresh
              </button>
              <button onClick={clearServerLog}
                style={{fontSize:10,padding:'4px 10px',color:'#e86a6a',
                  background:'rgba(232,106,106,0.08)',border:'1px solid rgba(232,106,106,0.3)',
                  borderRadius:3,cursor:'pointer',fontWeight:600}}>
                ✕ Clear
              </button>
            </div>
            <div ref={logTailRef}
              style={{height:'calc(100vh - 260px)',overflowY:'auto',overflowX:'auto',
                background:'#000',padding:'10px 14px',
                fontFamily:'ui-monospace,Menlo,Consolas,monospace',fontSize:11,lineHeight:1.55}}>
              {filtered.length === 0 ? (
                <div style={{color:'var(--grey-2)',fontStyle:'italic'}}>
                  {all.length === 0 ? '(log is empty — server hasn\'t logged anything yet. Restart uvicorn to wire up logging.)'
                                    : '(no lines match the filter)'}
                </div>
              ) : filtered.map((ln, i) => (
                <div key={i} style={{color:colorFor(ln),whiteSpace:'pre',padding:'1px 0'}}>
                  <span style={{color:'#3a3a3a',userSelect:'none',marginRight:10,
                    display:'inline-block',width:44,textAlign:'right'}}>{all.indexOf(ln)+1}</span>
                  {ln}
                </div>
              ))}
            </div>
            <div style={{padding:'6px 14px',borderTop:'1px solid rgba(201,151,74,0.2)',
              fontSize:9,color:'var(--grey-2)',fontFamily:'ui-monospace,monospace',
              background:'rgba(0,0,0,0.6)',letterSpacing:'0.04em'}}>
              {serverLog.path || '(no log file yet)'}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

const thStyle = {
  padding:'8px 10px',textAlign:'left',fontSize:10,letterSpacing:'0.08em',
  textTransform:'uppercase',color:'var(--grey-2)',fontWeight:600,
  borderBottom:'1px solid rgba(107,103,98,0.3)',
};
const tdStyle = { padding:'7px 10px',color:'var(--text)' };


function DeletionPage() {
  // Password is NEVER cached — user enters it to unlock the page and retypes it per action.
  const [pw, setPw]           = useState("");
  const [pwInput, setPwInput] = useState("");
  const [unlockErr, setUnlockErr] = useState("");
  const [loading, setLoading] = useState(false);

  const [tab, setTab]         = useState("active");   // "active" | "recovery"
  const [docs, setDocs]       = useState([]);
  const [trash, setTrash]     = useState([]);
  const [ttlHours, setTtlHours] = useState(48);
  const [search, setSearch]   = useState("");
  const [openFolder, setOpenFolder] = useState(null);   // null = grid view; "ProjectName" = drill-down

  // confirming.kind: 'soft' | 'restore' | 'purge' | 'folder-soft'
  // For 'folder-soft', `doc_id` carries the project_name.
  const [confirming, setConfirming] = useState(null);
  const [confirmPw, setConfirmPw]   = useState("");
  const [confirmName, setConfirmName] = useState("");
  const [actionErr, setActionErr]   = useState("");
  const [busy, setBusy]             = useState(false);

  const unlocked = !!pw;

  const fetchAll = async (useP) => {
    setLoading(true);
    try {
      const [mr, tr] = await Promise.all([
        apiFetch('/my-documents'),
        apiFetch('/admin/deletion/trash', { headers: { 'X-Admin-Password': useP } }),
      ]);
      const mj = await mr.json();
      if (!tr.ok) {
        if (tr.status === 401) { setPw(""); setPwInput(""); setUnlockErr("Wrong password"); setLoading(false); return; }
        const tj = await tr.json().catch(()=>({}));
        setUnlockErr(tj.detail || `HTTP ${tr.status}`);
        setLoading(false); return;
      }
      const tj = await tr.json();
      setDocs(mj.documents || []);
      setTrash(tj.items || []);
      setTtlHours(tj.ttl_hours || 48);
    } catch(e) {
      setUnlockErr(String(e));
    }
    setLoading(false);
  };

  const submitUnlock = async (e) => {
    if (e) e.preventDefault();
    const p = pwInput.trim();
    if (!p) return;
    setUnlockErr("");
    setPw(p);
    await fetchAll(p);
  };
  const lock = () => { setPw(""); setPwInput(""); setDocs([]); setTrash([]); setConfirming(null); };

  const beginConfirm = (kind, doc_id, name) => {
    setConfirming({ kind, doc_id, name });
    setConfirmPw(""); setConfirmName(""); setActionErr("");
  };
  const cancelConfirm = () => { setConfirming(null); setConfirmPw(""); setConfirmName(""); setActionErr(""); };

  const runConfirm = async () => {
    if (!confirming) return;
    const { kind, doc_id, name } = confirming;
    if (confirmPw !== pw) { setActionErr("Password does not match"); return; }
    if (confirmName !== name) { setActionErr("Document name does not match"); return; }
    setBusy(true); setActionErr("");
    try {
      let r;
      if (kind === 'soft') {
        r = await apiFetch(`/document/${encodeURIComponent(doc_id)}`, {
          method: 'DELETE',
          headers: { 'X-Admin-Password': confirmPw },
        });
      } else if (kind === 'folder-soft') {
        // doc_id carries the project_name when kind === 'folder-soft'
        r = await apiFetch(`/contract/${encodeURIComponent(doc_id)}`, {
          method: 'DELETE',
          headers: { 'X-Admin-Password': confirmPw },
        });
      } else if (kind === 'restore') {
        r = await apiFetch(`/admin/deletion/restore/${encodeURIComponent(doc_id)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: confirmPw }),
        });
      } else if (kind === 'purge') {
        r = await apiFetch(`/admin/deletion/purge/${encodeURIComponent(doc_id)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: confirmPw }),
        });
      }
      const j = await r.json().catch(()=>({}));
      if (!r.ok) {
        setActionErr(j.detail || `HTTP ${r.status}`);
        setBusy(false); return;
      }
      cancelConfirm();
      // If we just deleted the entire folder we're inside, exit drill-down.
      if (kind === 'folder-soft') setOpenFolder(null);
      await fetchAll(pw);
    } catch(e) { setActionErr(String(e)); }
    setBusy(false);
  };

  const filteredDocs = (docs || []).filter(d =>
    !search.trim() || (d.name || '').toLowerCase().includes(search.toLowerCase())
  );
  const filteredTrash = (trash || []).filter(t =>
    !search.trim() || (t.name || '').toLowerCase().includes(search.toLowerCase())
  );

  if (!unlocked) {
    return (
      <div className="main">
        <div className="page-header">
          <div className="page-title">Deletion</div>
          <div className="page-sub">Admin area — deletes are soft for {ttlHours}h, then permanently purged</div>
        </div>
        <div style={{display:'flex',justifyContent:'center',marginTop:40}}>
          <form onSubmit={submitUnlock} className="card"
                style={{padding:28,width:360,display:'flex',flexDirection:'column',gap:12}}>
            <div style={{fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',
                         color:'var(--gold)',fontWeight:600}}>
              🔒 Admin Password
            </div>
            <input type="password" value={pwInput} autoFocus
                   onChange={e=>setPwInput(e.target.value)}
                   placeholder="Enter admin password"
                   style={{padding:'10px 12px',fontSize:13,
                           background:'var(--bg-2)',color:'var(--grey-0)',
                           border:'1px solid rgba(107,103,98,0.4)',borderRadius:3,
                           outline:'none',fontFamily:'monospace'}}/>
            <button type="submit" className="btn btn-primary"
                    disabled={loading || !pwInput.trim()}>
              {loading ? "Checking…" : "Unlock"}
            </button>
            {unlockErr && <div style={{color:'var(--danger)',fontSize:11}}>{unlockErr}</div>}
          </form>
        </div>
      </div>
    );
  }

  const PillBtn = ({children, onClick, color, disabled}) => (
    <button onClick={onClick} disabled={disabled}
      style={{
        padding:'5px 10px', fontSize:10, fontWeight:600, letterSpacing:'0.04em',
        background:'transparent', color:`var(--${color||'grey-1'})`,
        border:`1px solid ${color==='danger'?'rgba(232,23,74,0.4)':'rgba(107,103,98,0.4)'}`,
        borderRadius:3, cursor: disabled?'not-allowed':'pointer',
        opacity: disabled?0.4:1,
      }}>{children}</button>
  );

  return (
    <div className="main">
      <div className="page-header">
        <div className="page-header-row">
          <div>
            <div className="page-title">Deletion</div>
            <div className="page-sub">
              Soft delete · recoverable for {ttlHours}h · auto-purged afterwards
            </div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <div className="search-wrap" style={{width:220}}>
              <span className="search-icon"><Icon.Search /></span>
              <input className="search-input" placeholder="Search by name…"
                     value={search} onChange={e=>setSearch(e.target.value)}/>
            </div>
            <button className="btn btn-ghost" onClick={()=>fetchAll(pw)}>Refresh</button>
            <button className="btn btn-ghost" onClick={lock}>Lock</button>
          </div>
        </div>
        <div style={{display:'flex',gap:2,marginTop:16,borderBottom:'1px solid rgba(107,103,98,0.3)'}}>
          {[['active',`Active (${filteredDocs.length})`],
            ['recovery',`Recovery (${filteredTrash.length})`]].map(([k,lbl])=>(
            <button key={k}
              onClick={()=>setTab(k)}
              style={{
                padding:'8px 16px', fontSize:11, fontWeight:600, letterSpacing:'0.08em',
                textTransform:'uppercase', background:'transparent',
                color: tab===k?'var(--gold)':'var(--grey-1)',
                border:'none', borderBottom: tab===k?'2px solid var(--gold)':'2px solid transparent',
                cursor:'pointer', marginBottom:-1,
              }}>{lbl}</button>
          ))}
        </div>
      </div>

      {tab === 'active' && (() => {
        // Group active docs by project (Vault-style). Empty / null project_name → "(uncategorised)".
        const groups = {};
        filteredDocs.forEach(d => {
          const k = d.project_name || '(uncategorised)';
          (groups[k] = groups[k] || []).push(d);
        });
        const folderNames = Object.keys(groups).sort((a,b) => a.localeCompare(b));

        // ── Drill-down view: docs inside one folder ──
        if (openFolder && groups[openFolder]) {
          const folderDocs = groups[openFolder];
          const isUncat = openFolder === '(uncategorised)';
          return (
            <div className="card">
              <div className="card-header" style={{display:'flex',alignItems:'center',gap:12}}>
                <button onClick={()=>setOpenFolder(null)}
                        style={{background:'transparent',border:'none',color:'var(--gold)',
                                cursor:'pointer',fontSize:12,fontWeight:600,padding:'4px 8px',
                                borderRadius:3}}>
                  ← Back to folders
                </button>
                <span className="card-title" style={{flex:1}}>{openFolder}</span>
                <span style={{fontSize:10,color:'var(--grey-2)'}}>
                  {folderDocs.length} file{folderDocs.length!==1?'s':''}
                </span>
                {!isUncat && (
                  <PillBtn color="danger" onClick={()=>beginConfirm('folder-soft', openFolder, openFolder)}>
                    Delete entire folder
                  </PillBtn>
                )}
              </div>
              <div style={{padding:0,overflowX:'auto'}}>
                <table className="evidence-table">
                  <thead>
                    <tr>
                      <th style={thStyle}>Document</th>
                      <th style={thStyle}>Pages</th>
                      <th style={thStyle}>Added</th>
                      <th style={thStyle}></th>
                    </tr>
                  </thead>
                  <tbody>
                    {folderDocs.map(d => (
                      <tr key={d.doc_id}>
                        <td style={tdStyle}>
                          <div style={{fontWeight:600}}>{d.name}</div>
                          <div style={{fontSize:9,color:'var(--grey-2)',fontFamily:'monospace'}}>{d.doc_id}</div>
                        </td>
                        <td style={tdStyle}>{d.pages || '—'}</td>
                        <td style={tdStyle}>{d.added ? new Date(d.added).toLocaleDateString() : '—'}</td>
                        <td style={{...tdStyle,textAlign:'right'}}>
                          <PillBtn color="danger" onClick={()=>beginConfirm('soft', d.doc_id, d.name)}>
                            Delete file
                          </PillBtn>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        // ── Folder-grid view (default) ──
        return (
          <div className="card">
            <div className="card-header">
              <span className="card-title">Folders</span>
              <span style={{fontSize:10,color:'var(--grey-2)'}}>
                Click a folder to see its files. Folder-delete moves every file inside to trash for {ttlHours}h.
              </span>
            </div>
            {folderNames.length === 0 ? (
              <div style={{padding:'40px 24px',textAlign:'center',color:'var(--grey-2)'}}>
                {search ? 'No matches.' : 'No active documents.'}
              </div>
            ) : (
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(250px,1fr))',
                           gap:12,padding:14}}>
                {folderNames.map(name => {
                  const items = groups[name];
                  const isUncat = name === '(uncategorised)';
                  return (
                    <div key={name} className="project-card"
                         onClick={()=>setOpenFolder(name)}
                         style={{cursor:'pointer',padding:'14px 16px'}}>
                      <div className="project-card-name" style={{fontWeight:600}}>
                        {isUncat ? <span style={{color:'var(--grey-2)',fontStyle:'italic'}}>{name}</span> : name}
                      </div>
                      <div className="project-card-meta" style={{marginTop:4,fontSize:11}}>
                        {items.length} file{items.length!==1?'s':''}
                      </div>
                      {!isUncat && (
                        <div style={{display:'flex',justifyContent:'flex-end',marginTop:10}}>
                          <button
                            onClick={(e)=>{ e.stopPropagation();
                                            beginConfirm('folder-soft', name, name); }}
                            style={{padding:'4px 10px',fontSize:10,fontWeight:600,
                                    letterSpacing:'0.04em',background:'transparent',
                                    color:'var(--danger)',
                                    border:'1px solid rgba(232,23,74,0.4)',borderRadius:3,
                                    cursor:'pointer'}}>
                            Delete folder
                          </button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })()}

      {tab === 'recovery' && (
        <div className="card">
          <div className="card-header">
            <span className="card-title">Recovery window</span>
            <span style={{fontSize:10,color:'var(--grey-2)'}}>
              Entries older than {ttlHours}h are auto-purged on every page load.
            </span>
          </div>
          <div style={{padding:0,overflowX:'auto'}}>
            <table className="evidence-table">
              <thead>
                <tr>
                  <th style={thStyle}>Document</th>
                  <th style={thStyle}>Contract</th>
                  <th style={thStyle}>Deleted at</th>
                  <th style={thStyle}>Deleted by</th>
                  <th style={thStyle}>Hours left</th>
                  <th style={thStyle}></th>
                </tr>
              </thead>
              <tbody>
                {filteredTrash.length === 0 ? (
                  <tr><td colSpan={6} style={{...tdStyle,textAlign:'center',padding:'24px',color:'var(--grey-2)'}}>
                    {search ? 'No matches.' : 'Trash is empty.'}
                  </td></tr>
                ) : filteredTrash.map(t => {
                  const critical = (t.hours_remaining ?? 0) < 6;
                  return (
                    <tr key={t.doc_id}>
                      <td style={tdStyle}>
                        <div style={{fontWeight:600}}>{t.name}</div>
                        <div style={{fontSize:9,color:'var(--grey-2)',fontFamily:'monospace'}}>{t.doc_id}</div>
                      </td>
                      <td style={tdStyle}>{t.contract || '—'}</td>
                      <td style={tdStyle}>{t.deleted_at ? new Date(t.deleted_at).toLocaleString() : '—'}</td>
                      <td style={tdStyle}>{t.deleted_by || '—'}</td>
                      <td style={{...tdStyle, color: critical?'var(--danger)':'var(--gold)', fontWeight:600}}>
                        {(t.hours_remaining ?? 0).toFixed(1)}h
                      </td>
                      <td style={{...tdStyle,textAlign:'right',display:'flex',gap:6,justifyContent:'flex-end'}}>
                        <PillBtn color="ok" onClick={()=>beginConfirm('restore', t.doc_id, t.name)}>
                          Restore
                        </PillBtn>
                        <PillBtn color="danger" onClick={()=>beginConfirm('purge', t.doc_id, t.name)}>
                          Purge now
                        </PillBtn>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {confirming && (
        <div style={{
          position:'fixed', inset:0, background:'rgba(0,0,0,0.55)',
          display:'flex', alignItems:'center', justifyContent:'center', zIndex:9999,
        }}>
          <div className="card" style={{width:460, padding:24, background:'var(--bg-1)',
                                        border:'1px solid rgba(201,151,74,0.35)'}}>
            <div style={{fontSize:11, letterSpacing:'0.14em', textTransform:'uppercase',
                         color: confirming.kind==='restore'?'var(--ok)':'var(--danger)',
                         fontWeight:600, marginBottom:8}}>
              {confirming.kind === 'soft' && 'Confirm soft delete'}
              {confirming.kind === 'folder-soft' && 'Confirm folder delete'}
              {confirming.kind === 'restore' && 'Confirm restore'}
              {confirming.kind === 'purge' && 'Confirm PERMANENT purge'}
            </div>
            <div style={{fontSize:13, color:'var(--grey-0)', marginBottom:6}}>
              {confirming.name}
            </div>
            <div style={{fontSize:10, color:'var(--grey-2)', fontFamily:'monospace', marginBottom:16}}>
              {confirming.kind === 'folder-soft' ? 'folder' : confirming.doc_id}
            </div>
            {confirming.kind === 'purge' && (
              <div style={{fontSize:11, color:'var(--danger)', marginBottom:12, lineHeight:1.5}}>
                ⚠ This cannot be undone. Files in /output/deleted/ for this doc will be removed immediately.
              </div>
            )}
            {confirming.kind === 'soft' && (
              <div style={{fontSize:11, color:'var(--grey-1)', marginBottom:12, lineHeight:1.5}}>
                Files move to /output/deleted/. You have {ttlHours}h to restore before auto-purge.
              </div>
            )}
            {confirming.kind === 'folder-soft' && (
              <div style={{fontSize:11, color:'var(--danger)', marginBottom:12, lineHeight:1.5}}>
                ⚠ Every file in this folder will be soft-deleted. Saved reports for this contract are also moved to trash. {ttlHours}h to restore.
              </div>
            )}

            <label style={{fontSize:10, letterSpacing:'0.12em', textTransform:'uppercase',
                           color:'var(--grey-2)', fontWeight:600}}>
              Type the {confirming.kind === 'folder-soft' ? 'folder' : 'document'} name to confirm
            </label>
            <input type="text" value={confirmName} autoFocus
                   onChange={e=>setConfirmName(e.target.value)}
                   placeholder={confirming.name}
                   style={{padding:'8px 10px', fontSize:12, marginTop:4, marginBottom:12,
                           background:'var(--bg-2)', color:'var(--grey-0)',
                           border:'1px solid rgba(107,103,98,0.4)', borderRadius:3,
                           outline:'none', width:'100%'}}/>

            <label style={{fontSize:10, letterSpacing:'0.12em', textTransform:'uppercase',
                           color:'var(--grey-2)', fontWeight:600}}>
              Re-enter admin password
            </label>
            <input type="password" value={confirmPw}
                   onChange={e=>setConfirmPw(e.target.value)}
                   placeholder="password"
                   style={{padding:'8px 10px', fontSize:12, marginTop:4, marginBottom:12,
                           background:'var(--bg-2)', color:'var(--grey-0)',
                           border:'1px solid rgba(107,103,98,0.4)', borderRadius:3,
                           outline:'none', fontFamily:'monospace', width:'100%'}}/>

            {actionErr && <div style={{color:'var(--danger)', fontSize:11, marginBottom:10}}>{actionErr}</div>}

            <div style={{display:'flex', gap:8, justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={cancelConfirm} disabled={busy}>Cancel</button>
              <button className="btn btn-primary" onClick={runConfirm}
                disabled={busy || !confirmName || !confirmPw
                         || confirmName !== confirming.name || confirmPw !== pw}
                style={{
                  background: confirming.kind === 'restore' ? 'var(--ok)' : 'var(--danger)',
                  borderColor: confirming.kind === 'restore' ? 'var(--ok)' : 'var(--danger)',
                }}>
                {busy ? 'Working…' : (
                  confirming.kind === 'soft' ? 'Delete' :
                  confirming.kind === 'restore' ? 'Restore' : 'Purge permanently'
                )}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


/* ── Admin sidebar entry ─────────────────────────────────────────────────────
   Password is required ONCE — at the moment Admin is expanded. After that the
   4 sub-items render directly and all admin pages work with the regular JWT.
   State persists in memory only — refresh or click 🔒 Lock to require it again.
*/
function AdminNav({ page, setPage, adminUnlocked, onAdminUnlock, onAdminLock }) {
  const [pwInput, setPwInput] = useState("");
  const [busy,    setBusy]    = useState(false);
  const [err,     setErr]     = useState("");
  // Local "show pw input" toggle — used only when locked, to expand the input row
  const [showPw,  setShowPw]  = useState(false);

  const tryUnlock = async () => {
    if (!pwInput) return;
    setBusy(true); setErr("");
    try {
      const r = await apiFetch("/admin/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: pwInput }),
      });
      if (r.ok) { onAdminUnlock(); setPwInput(""); setShowPw(false); }
      else      { const d = await r.json().catch(()=>({})); setErr(d.detail || "Access denied"); }
    } catch { setErr("Cannot reach server"); }
    setBusy(false);
  };

  const onAdminClick = () => {
    if (adminUnlocked) return;       // already open — nothing to do
    setShowPw(s => !s);              // toggle the password input row
  };

  const subs = [
    { id: "compactor-admin", label: "Compactor" },
    { id: "deletion",        label: "Deletion" },
    { id: "user-registry",   label: "Users" },
    { id: "live-logs",       label: "Live logs" },
  ];

  return (<>
    <div className={`nav-item ${adminUnlocked?'active':''}`} onClick={onAdminClick}>
      <span className="nav-icon"><Icon.Settings /></span>
      <span>Admin</span>
      <span style={{marginLeft:'auto',fontSize:10,color:'var(--gold)'}}>
        {adminUnlocked ? '▾' : (showPw ? '▾' : '▸')}
      </span>
    </div>

    {/* Password input — only when locked AND user clicked to expand */}
    {!adminUnlocked && showPw && (
      <div style={{padding:'8px 14px 10px 14px',display:'flex',flexDirection:'column',gap:6}}>
        <input
          type="password" placeholder="Admin password" value={pwInput} autoFocus
          onChange={e=>setPwInput(e.target.value)}
          onKeyDown={e=>{ if (e.key==='Enter') tryUnlock(); }}
          style={{padding:'6px 10px',background:'var(--bg-2)',border:'1px solid var(--border)',
                  borderRadius:3,color:'var(--white)',fontSize:12,fontFamily:'inherit'}}
        />
        <button onClick={tryUnlock} disabled={busy || !pwInput}
          style={{padding:'5px 10px',background:'var(--gold)',color:'#1A1A1B',
                  border:'none',borderRadius:3,cursor:'pointer',fontSize:11,fontWeight:600,
                  opacity:(busy||!pwInput)?0.5:1}}>
          {busy ? "…" : "Unlock"}

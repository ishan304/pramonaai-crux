/* ── PAGE CARD COMPONENT ── */
function PageCard({ pageData, docName, imageUrl, refs }) {
  // refs is [{ citIndex, quote, block_id, clause }] — one entry per citation on this page.
  // Legacy single-ref mode (_blockId/_quote on pageData) is still honoured if refs absent.
  const refList = refs && refs.length
    ? refs
    : (pageData?._quote || pageData?._blockId
        ? [{ citIndex: null, quote: pageData._quote || '', block_id: pageData._blockId || null, clause: '' }]
        : []);

  const computeHighlight = (quote, blockId) => {
    const blocks = pageData?.blocks || [];
    const candidates = blocks.filter(b =>
      (blockId && b.block_id === blockId) ||
      (quote && b.content && b.content.toLowerCase().includes(quote.substring(0, 40).toLowerCase()))
    );
    const highlightBlock = candidates.sort((a,b) => (a.height||1) - (b.height||1))[0] || null;
    if (!highlightBlock) return { block: null, strip: null };

    let strip = null;
    if (quote && highlightBlock.content) {
      const content = highlightBlock.content;
      const qNeedle = quote.substring(0, Math.min(60, quote.length)).toLowerCase();
      const hit = content.toLowerCase().indexOf(qNeedle);
      if (hit >= 0) {
        const lines = content.split(/\r?\n/);
        if (lines.length > 1) {
          let cursor = 0, startLine = 0, endLine = 0;
          for (let li = 0; li < lines.length; li++) {
            const lineLen = lines[li].length + 1;
            if (cursor <= hit && hit < cursor + lineLen) startLine = li;
            if (cursor <= hit + qNeedle.length && hit + qNeedle.length <= cursor + lineLen) endLine = li;
            cursor += lineLen;
          }
          if (endLine < startLine) endLine = startLine;
          const total = lines.length;
          strip = {
            left: highlightBlock.left || 0,
            top: (highlightBlock.top || 0) + (startLine / total) * (highlightBlock.height || 0),
            width: highlightBlock.width || 0,
            height: Math.max(1 / total, (endLine - startLine + 1) / total) * (highlightBlock.height || 0),
          };
        } else {
          const approxLineCount = Math.max(1, Math.ceil(content.length / 80));
          if (approxLineCount > 1) {
            strip = {
              left: highlightBlock.left || 0,
              top: (highlightBlock.top || 0) + (hit / content.length) * (highlightBlock.height || 0),
              width: highlightBlock.width || 0,
              height: Math.min(0.5, Math.max(1 / approxLineCount, qNeedle.length / content.length)) * (highlightBlock.height || 0),
            };
          }
        }
      }
    }
    return { block: highlightBlock, strip };
  };

  const overlays = refList.map(r => ({ ref: r, ...computeHighlight(r.quote, r.block_id) }));
  const indices  = refList.map(r => r.citIndex).filter(x => x != null);

  return (
    <div className="page-card">
      <div className="page-card-body" style={{padding:0, overflow:'hidden'}}>
        {imageUrl ? (
          <div style={{position:'relative'}}>
            <img src={imageUrl} alt={`Page ${pageData?.page || '?'}`}
                 style={{width:'100%', display:'block'}} />
            {overlays.map((ov, oi) => (
              <React.Fragment key={oi}>
                {ov.block && (
                  <div style={{
                    position:'absolute',
                    left:   `${(ov.block.left   || 0) * 100}%`,
                    top:    `${(ov.block.top    || 0) * 100}%`,
                    width:  `${(ov.block.width  || 0) * 100}%`,
                    height: `${(ov.block.height || 0) * 100}%`,
                    background: ov.strip ? 'rgba(255,235,0,0.10)' : 'rgba(255,235,0,0.30)',
                    border:     ov.strip ? '1px dashed rgba(255,200,0,0.45)' : '2px solid rgba(255,200,0,0.8)',
                    borderRadius: '2px',
                    pointerEvents:'none',
                  }}/>
                )}
                {ov.strip && (
                  <div style={{
                    position:'absolute',
                    left:   `${ov.strip.left * 100}%`,
                    top:    `${ov.strip.top * 100}%`,
                    width:  `${ov.strip.width * 100}%`,
                    height: `${Math.max(ov.strip.height, 0.015) * 100}%`,
                    background:'rgba(255,235,0,0.55)',
                    border:'2px solid rgba(255,170,0,0.95)',
                    borderRadius:'2px',
                    boxShadow:'0 0 0 1px rgba(0,0,0,0.25)',
                    pointerEvents:'none',
                  }}/>
                )}
                {ov.ref.citIndex != null && (ov.block || ov.strip) && (
                  <div style={{
                    position:'absolute',
                    left:  `calc(${((ov.strip || ov.block).left) * 100}% - 8px)`,
                    top:   `calc(${((ov.strip || ov.block).top) * 100}% - 10px)`,
                    minWidth:20, height:20, padding:'0 5px',
                    borderRadius:10, background:'var(--gold)', color:'#000',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontSize:11, fontWeight:800, boxShadow:'0 1px 3px rgba(0,0,0,0.55)',
                    pointerEvents:'none',
                  }}>[{ov.ref.citIndex}]</div>
                )}
              </React.Fragment>
            ))}
            {indices.length > 0 && (
              <div style={{
                position:'absolute', top:8, right:8,
                padding:'2px 8px', borderRadius:4,
                background:'rgba(0,0,0,0.6)', color:'var(--gold)',
                fontSize:10, fontWeight:700, letterSpacing:'0.05em',
                pointerEvents:'none',
              }}>
                cites [{indices.join('], [')}]
              </div>
            )}
          </div>
        ) : (
          <div style={{padding:14, color:'var(--grey-1)', fontSize:12, textAlign:'center', paddingTop:40}}>
            {pageData ? 'Loading page image…' : 'Loading…'}
          </div>
        )}
      </div>
      <div className="page-card-footer">
        CRUX Page {pageData?.page || '?'} — {docName}
        {indices.length > 1 && <span style={{marginLeft:6,opacity:0.6}}>· {indices.length} citations</span>}
      </div>
    </div>
  );
}

/* ── SOURCE PAGE PANEL (right 40%) ── */
function SourcePagePanel({ citations, docIdMap = {} }) {
  const [pageDataMap, setPageDataMap] = useState({});
  const [imageUrlMap, setImageUrlMap] = useState({});
  const [loading, setLoading]         = useState(false);
  const blobUrlsRef = React.useRef([]);

  useEffect(() => {
    // Revoke previous blob URLs to avoid memory leaks
    blobUrlsRef.current.forEach(u => URL.revokeObjectURL(u));
    blobUrlsRef.current = [];
    setImageUrlMap({});
    setPageDataMap({});

    if (!citations || citations.length === 0) return;
    setLoading(true);

    // Group page-data fetches by doc_id
    const toFetch = {};
    citations.forEach(c => {
      if (!toFetch[c.doc_id]) toFetch[c.doc_id] = new Set();
      toFetch[c.doc_id].add(c.page);
    });
    const blockFetch = Promise.all(
      Object.entries(toFetch).map(([docId, pages]) =>
        apiFetch(`/document/${encodeURIComponent(docId)}/pages?pages=${[...pages].join(',')}`)
          .then(r => r.ok ? r.json() : null)
          .then(data => ({ docId, data }))
      )
    );

    // One image fetch per unique (doc_id, page)
    const seen = new Set();
    const imagePairs = citations
      .filter(c => { const k = `${c.doc_id}_${c.page}`; if (seen.has(k)) return false; seen.add(k); return true; })
      .map(c => ({ key: `${c.doc_id}_${c.page}`, docId: c.doc_id, page: c.page }));

    const imageFetch = Promise.all(
      imagePairs.map(({ key, docId, page }) =>
        apiFetch(`/document/${encodeURIComponent(docId)}/page-image/${page}`)
          .then(r => r.ok ? r.blob() : null)
          .then(blob => {
            if (!blob) return { key, url: null };
            const url = URL.createObjectURL(blob);
            blobUrlsRef.current.push(url);
            return { key, url };
          })
          .catch(() => ({ key, url: null }))
      )
    );

    Promise.all([blockFetch, imageFetch]).then(([blockResults, imageResults]) => {
      // Build pageDataMap WITHOUT per-citation sentinels — each PageCard gets its own below
      const pdMap = {};
      blockResults.forEach(({ docId, data }) => {
        if (!data?.pages) return;
        data.pages.forEach(p => {
          pdMap[`${docId}_${p.page}`] = p;
        });
      });
      const imgMap = {};
      imageResults.forEach(({ key, url }) => { imgMap[key] = url; });
      setPageDataMap(pdMap);
      setImageUrlMap(imgMap);
      setLoading(false);
    }).catch(() => setLoading(false));

    return () => { blobUrlsRef.current.forEach(u => URL.revokeObjectURL(u)); blobUrlsRef.current = []; };
  }, [citations]);

  // Group citations by (doc_id, page) — one page card per unique page
  const pageGroups = React.useMemo(() => {
    const map = new Map();
    (citations || []).forEach((c, origIdx) => {
      const key = `${c.doc_id}_${c.page}`;
      if (!map.has(key)) {
        map.set(key, {
          doc_id: c.doc_id,
          doc_label: c.doc_label,
          doc_name: c.doc_name,
          page: c.page,
          refs: [],  // { citIndex, quote, block_id, clause }
        });
      }
      map.get(key).refs.push({
        citIndex: origIdx + 1,
        quote: c.quote || '',
        block_id: c.block_id || null,
        clause: c.clause || '',
      });
    });
    return Array.from(map.values());
  }, [citations]);

  if (loading) return <div className="right-panel-hint">Loading pages…</div>;
  if (!citations || citations.length === 0)
    return <div className="right-panel-hint">Click a point to view source pages</div>;

  return (
    <div>
      {pageGroups.map((grp, gi) => {
        const key     = `${grp.doc_id}_${grp.page}`;
        const docName = docIdMap[grp.doc_id] || grp.doc_name || grp.doc_id;
        return (
          <PageCard
            key={gi}
            pageData={pageDataMap[key]}
            docName={docName}
            imageUrl={imageUrlMap[key] || null}
            refs={grp.refs}
          />
        );
      })}
    </div>
  );
}


/* ── POINT ITEM COMPONENT ── */
function PointItem({ point, isSelected, onClick, onCitationClick }) {
  return (
    <div className={`point-item ${isSelected ? 'selected' : ''}`} onClick={onClick}>
      <div className="point-text">{point.text}</div>
      <div className="citations-row">
        {point.citations && point.citations.map((cit, idx) => (
          <div
            key={idx}
            className="source-pill"
            onClick={(e) => {
              e.stopPropagation();
              onCitationClick && onCitationClick(point.citations);
            }}
          >
            Page {cit.page} — {cit.doc_id}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── CHATBOT PAGE ── */
function ChatbotPage({ docs }) {
  const [contract, setContract]     = useState("");
  const [selectedDocs, setSelectedDocs] = useState([]);
  const [useCompacted, setUseCompacted] = useState({}); // doc_id → bool (legacy)
  const [docSource, setDocSource] = useState({});       // doc_id → "raw" | "compacted"
  const chatSrcFor = (d) => {
    const s = docSource[d.doc_id];
    const hasCompacted = d.compacted || d.gemini_trained;
    if (s === 'compacted' && hasCompacted) return 'compacted';
    if (s === 'raw')                       return 'raw';
    return hasCompacted ? 'compacted' : 'raw';
  };
  const chatTokFor = (d, s) => s === 'compacted'
    ? (d.gemini_tokens || d.compacted_tokens || 0)
    : (d.token_count || 0);
  const [chatModel, setChatModel]   = useState("gemini-pairwise");
  const [chatModelOpen, setChatModelOpen] = useState(false);
  const [chatOpen, setChatOpen]     = useState(false);
  const [messages, setMessages]     = useState([]);
  const [input, setInput]           = useState("");
  const [streaming, setStreaming]   = useState(false);
  const [statusLine, setStatusLine] = useState("");
  const [sessions, setSessions]     = useState(loadSessions);
  const [activeSessionId, setActiveSessionId] = useState(null);
  const [wordMenuOpen, setWordMenuOpen] = useState(false);
  const [hoveredMsgIdx, setHoveredMsgIdx] = useState(null);
  const [copiedMsgIdx, setCopiedMsgIdx]   = useState(null);
  const [showJumpBtn, setShowJumpBtn]     = useState(false);
  const [streamPhase, setStreamPhase]     = useState(''); // 'thinking' | 'output' | ''
  const [selectedCitations, setSelectedCitations] = useState(null);
  const [pointsList, setPointsList] = useState([]);
  const [selectedPointIdx, setSelectedPointIdx] = useState(null);
  const bottomRef      = useRef(null);
  const scrollAreaRef  = useRef(null);
  const abortRef       = useRef(null);
  const streamBufRef   = useRef('');
  const wordMenuRef    = useRef(null);
  useEffect(() => {
    if (!wordMenuOpen) return;
    const handler = (e) => {
      if (wordMenuRef.current && !wordMenuRef.current.contains(e.target)) {
        setWordMenuOpen(false);
      }
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [wordMenuOpen]);

  const contracts = [...new Set(docs.map(d => d.project_name).filter(Boolean))];
  const filteredDocs = contract
    ? docs.filter(d => d.project_name === contract && d.status === "extracted")
    : [];

  const toggleDoc = (docId) =>
    setSelectedDocs(prev => prev.includes(docId) ? prev.filter(id => id !== docId) : [...prev, docId]);

  // Persist messages to session whenever they change
  useEffect(() => {
    if (!activeSessionId || messages.length === 0) return;
    setSessions(prev => {
      const updated = prev.map(s => s.id === activeSessionId ? { ...s, messages, updatedAt: new Date().toISOString() } : s);
      saveSessions(updated);
      return updated;
    });
  }, [messages]);

  // Auto-scroll only if user hasn't scrolled up
  useEffect(() => {
    if (!showJumpBtn) bottomRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  // Parse JSON response from last assistant message
  useEffect(() => {
    const lastAsst = messages.filter(m => m.role === 'assistant').pop();
    if (lastAsst && lastAsst.content && !streaming) {
      let content = lastAsst.content.trim();
      // Strip markdown code fences (```json ... ``` or ``` ... ```)
      content = content.replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/i, '').trim();
      // If still not starting with {, try to extract JSON object substring
      if (!content.startsWith('{')) {
        const match = content.match(/\{[\s\S]*\}/);
        if (match) content = match[0];
      }
      try {
        const parsed = JSON.parse(content);
        if (parsed.points && Array.isArray(parsed.points)) {
          setPointsList(parsed.points);
          setSelectedPointIdx(null);
          setSelectedCitations(null);
        } else {
          setPointsList([]);
        }
      } catch {
        setPointsList([]);
      }
    }
  }, [messages, streaming]);

  const openNewChat = (docIds) => {
    const id = sessionKey(docIds) + "_" + Date.now();
    const docNames = docIds.map(did => docs.find(d => d.doc_id === did)?.name || did);
    const newSession = { id, docIds, docNames, messages: [], createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
    setSessions(prev => { const u = [newSession, ...prev]; saveSessions(u); return u; });
    setActiveSessionId(id);
    setMessages([]);
    setPointsList([]);
    setSelectedCitations(null);
    setSelectedPointIdx(null);
    setChatOpen(true);
  };

  const openExistingSession = (session) => {
    setSelectedDocs(session.docIds);
    setActiveSessionId(session.id);
    setMessages(session.messages);
    setPointsList([]);
    setSelectedCitations(null);
    setSelectedPointIdx(null);
    setChatOpen(true);
  };

  const deleteSession = (id, e) => {
    e.stopPropagation();
    setSessions(prev => { const u = prev.filter(s => s.id !== id); saveSessions(u); return u; });
    if (activeSessionId === id) { setMessages([]); setChatOpen(false); }
  };

  const copyMsg = (idx, content) => {
    copyTextRobust(content).then(ok => {
      if (ok) {
        setCopiedMsgIdx(idx);
        setTimeout(() => setCopiedMsgIdx(null), 1800);
      } else {
        alert("Copy failed — select the text and press Ctrl+C");
      }
    });
  };

  const handleScroll = (e) => {
    const el = e.currentTarget;
    setShowJumpBtn(el.scrollHeight - el.scrollTop - el.clientHeight > 120);
  };

  const jumpToBottom = () => bottomRef.current?.scrollIntoView({ behavior: 'smooth' });

  const msgStats = (content) => {
    const words = content.trim().split(/\s+/).filter(Boolean).length;
    const sections = (content.match(/^#{1,3} /mg) || []).length;
    const tables = (content.match(/\|\s*[-:]+\s*\|/g) || []).length;
    return { words, sections, tables };
  };

  const send = async () => {
    if (!input.trim() || streaming) return;
    const query = input.trim();
    setInput("");
    const history = messages.map(m => ({ role: m.role, content: m.content }));
    const now = new Date().toISOString();
    // Add messages with empty assistant placeholder — spinner shows until streaming ends
    setMessages(prev => [...prev, { role: "user", content: query, timestamp: now }, { role: "assistant", content: "", timestamp: now }]);
    setStreaming(true);
    setStreamPhase('connecting');
    streamBufRef.current = '';
    const controller = new AbortController();
    abortRef.current = controller;
    try {
      const resp = await apiFetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query, doc_names: selectedDocs, model: chatModel, history, use_compacted: useCompacted, doc_source: docSource }),
        signal: controller.signal,
      });
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let lineBuf = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        lineBuf += decoder.decode(value, { stream: true });
        const lines = lineBuf.split("\n");
        lineBuf = lines.pop(); // keep incomplete last line
        for (const line of lines) {
          if (line.startsWith("__STATUS__:")) {
            // ignore old status tokens
          } else if (line === "__STATUS_CLEAR__") {
            // ignore
          } else if (line.startsWith("__PHASE__:")) {
            setStreamPhase(line.slice(10).trim()); // 'thinking' or 'output'
          } else {
            streamBufRef.current += line + "\n";
          }
        }
        // Handle incomplete line if it's a control token
        if (lineBuf.startsWith("__STATUS__:") || lineBuf === "__STATUS_CLEAR__") {
          lineBuf = "";
        } else if (lineBuf.startsWith("__PHASE__:")) {
          setStreamPhase(lineBuf.slice(10).trim());
          lineBuf = "";
        }
      }
      // Flush remaining real content
      if (lineBuf && !lineBuf.startsWith("__")) {
        streamBufRef.current += lineBuf;
      }
      // Set full content in one go — triggers renderMd once, no streaming asterisks
      const finalContent = streamBufRef.current;
      setMessages(prev => {
        const updated = [...prev];
        updated[updated.length - 1] = { ...updated[updated.length - 1], content: finalContent, timestamp: new Date().toISOString() };
        return updated;
      });
    } catch (e) {
      if (e.name === 'AbortError') {
        const partial = streamBufRef.current + "\n\n_— generation stopped by user —_";
        setMessages(prev => { const u=[...prev]; u[u.length-1] = { ...u[u.length-1], content: partial, timestamp: new Date().toISOString() }; return u; });
      } else {
        setMessages(prev => { const u = [...prev]; u[u.length-1] = { role:"assistant", content:"Error: "+e.message }; return u; });
      }
    }
    abortRef.current = null;
    setStreamPhase('');
    setStreaming(false);
  };

  if (!chatOpen) {
    return (
      <div className="main">
        <div className="page-header">
          <div className="page-title">Document Chat</div>
          <div className="page-sub">Select documents and chat with CRUX</div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 290px',gap:20,alignItems:'start'}}>

          {/* ── Left: contract + doc selector ── */}
          <div>
            <div className="card" style={{marginBottom:16}}>
              <div className="card-header"><span className="card-title">Contract</span></div>
              <div className="card-body">
                {contracts.length === 0 ? (
                  <div style={{fontSize:12,color:'var(--grey-2)',padding:'8px 0'}}>
                    No contracts found. Upload documents and assign them to a project first.
                  </div>
                ) : (
                  <select value={contract} onChange={e=>{setContract(e.target.value);setSelectedDocs([]);}}
                    style={{width:'100%',padding:'10px 12px',borderRadius:6,background:'var(--charcoal-3)',
                      border:'1px solid rgba(107,103,98,0.4)',color:'var(--white)',fontSize:13,outline:'none',cursor:'pointer'}}>
                    <option value="">Select contract…</option>
                    {contracts.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                )}
              </div>
            </div>

            {contract && (
              <div className="card" style={{marginBottom:16}}>
                <div className="card-header">
                  <span className="card-title">Documents</span>
                  <span className="tag tag-steel">{filteredDocs.length} available</span>
                </div>
                <div className="card-body">
                  {filteredDocs.length === 0 ? (
                    <div style={{fontSize:12,color:'var(--grey-2)'}}>No extracted documents in this contract yet.</div>
                  ) : filteredDocs.map(doc => {
                    const sel = selectedDocs.includes(doc.doc_id);
                    return (
                      <div key={doc.doc_id} onClick={()=>toggleDoc(doc.doc_id)} style={{
                        display:'flex',alignItems:'center',gap:12,padding:'10px 12px',borderRadius:6,marginBottom:6,
                        background:sel?'rgba(201,151,74,0.08)':'var(--charcoal-3)',
                        border:`1px solid ${sel?'rgba(201,151,74,0.35)':'rgba(107,103,98,0.25)'}`,
                        cursor:'pointer',transition:'all 0.1s',
                      }}>
                        <div style={{
                          width:16,height:16,borderRadius:3,flexShrink:0,
                          border:`2px solid ${sel?'var(--gold)':'rgba(107,103,98,0.5)'}`,
                          background:sel?'var(--gold)':'transparent',
                          display:'flex',alignItems:'center',justifyContent:'center',
                        }}>
                          {sel && <svg viewBox="0 0 10 10" width="10" height="10"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#1A1A1B" strokeWidth="1.5" fill="none"/></svg>}
                        </div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,color:'var(--white)',fontWeight:600}}>{doc.name}</div>
                          <div style={{fontSize:11,color:'var(--grey-2)',marginTop:2}}>
                            {doc.pages||'—'} pages · {doc.text_blocks||0} text blocks · {doc.figures||0} figures · <strong style={{color:'var(--gold)'}}>{(() => { const n = chatTokFor(doc, chatSrcFor(doc)); return n ? (n/1e6).toFixed(2)+'M tokens' : '—'; })()}</strong>
                          </div>
                          {sel && (
                            <div onClick={e=>e.stopPropagation()} style={{display:'flex',gap:6,marginTop:6}}>
                              {(() => { const curSrc = chatSrcFor(doc); return [
                                ['raw','Original',doc.token_count,true],
                                ['compacted','Compacted', doc.gemini_tokens || doc.compacted_tokens, !!(doc.compacted||doc.gemini_trained)],
                              ].map(([key,label,tok,enabled])=>{
                                const active = curSrc === key;
                                const disabled = !enabled;
                                return (
                                  <button key={key} disabled={disabled}
                                    title={disabled ? 'No compacted version yet — run Compact on this doc first' : ''}
                                    onClick={()=>{
                                      if (disabled) return;
                                      setDocSource(p=>({...p,[doc.doc_id]: key}));
                                      setUseCompacted(p=>({...p,[doc.doc_id]: key==='compacted'}));
                                    }} style={{
                                    padding:'3px 10px',borderRadius:4,fontSize:10,
                                    cursor: disabled ? 'not-allowed' : 'pointer',
                                    background: active?'rgba(201,151,74,0.18)':'var(--charcoal-2)',
                                    color: disabled ? 'rgba(107,103,98,0.5)' : (active?'var(--gold)':'var(--grey-2)'),
                                    border:`1px solid ${active?'rgba(201,151,74,0.45)':'rgba(107,103,98,0.3)'}`,
                                    fontWeight:600,letterSpacing:'0.04em',
                                    opacity: disabled ? 0.45 : 1,
                                  }}>
                                    {label} {tok ? `(${(tok/1e6).toFixed(2)}M)` : (enabled ? '' : '—')}
                                  </button>
                                );
                              }); })()}
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {selectedDocs.length > 0 && (() => {
              const totalTokens = filteredDocs.filter(d => selectedDocs.includes(d.doc_id)).reduce((sum, d) => sum + chatTokFor(d, chatSrcFor(d)), 0);
              return (
                <div style={{marginBottom:10}}>
                  <div style={{padding:'8px 12px',borderRadius:6,background:'var(--charcoal-3)',fontSize:11,color:'var(--grey-1)',display:'flex',justifyContent:'space-between'}}>
                    <span>{selectedDocs.length} doc{selectedDocs.length!==1?'s':''} selected</span>
                    <span style={{fontFamily:'monospace',color: totalTokens > 1000000 ? 'var(--danger)' : 'var(--gold)'}}>{(totalTokens/1e6).toFixed(2)}M tokens total</span>
                  </div>
                  {totalTokens > 1000000 && (
                    <div style={{fontSize:10,color:'var(--danger)',marginTop:4,padding:'0 4px'}}>
                      Exceeds Claude 1M context — consider Grok (2M tokens)
                    </div>
                  )}
                </div>
              );
            })()}

            {/* Model selector — categorised dropdown */}
            <div style={{marginBottom:10}}>
              <ModelDropdown
                value={chatModel}
                onChange={setChatModel}
                open={chatModelOpen}
                setOpen={setChatModelOpen}
              />
            </div>

            <button className="btn btn-primary"
              style={{width:'100%',padding:'12px 0',fontSize:13,letterSpacing:'0.1em',
                opacity:selectedDocs.length===0?0.4:1,cursor:selectedDocs.length===0?'not-allowed':'pointer'}}
              disabled={selectedDocs.length===0}
              onClick={()=>openNewChat(selectedDocs)}>
              New Chat ({selectedDocs.length} doc{selectedDocs.length!==1?'s':''})
            </button>
          </div>

          {/* ── Right: chat history ── */}
          <div className="card">
            <div className="card-header">
              <span className="card-title">Chat History</span>
              {sessions.length > 0 && (
                <span className="tag tag-steel">{sessions.length}</span>
              )}
            </div>
            <div className="card-body" style={{padding:'8px 0'}}>
              {sessions.length === 0 ? (
                <div style={{fontSize:12,color:'var(--grey-2)',padding:'8px 16px'}}>No chats yet.</div>
              ) : sessions.map(s => (
                <div key={s.id} onClick={()=>openExistingSession(s)} style={{
                  padding:'10px 16px',cursor:'pointer',borderBottom:'1px solid rgba(107,103,98,0.12)',
                  transition:'background 0.1s',
                }}
                  onMouseEnter={e=>e.currentTarget.style.background='rgba(107,103,98,0.1)'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                >
                  <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:600,color:'var(--white)',
                        overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {s.docNames.join(' + ')}
                      </div>
                      <div style={{fontSize:11,color:'var(--grey-2)',marginTop:2}}>
                        {s.messages.filter(m=>m.role==='user').length} message{s.messages.filter(m=>m.role==='user').length!==1?'s':''} · {new Date(s.updatedAt).toLocaleDateString()}
                      </div>
                      {s.messages.length > 0 && (
                        <div style={{fontSize:11,color:'var(--grey-2)',marginTop:3,
                          overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontStyle:'italic'}}>
                          {s.messages.filter(m=>m.role==='user').slice(-1)[0]?.content?.slice(0,50) || ''}…
                        </div>
                      )}
                    </div>
                    <button onClick={e=>deleteSession(s.id,e)} style={{
                      background:'none',border:'none',color:'var(--grey-2)',cursor:'pointer',
                      fontSize:16,lineHeight:1,padding:'0 2px',flexShrink:0,marginTop:1,
                    }}>×</button>
                  </div>
                </div>
              ))}
            </div>
          </div>

        </div>
      </div>
    );
  }

  const selectedDocNames = selectedDocs.map(id => docs.find(d=>d.doc_id===id)?.name || id);
  const docIdMap = {}; // Build {doc_id → doc_name} map
  selectedDocs.forEach(id => {
    const d = docs.find(x => x.doc_id === id);
    if (d) docIdMap[id] = d.name;
  });
  const ctxStats = selectedDocs.reduce((acc, id) => {
    const d = docs.find(x => x.doc_id === id);
    if (d) { acc.text += d.text_blocks||0; acc.tables += d.tables||0; acc.figures += d.figures||0; acc.pages += d.pages||0; }
    return acc;
  }, { text: 0, tables: 0, figures: 0, pages: 0 });


  return (
    <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden',minHeight:0}}>
      <div style={{padding:'14px 24px',borderBottom:'1px solid rgba(107,103,98,0.2)',display:'flex',alignItems:'center',gap:16,flexShrink:0}}>
        <button className="btn btn-ghost" onClick={()=>setChatOpen(false)}>← Back</button>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--white)'}}>Document Chat · {selectedDocNames.join(' + ')}</div>
          <div style={{fontSize:11,color:'var(--grey-2)',marginTop:2}}>
            {ctxStats.pages} pages · {ctxStats.text.toLocaleString()} text blocks · {ctxStats.tables} tables · {ctxStats.figures} figures · CRUX
          </div>
        </div>
        <button className="btn btn-ghost" onClick={()=>openNewChat(selectedDocs)}
          style={{fontSize:11,padding:'6px 12px'}}>+ New Chat</button>
        {messages.length > 0 && (
          <div ref={wordMenuRef} style={{position:'relative'}}>
            <button className="btn btn-ghost" onClick={()=>setWordMenuOpen(o=>!o)}
              title="Download as Word"
              style={{fontSize:11,padding:'6px 12px',borderColor:'rgba(43,87,154,0.5)',color:'#5B9BD5',display:'flex',alignItems:'center',gap:6}}>
              <svg width="13" height="16" viewBox="0 0 13 16" style={{flexShrink:0}}>
                <rect width="13" height="16" rx="2" fill="#2B579A"/>
                <text x="6.5" y="12.5" textAnchor="middle" fill="white" fontFamily="Arial,sans-serif" fontWeight="bold" fontSize="11">W</text>
              </svg>
              Download as Word
              <svg width="8" height="8" viewBox="0 0 8 8" style={{flexShrink:0,marginLeft:2}}>
                <path d="M1 2.5 L4 5.5 L7 2.5" stroke="currentColor" strokeWidth="1.4" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
            {wordMenuOpen && (
              <div style={{position:'absolute',right:0,top:'calc(100% + 4px)',zIndex:200,
                background:'var(--charcoal-2)',border:'1px solid rgba(107,103,98,0.4)',
                borderRadius:6,overflow:'hidden',minWidth:190,boxShadow:'0 4px 16px rgba(0,0,0,0.4)'}}>
                <button onClick={()=>{exportChatToWord(messages, selectedDocNames.join(' + '), 'all');setWordMenuOpen(false);}}
                  style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 14px',
                    background:'none',border:'none',color:'var(--white)',fontSize:12,cursor:'pointer',textAlign:'left'}}
                  onMouseEnter={e=>e.currentTarget.style.background='rgba(107,103,98,0.2)'}
                  onMouseLeave={e=>e.currentTarget.style.background='none'}>
                  <svg width="13" height="16" viewBox="0 0 13 16"><rect width="13" height="16" rx="2" fill="#2B579A"/><text x="6.5" y="12.5" textAnchor="middle" fill="white" fontFamily="Arial,sans-serif" fontWeight="bold" fontSize="11">W</text></svg>
                  <div>
                    <div style={{fontWeight:600}}>Whole Chat</div>
                    <div style={{fontSize:10,color:'var(--grey-2)',marginTop:1}}>All {messages.filter(m=>m.role==='user').length} Q&amp;As</div>
                  </div>
                </button>
                <div style={{borderTop:'1px solid rgba(107,103,98,0.25)'}}/>
                <button onClick={()=>{exportChatToWord(messages, selectedDocNames.join(' + '), 'last');setWordMenuOpen(false);}}
                  style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 14px',
                    background:'none',border:'none',color:'var(--white)',fontSize:12,cursor:'pointer',textAlign:'left'}}
                  onMouseEnter={e=>e.currentTarget.style.background='rgba(107,103,98,0.2)'}
                  onMouseLeave={e=>e.currentTarget.style.background='none'}>
                  <svg width="13" height="16" viewBox="0 0 13 16"><rect width="13" height="16" rx="2" fill="#2B579A"/><text x="6.5" y="12.5" textAnchor="middle" fill="white" fontFamily="Arial,sans-serif" fontWeight="bold" fontSize="11">W</text></svg>
                  <div>
                    <div style={{fontWeight:600}}>This Response Only</div>
                    <div style={{fontSize:10,color:'var(--grey-2)',marginTop:1}}>Last question &amp; answer</div>
                  </div>
                </button>
              </div>
            )}
          </div>
        )}
      </div>

      <div style={{display:'flex',flex:1,overflow:'hidden',gap:0}}>
        {/* Left 60% - Messages */}
        <div className="split-left" style={{borderRight:'1px solid rgba(107,103,98,0.3)'}}>
          <div ref={scrollAreaRef} onScroll={handleScroll}
               style={{flex:1,overflowY:'auto',padding:'20px 24px',position:'relative'}}>
            {messages.length===0 && (
              <div style={{textAlign:'center',marginTop:60}}>
                <div style={{fontSize:32,marginBottom:12}}>💬</div>
                <div style={{fontSize:15,fontWeight:600,color:'var(--white)',marginBottom:6}}>Ask anything about your documents</div>
                <div style={{fontSize:12,color:'var(--grey-2)'}}>CRUX has full context of the selected documents</div>
              </div>
            )}
            {pointsList.length > 0 ? (
              /* Render structured points */
              <div style={{marginBottom:16}}>
                {pointsList.map((pt, idx) => (
                  <PointItem
                    key={idx}
                    point={pt}
                    isSelected={selectedPointIdx === idx}
                    onClick={() => {
                      setSelectedPointIdx(idx);
                      setSelectedCitations(pt.citations || []);
                    }}
                    onCitationClick={(citations) => {
                      setSelectedCitations(citations);
                      setSelectedPointIdx(null);
                    }}
                  />
                ))}
              </div>
            ) : (
              messages.map((msg,i)=>{
                const isUser = msg.role === 'user';
                const isLast = i === messages.length - 1;
                const isHovered = hoveredMsgIdx === i;
                const isCopied  = copiedMsgIdx  === i;
                const ts = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : null;
                const stats = (!isUser && msg.content && !streaming) ? msgStats(msg.content) : null;
                return (
                  <div key={i} style={{marginBottom:16,display:'flex',flexDirection:'column',alignItems:isUser?'flex-end':'flex-start'}}
                       onMouseEnter={()=>setHoveredMsgIdx(i)} onMouseLeave={()=>setHoveredMsgIdx(null)}>
                    <div style={{position:'relative',
                      maxWidth: isUser ? '75%' : '90%',
                      padding:'10px 14px',
                      borderRadius:isUser?'12px 12px 2px 12px':'12px 12px 12px 2px',
                      background:isUser?'rgba(212,162,76,0.15)':'var(--charcoal-3)',
                      border:`1px solid ${isUser?'rgba(212,162,76,0.35)':'rgba(107,103,98,0.35)'}`,
                      fontSize:13,lineHeight:1.6,
                    }}>
                      {!isUser && msg.content && isHovered && (
                        <div style={{position:'absolute',top:6,right:6,display:'flex',gap:4,zIndex:10}}>
                          <button onClick={()=>copyMsg(i, msg.content)} title={isCopied?'Copied!':'Copy response'}
                            style={{padding:'3px 7px',fontSize:10,borderRadius:4,border:'1px solid rgba(107,103,98,0.4)',
                              background:isCopied?'rgba(100,180,100,0.2)':'rgba(107,103,98,0.25)',
                              color:isCopied?'#8fca8f':'var(--grey-1)',cursor:'pointer',lineHeight:1.4}}>
                            {isCopied ? '✓' : '⎘'}
                          </button>
                          <button onClick={()=>exportChatToWord(messages.slice(0,i+1), selectedDocNames.join(' + '), 'last')} title="Download this response as Word"
                            style={{padding:'3px 7px',fontSize:10,borderRadius:4,border:'1px solid rgba(43,87,154,0.5)',
                              background:'rgba(43,87,154,0.15)',color:'#5B9BD5',cursor:'pointer',lineHeight:1.4,fontWeight:700}}>W</button>
                        </div>
                      )}
                      {isUser ? <span style={{color:'var(--white)',whiteSpace:'pre-wrap'}}>{msg.content}</span>
                        : (streaming && isLast ? <div style={{display:'flex',alignItems:'center',gap:10,padding:'6px 2px'}}>
                            <div className="chat-spinner"/><span style={{fontSize:12,color:'var(--grey-2)'}}>
                            {streamPhase === 'thinking' ? 'Thinking deeply…' : streamPhase === 'output' ? 'Writing response…'
                              : /^part(\d+)$/.test(streamPhase) ? `Continuing — part ${streamPhase.replace('part','')}…` : 'Connecting…'}
                            </span></div>
                          : msg.content ? renderMd(msg.content) : null)}
                    </div>
                    <div style={{display:'flex',gap:12,alignItems:'center',marginTop:3,justifyContent:isUser?'flex-end':'flex-start'}}>
                      {ts && <span style={{fontSize:10,color:'var(--grey-2)',opacity:0.6}}>{ts}</span>}
                      {stats && (stats.words > 0) && <span style={{fontSize:10,color:'var(--grey-2)',opacity:0.55}}>
                        ~{stats.words.toLocaleString()} words{stats.sections > 0 ? ` · ${stats.sections} section${stats.sections!==1?'s':''}` : ''}{stats.tables > 0 ? ` · ${stats.tables} table${stats.tables!==1?'s':''}` : ''}</span>}
                    </div>
                  </div>
                );
              })
            )}
            <div ref={bottomRef}/>
            {showJumpBtn && (<button onClick={jumpToBottom}
              style={{position:'sticky',bottom:12,left:'calc(50% - 16px)',zIndex:20,width:32,height:32,borderRadius:'50%',
                border:'1px solid rgba(107,103,98,0.4)',background:'var(--charcoal-2)',color:'var(--grey-1)',fontSize:16,cursor:'pointer',
                display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 8px rgba(0,0,0,0.3)'}}>↓</button>)}
          </div>

          {/* Input area */}
          <div style={{padding:'14px 24px',borderTop:'1px solid rgba(107,103,98,0.2)',display:'flex',gap:10,flexShrink:0}}>
        <input value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()}
          placeholder="Ask a question about these documents…"
          disabled={streaming}
          style={{flex:1,padding:'10px 14px',borderRadius:6,background:'var(--charcoal-3)',
            border:'1px solid rgba(107,103,98,0.4)',color:'var(--white)',fontSize:13,outline:'none',
            opacity:streaming?0.6:1}}
        />
            {streaming ? (
              <button onClick={()=>abortRef.current?.abort()}
                style={{padding:'10px 16px',fontSize:12,fontWeight:700,letterSpacing:'0.05em',
                  color:'#e86a6a',background:'rgba(232,106,106,0.08)',
                  border:'1px solid rgba(232,106,106,0.4)',borderRadius:6,cursor:'pointer',
                  display:'flex',alignItems:'center',gap:7,minWidth:70,justifyContent:'center',
                  transition:'all 0.15s'}}
                onMouseEnter={e=>{e.currentTarget.style.background='rgba(232,106,106,0.18)';}}
                onMouseLeave={e=>{e.currentTarget.style.background='rgba(232,106,106,0.08)';}}>
                ■ Stop
              </button>
            ) : (
              <button className="btn btn-primary" onClick={send} disabled={!input.trim()}
                style={{padding:'10px 16px',fontSize:12,opacity:(!input.trim())?0.5:1,
                  cursor:(!input.trim())?'not-allowed':'pointer',
                  display:'flex',alignItems:'center',gap:7,minWidth:70,justifyContent:'center'}}>
                Send
              </button>
            )}
          </div>
        </div>

        {/* Right 40% - Source Pages */}
        <div className="split-right">
          <SourcePagePanel citations={selectedCitations || []} docIdMap={docIdMap} />
        </div>
      </div>
    </div>
  );
}

/* ── DOCUMENT VIEWER PAGE ── */
function DocumentViewerPage({ docId, docName, hasCompacted, hasGemini, onBack }) {
  const [mode, setMode]         = useState("full");    // "full" | "compacted" | "compare"
  // Backend endpoints still distinguish heuristic vs gemini-cached internally; we
  // always prefer the trained cache when available and hide the distinction from users.
  const preferredSource = hasGemini ? "gemini" : "heuristic";
  const [data, setData]         = useState(null);
  const [compactedMd, setCompactedMd] = useState(null);
  const [compareData, setCompareData] = useState(null);
  const [loading, setLoading]   = useState(true);
  const [error, setError]       = useState("");
  const [activePage, setActivePage] = useState(1);
  const [hideEmpty, setHideEmpty] = useState(false);   // compare mode: hide dropped pages
  const pageRefs = React.useRef({});

  useEffect(() => {
    setLoading(true); setError("");
    const path = mode === "compacted" ? `/document/${encodeURIComponent(docId)}/compacted-view?source=${preferredSource}`
               : mode === "compare"   ? `/document/${encodeURIComponent(docId)}/compare-view?source=${preferredSource}`
               :                        `/document/${encodeURIComponent(docId)}/view`;
    apiFetch(path)
      .then(r => r.ok ? r.json() : r.json().then(d => Promise.reject(d.detail || "Load failed")))
      .then(d => {
        if      (mode === "compacted") { setCompactedMd(d); setData(null);       setCompareData(null); }
        else if (mode === "compare")   { setCompareData(d); setData(null);       setCompactedMd(null); }
        else                           { setData(d);        setCompactedMd(null); setCompareData(null); }
        setLoading(false);
      })
      .catch(e => { setError(String(e)); setLoading(false); });
  }, [docId, mode, preferredSource]);

  const scrollToPage = (p) => {
    setActivePage(p);
    pageRefs.current[p]?.scrollIntoView({ behavior: "smooth", block: "start" });
  };

  const renderTable = (cells) => {
    if (!cells || !cells.length) return null;
    const maxRow = Math.max(...cells.map(c => c.row));
    const maxCol = Math.max(...cells.map(c => c.col));
    const grid = {};
    cells.forEach(c => { grid[`${c.row}-${c.col}`] = c; });
    return (
      <div className="vb-table-wrap">
        <table className="vb-table">
          <tbody>
            {Array.from({length: maxRow}, (_,ri) => (
              <tr key={ri}>
                {Array.from({length: maxCol}, (_,ci) => {
                  const cell = grid[`${ri+1}-${ci+1}`];
                  if (!cell) return null;
                  const Tag = ri === 0 ? "th" : "td";
                  return (
                    <Tag key={ci}
                      rowSpan={cell.row_span > 1 ? cell.row_span : undefined}
                      colSpan={cell.col_span > 1 ? cell.col_span : undefined}>
                      {cell.text || ""}
                    </Tag>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
  };

  const renderBlock = (b, i) => {
    const bt = b.block_type || "";
    const content = b.content || "";

    if (b.type === "figure") {
      const imgUrl = `${API_BASE}/image/${encodeURIComponent(b.block_id)}`;
      return (
        <div key={i} className="vb-figure">
          <div className="vb-badge">Figure</div>
          <img src={imgUrl} alt={`Figure — ${b.block_id}`}
            onError={e => { e.target.style.display='none'; e.target.nextSibling.style.display='block'; }}
          />
          <div className="vb-figure-placeholder" style={{display:'none'}}>
            [Figure image not yet available — run Stage 03]
          </div>
          {content && <div className="vb-figure-caption">{content}</div>}
        </div>
      );
    }

    if (b.type === "table") {
      return (
        <div key={i}>
          <div className="vb-badge">Table</div>
          {renderTable(b.cells)}
        </div>
      );
    }

    if (b.type === "form") {
      const parts = content.split(/::|:/);
      return (
        <div key={i} className="vb-kv">
          <span className="vb-kv-key">{parts[0]?.trim()}</span>
          {parts.length > 1 && <span className="vb-kv-val">{parts.slice(1).join(":").trim()}</span>}
        </div>
      );
    }

    // Text blocks
    if (bt === "LAYOUT_TITLE")          return <div key={i} className="vb-title">{content}</div>;
    if (bt === "LAYOUT_SECTION_HEADER") return <div key={i} className="vb-section-header">{content}</div>;
    if (bt === "LAYOUT_HEADER")         return <div key={i} className="vb-header">{content}</div>;
    if (bt === "LAYOUT_FOOTER")         return <div key={i} className="vb-footer">{content}</div>;
    if (bt === "LAYOUT_LIST")           return <pre key={i} className="vb-list">{content}</pre>;
    if (bt === "LAYOUT_TABLE")          return <div key={i} className="vb-badge" style={{marginBottom:4}}>Table layout block — {content}</div>;
    return <div key={i} className="vb-text">{content}</div>;
  };

  if (loading) return (
    <div className="main" style={{display:'flex',alignItems:'center',justifyContent:'center',flex:1}}>
      <div style={{textAlign:'center',color:'var(--grey-1)'}}>
        <div style={{fontSize:24,marginBottom:12}}>⏳</div>
        <div>Loading extracted content…</div>
      </div>
    </div>
  );

  if (error) return (
    <div className="main" style={{flex:1}}>
      <div style={{padding:'24px'}}>
        <button className="btn btn-ghost" onClick={onBack} style={{marginBottom:16}}>← Back</button>
        <div className="login-error" style={{display:'block'}}>{error}</div>
        <div style={{fontSize:12,color:'var(--grey-1)',marginTop:8}}>
          The document has not been extracted yet. Upload it and run the pipeline first.
        </div>
      </div>
    </div>
  );

  const ModeToggle = () => (hasCompacted || hasGemini) ? (
    <div style={{display:'flex',gap:0,borderRadius:6,overflow:'hidden',border:'1px solid rgba(107,103,98,0.35)'}}>
      {[
        ['full','Original',data?.total_pages ? `${data.total_pages} pages` : '',true],
        ['compacted','Compacted',(mode==='compacted'&&compactedMd?.token_count_estimate) ? `~${(compactedMd.token_count_estimate/1e6).toFixed(2)}M tok` : '',(hasCompacted||hasGemini)],
        ['compare','Compare',compareData ? `${compareData.dropped_pages}/${compareData.total_pages} dropped` : 'side-by-side',(hasCompacted||hasGemini)]
      ].map(([key,label,sub,enabled])=>{
        const active = mode === key;
        const disabled = !enabled;
        return (
          <button key={key} disabled={disabled}
            title={disabled ? (key==='compacted' ? 'Run Compact on this doc first' : '') : ''}
            onClick={()=>{ if (!disabled) setMode(key); }} style={{
            padding:'6px 14px',border:'none',
            cursor: disabled ? 'not-allowed' : 'pointer',transition:'all 0.15s',
            background: active ? 'rgba(201,151,74,0.18)' : 'var(--charcoal-3)',
            color: disabled ? 'rgba(107,103,98,0.5)' : (active ? 'var(--gold)' : 'var(--grey-2)'),
            fontSize:11,fontWeight:600,letterSpacing:'0.04em',
            borderBottom: active ? '2px solid var(--gold)' : '2px solid transparent',
            opacity: disabled ? 0.45 : 1,
          }}>
            {label}{sub ? <span style={{opacity:0.7,fontWeight:400,fontSize:9,marginLeft:6}}>{sub}</span> : null}
          </button>
        );
      })}
    </div>
  ) : null;

  if (mode === "compacted") {
    const modeLabel = "Compacted";
    const modeColor = "var(--gold)";
    return (
      <div className="viewer-layout">
        <div className="viewer-main" style={{width:'100%'}}>
          <div className="viewer-main-header">
            <button className="btn btn-ghost" onClick={onBack}>← Back to Vault</button>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:600,color:'var(--white)'}}>{docName}</div>
              <div style={{fontSize:11,color:'var(--grey-2)'}}>
                <span style={{color:modeColor,fontWeight:600}}>{modeLabel}</span>
                {' · '}{compactedMd ? `${compactedMd.char_count.toLocaleString()} chars` : '—'}
              </div>
            </div>
            <ModeToggle/>
          </div>
          <div className="viewer-main-body" style={{maxWidth:900,margin:'0 auto'}}>
            <pre style={{whiteSpace:'pre-wrap',wordBreak:'break-word',fontSize:13,lineHeight:1.65,
                         color:'var(--grey-1)',fontFamily:'ui-monospace,Menlo,monospace',margin:0}}>
              {compactedMd?.markdown || ''}
            </pre>
          </div>
        </div>
      </div>
    );
  }

  if (mode === "compare") {
    const srcColor = compareData?.comp_source ? 'var(--gold)' : 'var(--grey-2)';
    const srcLabel = compareData?.comp_source ? '✓ Compacted' : '— No compaction';
    const pagesToShow = (compareData?.pages || []).filter(p => !hideEmpty || !p.dropped);
    const savingsPct = compareData && compareData.raw_chars
      ? Math.round(100 * (1 - compareData.comp_chars / compareData.raw_chars))
      : 0;

    return (
      <div className="viewer-layout">
        {/* Left: page index with drop indicators */}
        <div className="viewer-sidebar">
          <div style={{fontSize:9,letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--grey-2)',marginBottom:10,padding:'0 4px'}}>
            Pages
          </div>
          <div style={{fontSize:9,color:'var(--grey-2)',padding:'0 4px',marginBottom:10}}>
            <span style={{color:'#6eb87a'}}>■</span> kept&nbsp;&nbsp;
            <span style={{color:'#e86a6a'}}>■</span> dropped
          </div>
          {(compareData?.pages || []).map(p => (
            <div key={p.page}
              className={`viewer-page-thumb ${activePage===p.page?'active':''}`}
              onClick={()=>scrollToPage(p.page)}
              style={{
                borderLeft: `3px solid ${p.dropped ? '#e86a6a' : '#6eb87a'}`,
                paddingLeft: 6,
              }}>
              <span className="viewer-page-num">{p.page}</span>
              {p.dropped && <span style={{fontSize:9,color:'#e86a6a',marginLeft:4}}>✕</span>}
            </div>
          ))}
        </div>

        <div className="viewer-main">
          <div className="viewer-main-header">
            <button className="btn btn-ghost" onClick={onBack}>← Back to Vault</button>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:600,color:'var(--white)'}}>{docName}</div>
              <div style={{fontSize:11,color:'var(--grey-2)'}}>
                <span style={{color:srcColor,fontWeight:600}}>{srcLabel}</span>
                {compareData && (
                  <>
                    {' · '}
                    {compareData.total_pages} pages &middot;{' '}
                    <span style={{color:'#e86a6a'}}>{compareData.dropped_pages} dropped</span>
                    {' · '}
                    {(compareData.raw_chars/1000).toFixed(0)}K → {(compareData.comp_chars/1000).toFixed(0)}K chars ({savingsPct}% saved)
                  </>
                )}
              </div>
            </div>
            <label style={{fontSize:11,color:'var(--grey-2)',display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}>
              <input type="checkbox" checked={hideEmpty} onChange={e=>setHideEmpty(e.target.checked)}/>
              Hide dropped pages
            </label>
            <ModeToggle/>
          </div>
          <div className="viewer-main-body">
            {/* Column headers */}
            <div style={{
              display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,
              position:'sticky',top:0,zIndex:5,
              background:'var(--charcoal-1)',
              borderBottom:'1px solid rgba(107,103,98,0.3)',
              padding:'10px 0',marginBottom:4,
            }}>
              <div style={{fontSize:10,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--grey-2)',fontWeight:600,paddingLeft:12}}>
                Raw (extracted)
              </div>
              <div style={{fontSize:10,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--gold)',fontWeight:600,paddingLeft:12}}>
                Compacted
              </div>
            </div>

            {pagesToShow.map(p => (
              <div key={p.page} ref={el=>pageRefs.current[p.page]=el}
                className="viewer-page-section"
                onMouseEnter={()=>setActivePage(p.page)}
                style={{
                  border: `1px solid ${p.dropped ? 'rgba(232,106,106,0.25)' : 'rgba(110,184,122,0.15)'}`,
                  borderRadius:6,
                  marginBottom:14,
                  background: p.dropped ? 'rgba(232,106,106,0.04)' : 'transparent',
                }}>
                <div className="viewer-page-header" style={{padding:'8px 12px',background:'rgba(0,0,0,0.2)'}}>
                  Page <span>{p.page}</span> of {compareData.total_pages}
                  {p.dropped && (
                    <span style={{marginLeft:10,fontSize:9,color:'#e86a6a',letterSpacing:'0.12em',textTransform:'uppercase',fontWeight:700}}>
                      ✕ dropped by compactor
                    </span>
                  )}
                  <span style={{marginLeft:'auto',fontSize:9,color:'var(--steel-light)'}}>
                    {p.raw_blocks.length} blocks raw &middot; {p.compacted_md ? `${p.compacted_md.length} chars compacted` : '0 chars compacted'}
                  </span>
                </div>

                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,padding:'10px 12px'}}>
                  <div style={{borderRight:'1px dashed rgba(107,103,98,0.25)',paddingRight:16}}>
                    {p.raw_blocks.map((b,i) => renderBlock(b, i))}
                  </div>
                  <div>
                    {p.compacted_md ? (
                      <pre style={{whiteSpace:'pre-wrap',wordBreak:'break-word',fontSize:12,lineHeight:1.6,
                                   color:'var(--grey-1)',fontFamily:'ui-monospace,Menlo,monospace',margin:0}}>
                        {p.compacted_md}
                      </pre>
                    ) : (
                      <div style={{fontSize:11,color:'#e86a6a',fontStyle:'italic',padding:'8px 0'}}>
                        (this page was dropped — compactor judged it non-decision-relevant)
                      </div>
                    )}
                  </div>
                </div>
              </div>
            ))}

            {pagesToShow.length === 0 && (
              <div style={{textAlign:'center',color:'var(--grey-2)',padding:40}}>
                No pages match the current filter.
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="viewer-layout">
      {/* Page index sidebar */}
      <div className="viewer-sidebar">
        <div style={{fontSize:9,letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--grey-2)',marginBottom:10,padding:'0 4px'}}>
          Pages
        </div>
        {data.pages.map(p => {
          const figs  = p.blocks.filter(b=>b.type==="figure").length;
          const tbls  = p.blocks.filter(b=>b.type==="table").length;
          return (
            <div key={p.page}
              className={`viewer-page-thumb ${activePage===p.page?'active':''}`}
              onClick={()=>scrollToPage(p.page)}>
              <span className="viewer-page-num">{p.page}</span>
              {figs > 0 && <span style={{fontSize:9,color:'var(--steel-light)'}}>🖼 {figs}</span>}
              {tbls > 0 && <span style={{fontSize:9,color:'var(--steel-light)',marginLeft:4}}>📋 {tbls}</span>}
            </div>
          );
        })}
      </div>

      {/* Main content */}
      <div className="viewer-main">
        <div className="viewer-main-header">
          <button className="btn btn-ghost" onClick={onBack}>← Back to Vault</button>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:600,color:'var(--white)'}}>{docName}</div>
            <div style={{fontSize:11,color:'var(--grey-2)'}}>{data.total_pages} page{data.total_pages!==1?'s':''} · Textract extraction</div>
          </div>
          <ModeToggle/>
          <button className="btn btn-ghost"
            style={{fontSize:11,padding:'5px 14px',border:'1px solid rgba(107,103,98,0.3)'}}
            onClick={() => window.print()}>
            ↓ Download PDF
          </button>
        </div>
        <div className="viewer-main-body">

        {data.pages.map(p => (
          <div key={p.page} ref={el=>pageRefs.current[p.page]=el}
            className="viewer-page-section"
            onMouseEnter={()=>setActivePage(p.page)}>
            <div className="viewer-page-header">
              Page <span>{p.page}</span> of {data.total_pages}
              <span style={{marginLeft:'auto',fontSize:9,color:'var(--steel-light)'}}>
                {p.blocks.filter(b=>b.type==="text").length} text ·&nbsp;
                {p.blocks.filter(b=>b.type==="table").length} tables ·&nbsp;
                {p.blocks.filter(b=>b.type==="figure").length} figures ·&nbsp;
                {p.blocks.filter(b=>b.type==="form").length} form fields
              </span>
            </div>
            {p.blocks.map((b,i) => renderBlock(b, i))}
          </div>
        ))}
        </div>
      </div>
    </div>
  );
}

/* ── APP ── */
function App() {
  const [user, setUser]         = useState(localStorage.getItem("crux_username") || null);
  const [page, setPage]         = useState("dashboard");
  const [myDocs, setMyDocs]     = useState([]);
  const [viewDoc, setViewDoc]   = useState(null);   // {doc_id, name}
  const [theme, setTheme]       = useState(localStorage.getItem("crux_theme") || "dark");
  // Admin unlock state — memory-only; cleared on page refresh, logout, or 🔒 Lock click
  const [adminUnlocked, setAdminUnlocked] = useState(false);
  const onAdminUnlock = () => setAdminUnlocked(true);
  const onAdminLock   = () => {
    setAdminUnlocked(false);
    if (["compactor-admin","deletion","user-registry","live-logs"].includes(page)) setPage("dashboard");
  };

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("crux_theme", theme);
  }, [theme]);

  const toggleTheme = () => setTheme(t => t === "dark" ? "light" : "dark");

  const fetchMyDocs = async () => {
    try {
      const r = await apiFetch("/my-documents");
      if (r.ok) { const d = await r.json(); setMyDocs(d.documents || []); }
    } catch {}
  };

  useEffect(() => { if (user) fetchMyDocs(); }, [user]);

  const handleLogin = (username) => { setUser(username); };

  const handleLogout = () => {
    localStorage.removeItem("crux_token");
    localStorage.removeItem("crux_username");
    setUser(null); setMyDocs([]);
    setPage("dashboard");
  };


  if (!user) return <LoginPage onLogin={handleLogin} theme={theme} onToggleTheme={toggleTheme} />;

  return (
    <div id="root" style={{display:'flex',flexDirection:'column',height:'100vh'}}>
      <Topbar user={user} onLogout={handleLogout} onHome={()=>setPage("dashboard")} currentPage={page} theme={theme} onToggleTheme={toggleTheme}/>
      <div className="layout">
        {!viewDoc && <Sidebar page={page} setPage={(p)=>{ setViewDoc(null); setPage(p); }} docCount={myDocs.length} user={user}
                              adminUnlocked={adminUnlocked}
                              onAdminUnlock={onAdminUnlock}
                              onAdminLock={onAdminLock}/>}
        {viewDoc
          ? <DocumentViewerPage docId={viewDoc.doc_id} docName={viewDoc.name}
              hasCompacted={!!viewDoc.compacted}
              hasGemini={!!viewDoc.gemini_trained}
              onBack={()=>{ setViewDoc(null); setPage("vault"); }}/>
          : <>
              {page==="dashboard" && <DashboardPage docs={myDocs} mockDocs={MOCK_DOCS} onSelectDoc={()=>setPage("vault")}/>}
              {page==="vault"     && <VaultPage docs={myDocs} onRefresh={fetchMyDocs}
                                       onView={doc=>setViewDoc(doc)}/>}
              {page==="compare"   && <ConflictsPage/>}
              {page==="chat"      && <ChatbotPage docs={myDocs}/>}
              {page==="compactor"      && <CompactorPage/>}
              {page==="settings"       && <SettingsPage/>}
              {page==="compactor-admin"&& adminUnlocked && <CompactorAdminPage/>}
              {page==="deletion"       && adminUnlocked && <DeletionPage/>}
              {page==="user-registry"  && adminUnlocked && <UserRegistryPage/>}
              {page==="live-logs"      && adminUnlocked && <LiveLogsPage/>}
              {page==="feasibility"    && <FeasibilityPage/>}
              {page==="support-letter" && <LetterReplyPage/>}
              {page==="support-swot"   && <SwotPage/>}
              {page==="support-socsod" && <SocSodPage/>}
            </>
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

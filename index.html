function ConflictsPage() {
  // ── Selection phase ──────────────────────────────────────────────────────────
  const [contracts, setContracts] = useState(null);
  const [loading, setLoading]     = useState(false);
  const [error, setError]         = useState("");
  const [conflictModel, setConflictModel] = useState("gemini-pairwise");
  const [conflictModelOpen, setConflictModelOpen] = useState(false);
  const [conflictCompacted, setConflictCompacted] = useState({}); // doc_id → bool (legacy, kept for back-compat)
  const [conflictSource, setConflictSource] = useState({}); // doc_id → "raw" | "compacted"
  // Default per-doc source: compacted if available, else raw
  const srcFor = (d) => {
    const s = conflictSource[d.doc_id];
    const hasCompacted = d.compacted || d.gemini_trained;
    if (s === 'compacted' && hasCompacted) return 'compacted';
    if (s === 'raw')                       return 'raw';
    return hasCompacted ? 'compacted' : 'raw';
  };
  const tokFor = (d, s) => s === 'compacted'
    ? (d.gemini_tokens || d.compacted_tokens || 0)
    : (d.token_count || 0);
  const [conflictExcluded, setConflictExcluded]   = useState({}); // doc_id → true means EXCLUDED from run
  // contract.name → "off" | "index" | "direct"
  //   off    → text-only run (no drawing context at all)
  //   index  → token-minimal 1-line summary per drawing (recommended; ~25 tok/drawing)
  //   direct → full VL JSON for every engineering drawing inlined (heavy; ~500 tok/drawing)
  // Direct used to be the default but it overflows the model context on real corpora —
  // keeping it as a deliberate choice, not the default.
  const [drawingsMode, setDrawingsMode] = useState({});
  // contract.name → { drawing_count, index_tokens, direct_tokens } — populated lazily.
  const [drawingsSize, setDrawingsSize] = useState({});

  // ── Chat phase ───────────────────────────────────────────────────────────────
  const [selected, setSelected]   = useState(null);   // the active contract
  const [chatOpen, setChatOpen]   = useState(false);
  const loadingHistoryRef         = useRef(false);
  const abortRef                  = useRef(null);
  const [messages, setMessages]   = useState([]);
  const [streaming, setStreaming] = useState(false);
  const [streamPhase, setStreamPhase] = useState('');
  const [reportReady, setReportReady] = useState(false);
  const [input, setInput]         = useState("");
  const [hoveredMsgIdx, setHoveredMsgIdx] = useState(null);
  const [copiedMsgIdx, setCopiedMsgIdx]   = useState(null);
  const [showJumpBtn, setShowJumpBtn]     = useState(false);
  const [wordMenuOpen, setWordMenuOpen]   = useState(false);
  const [totalItems, setTotalItems]       = useState(0);
  const [doneItems,  setDoneItems]        = useState(0);
  const [currentPart, setCurrentPart]    = useState(0);
  const [savedReports, setSavedReports]  = useState({});  // contract.name → [{file,saved_at,total_items}]
  const [historyOpen, setHistoryOpen]    = useState(false);
  const [historyList, setHistoryList]    = useState([]);
  const [editingNote, setEditingNote]    = useState(null);   // "{contract}/{file}" key
  const [noteDraft, setNoteDraft]        = useState("");
  const [logs, setLogs]                  = useState([]);
  const [thinkingLines, setThinkingLines] = useState([]);
  const [selectedCitations, setSelectedCitations] = useState(null);
  const [selectedItemNum, setSelectedItemNum] = useState(null);
  const [citationItems, setCitationItems] = useState([]);
  const logBoxRef                        = useRef(null);
  const thinkBoxRef                      = useRef(null);

  const bottomRef    = useRef(null);
  const scrollAreaRef = useRef(null);
  const streamBufRef  = useRef('');
  const wordMenuRef   = useRef(null);

  // Close word menu on clicks truly outside the menu container.
  useEffect(() => {
    if (!wordMenuOpen) return;
    const handler = (e) => {
      if (wordMenuRef.current && !wordMenuRef.current.contains(e.target)) {
        setWordMenuOpen(false);
      }
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [wordMenuOpen]);

  // Auto-scroll to bottom on new messages — only if user hasn't scrolled up
  useEffect(() => { if (!showJumpBtn) bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [messages]);

  // Parse citations from assistant messages — debounced, only when not streaming
  useEffect(() => {
    if (streaming) return; // skip during streaming to avoid lag
    const lastAssistant = [...messages].reverse().find(m => m.role === 'assistant' && m.content);
    if (lastAssistant) {
      const raw = parseConflictCitations(lastAssistant.content);
      const resolved = resolveCitationDocIds(raw, selected?.docs || []);
      setCitationItems(resolved);
    }
  }, [messages, selected, streaming]);

  // Auto-fire the report when the chat view opens
  useEffect(() => {
    if (chatOpen && messages.length === 0 && !streaming && !loadingHistoryRef.current) {
      fireInitialReport();
    }
    // Reset the flag after the effect runs
    if (chatOpen) loadingHistoryRef.current = false;
  }, [chatOpen]);

  // ── API helpers ──────────────────────────────────────────────────────────────
  const detect = async () => {
    setLoading(true); setError("");
    try {
      const r = await apiFetch("/conflicts/detect", { method:"POST" });
      const d = await r.json();
      if (!r.ok) { setError(d.detail || "Detection failed"); setLoading(false); return; }
      setContracts(d.contracts || []);
      fetchAllHistory(d.contracts || []);
    } catch { setError("Cannot reach server"); }
    setLoading(false);
  };

  // Auto-load contracts on mount (no button click needed)
  useEffect(() => { if (!chatOpen) detect(); }, []);

  // Fetch saved-report summaries for all contracts after detect
  const fetchAllHistory = async (contracts) => {
    const map = {};
    await Promise.all((contracts||[]).map(async c => {
      try {
        const r = await apiFetch(`/conflicts/history/${encodeURIComponent(c.name)}`);
        if (r.ok) { const d = await r.json(); map[c.name] = d.reports || []; }
      } catch {}
    }));
    setSavedReports(map);
  };

  // Save completed report to server
  const saveReport = async (msgs, items, done) => {
    if (!selected) return;
    try {
      const modelMeta = MODEL_FLAT.find(m => m.id === conflictModel);
      // Only save docs that were actually used (mirror the same filter as runStream).
      const usedDocs = (selected.docs || [])
        .filter(d => !conflictExcluded[d.doc_id])
        .map(d => d.name);
      await apiFetch("/conflicts/history/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contract_name: selected.name,
          doc_names: usedDocs,
          messages: msgs.map(m => ({ role:m.role, content:m.content, timestamp:m.timestamp })),
          total_items: items,
          done_items: done,
          model: conflictModel || "",
          title: modelMeta ? modelMeta.label : "",
          strategy: MODEL_CATALOG.find(c => c.models.some(m => m.id === conflictModel))?.name?.split('—')[0]?.trim() || "",
        }),
      });
    } catch {}
  };

  // Load a specific saved report
  const loadSavedReport = async (file) => {
    try {
      const r = await apiFetch(`/conflicts/history/${encodeURIComponent(selected.name)}/${encodeURIComponent(file)}`);
      if (!r.ok) return;
      const d = await r.json();
      setMessages(d.messages || []);
      setTotalItems(d.total_items || 0);
      setDoneItems(d.done_items || 0);
      setReportReady(true);
      setHistoryOpen(false);
    } catch {}
  };

  // Save the user-editable note on a history entry.
  // contractName lets us reuse this for both per-contract and all-contracts views.
  const saveHistoryNote = async (contractName, file, note) => {
    try {
      const r = await apiFetch(
        `/conflicts/history/${encodeURIComponent(contractName)}/${encodeURIComponent(file)}/note`,
        { method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user_note: note }) }
      );
      if (!r.ok) return false;
      // Optimistically update both lists in state.
      setHistoryList(list => list.map(h => h.file === file ? { ...h, user_note: note } : h));
      setSavedReports(s => {
        const next = { ...s };
        if (next[contractName]) {
          next[contractName] = next[contractName].map(h =>
            h.file === file ? { ...h, user_note: note } : h);
        }
        return next;
      });
      setEditingNote(null);
      setNoteDraft("");
      return true;
    } catch { return false; }
  };

  const openAnalysis = (contract) => {
    setSelected(contract);
    setMessages([]);
    setReportReady(false);
    setInput("");
    setLogs([]);
    setThinkingLines([]);
    setTotalItems(0);
    setDoneItems(0);
    setCurrentPart(0);
    streamBufRef.current = '';   // clear any stale buffer from previous run
    setChatOpen(true);
  };

  // Shared streaming core used by both fireInitialReport and send
  const runStream = async (query, history) => {
    const docIds = (selected.docs || [])
      .filter(d => !conflictExcluded[d.doc_id])
      .map(d => d.doc_id);
    streamBufRef.current = '';
    setStreamPhase('connecting');
    setStreaming(true);
    setTotalItems(0);
    setDoneItems(0);
    setCurrentPart(0);
    setLogs([]);
    setThinkingLines([]);
    let doneFrozen = false;  // once __DONE__ received, stop writing to buffer
    const controller = new AbortController();
    abortRef.current = controller;
    try {
      const resp = await apiFetch("/chat", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ query, doc_names: docIds, model: conflictModel, history, mode:"conflicts", use_compacted: conflictCompacted, doc_source: conflictSource, drawings_mode: drawingsMode[selected?.name] || "index" }),
        signal: controller.signal,
      });
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let lineBuf = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        lineBuf += decoder.decode(value, { stream:true });
        const lines = lineBuf.split("\n");
        lineBuf = lines.pop();
        for (const line of lines) {
          if (line.startsWith("__STATUS__:") || line === "__STATUS_CLEAR__") {
            // ignore
          } else if (line.startsWith("__PHASE__:")) {
            const phase = line.slice(10).trim();
            setStreamPhase(phase);
            const pm = phase.match(/^part(\d+)$/);
            if (pm) setCurrentPart(parseInt(pm[1]));
          } else if (line.startsWith("__INDEX_COUNT__:")) {
            setTotalItems(parseInt(line.slice(16).trim()) || 0);
          } else if (line.startsWith("__LOG__:")) {
            const msg = humaniseLogTimes(line.slice(8).trim());
            setLogs(prev => [...prev, msg]);
            setTimeout(() => { if (logBoxRef.current) logBoxRef.current.scrollTop = logBoxRef.current.scrollHeight; }, 30);
          } else if (line.startsWith("__THINKING__:")) {
            const thought = line.slice(13).trim();
            setThinkingLines(prev => {
              const next = [...prev, thought];
              return next.length > 120 ? next.slice(-120) : next;
            });
            setTimeout(() => { if (thinkBoxRef.current) thinkBoxRef.current.scrollTop = thinkBoxRef.current.scrollHeight; }, 20);
          } else if (line.trim() === "__DONE__") {
            doneFrozen = true;  // freeze buffer — ignore everything after this
          } else {
            if (!doneFrozen) {
              streamBufRef.current += line + "\n";
              // Track which item number we're currently writing
              const im = line.match(/^## (\d+)\./);
              if (im) setDoneItems(parseInt(im[1]));
            }
          }
        }
        if (lineBuf.startsWith("__PHASE__:")) {
          const phase = lineBuf.slice(10).trim();
          setStreamPhase(phase);
          const pm = phase.match(/^part(\d+)$/);
          if (pm) setCurrentPart(parseInt(pm[1]));
          lineBuf = "";
        } else if (lineBuf.startsWith("__INDEX_COUNT__:")) {
          setTotalItems(parseInt(lineBuf.slice(16).trim()) || 0);
          lineBuf = "";
        } else if (lineBuf.startsWith("__LOG__:")) {
          const msg = humaniseLogTimes(lineBuf.slice(8).trim());
          setLogs(prev => [...prev, msg]);
          setTimeout(() => { if (logBoxRef.current) logBoxRef.current.scrollTop = logBoxRef.current.scrollHeight; }, 30);
          lineBuf = "";
        } else if (lineBuf.startsWith("__THINKING__:")) {
          const thought = lineBuf.slice(13).trim();
          setThinkingLines(prev => { const n = [...prev, thought]; return n.length > 120 ? n.slice(-120) : n; });
          setTimeout(() => { if (thinkBoxRef.current) thinkBoxRef.current.scrollTop = thinkBoxRef.current.scrollHeight; }, 20);
          lineBuf = "";
        } else if (lineBuf.trim() === "__DONE__") {
          doneFrozen = true;
          lineBuf = "";
        } else if (lineBuf.startsWith("__")) {
          lineBuf = "";
        }
        // Live-update the last message so content streams visibly
        setMessages(prev => {
          if (!prev.length) return prev;
          const u = [...prev];
          u[u.length - 1] = { ...u[u.length - 1], content: streamBufRef.current };
          return u;
        });
      }
      if (lineBuf && !lineBuf.startsWith("__")) streamBufRef.current += lineBuf;
    } catch (e) {
      if (e.name === 'AbortError') {
        streamBufRef.current += "\n\n_— generation stopped by user —_";
      } else {
        streamBufRef.current = "Error: " + e.message;
      }
    }
    abortRef.current = null;
    setStreamPhase('');
    setStreaming(false);
    return streamBufRef.current;
  };

  // Auto-fires on chat open — no user message shown
  const fireInitialReport = async () => {
    const now = new Date().toISOString();
    setMessages([{ role:"assistant", content:"", timestamp:now }]);
    await runStream(CONFLICTS_AUTO_QUERY, []);
    // Do NOT override messages — live updates already have the correct content.
    // Just update the timestamp on the last message.
    setMessages(prev => {
      if (!prev.length) return prev;
      const u = [...prev];
      u[u.length-1] = { ...u[u.length-1], timestamp: new Date().toISOString() };
      // Auto-save the completed report
      saveReport(u, totalItems, doneItems);
      return u;
    });
    setReportReady(true);
  };

  // User follow-up questions
  const send = async () => {
    if (!input.trim() || streaming || !reportReady) return;
    const query = input.trim();
    setInput("");
    const history = messages.map(m => ({ role:m.role, content:m.content }));
    // Prepend the hidden initial query so Claude has full context
    const fullHistory = [
      { role:"user", content: CONFLICTS_AUTO_QUERY },
      ...history,
    ];
    const now = new Date().toISOString();
    setMessages(prev => [
      ...prev,
      { role:"user",      content: query, timestamp: now },
      { role:"assistant", content: "",    timestamp: now },
    ]);
    const content = await runStream(query, fullHistory);
    setMessages(prev => {
      const u = [...prev];
      u[u.length-1] = { ...u[u.length-1], content, timestamp: new Date().toISOString() };
      return u;
    });
  };

  const copyMsg = (idx, content) => {
    copyTextRobust(content).then(ok => {
      if (ok) {
        setCopiedMsgIdx(idx);
        setTimeout(() => setCopiedMsgIdx(null), 1800);
      } else {
        alert("Copy failed — select the text and press Ctrl+C");
      }
    });
  };
  const handleScroll = (e) => {
    const el = e.currentTarget;
    setShowJumpBtn(el.scrollHeight - el.scrollTop - el.clientHeight > 120);
  };
  const jumpToBottom = () => bottomRef.current?.scrollIntoView({ behavior:'smooth' });
  const msgStats = (content) => {
    const words = content.trim().split(/\s+/).filter(Boolean).length;
    const sections = (content.match(/^#{1,3} /mg)||[]).length;
    const tables = (content.match(/\|\s*[-:]+\s*\|/g)||[]).length;
    return { words, sections, tables };
  };
  const contractDocNames = selected
    ? (selected.docs || []).map(d => d.name).join(' · ')
    : '';
  const conflictDocIdMap = {};
  if (selected) (selected.docs || []).forEach(d => { conflictDocIdMap[d.doc_id] = d.name; });

  const handleConflictItemClick = (itemNum, citations) => {
    setSelectedItemNum(itemNum);
    setSelectedCitations(citations);
  };
  const handleConflictCitClick = (citations) => {
    setSelectedCitations(citations);
  };

  // ── Doc status badge ─────────────────────────────────────────────────────────
  const DocStatus = ({ label, name, status, missing }) => (
    <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:6,marginBottom:8,
      background:missing?'rgba(232,23,74,0.06)':'rgba(39,174,96,0.06)',
      border:`1px solid ${missing?'rgba(232,23,74,0.2)':'rgba(39,174,96,0.2)'}`}}>
      <div style={{width:28,height:28,borderRadius:6,flexShrink:0,
        background:missing?'rgba(232,23,74,0.15)':'rgba(39,174,96,0.15)',
        display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>
        {missing?'✗':'✓'}
      </div>
      <div style={{flex:1}}>
        <div style={{fontSize:10,letterSpacing:'0.15em',textTransform:'uppercase',
          color:missing?'var(--danger)':'var(--success)',fontWeight:700,marginBottom:2}}>{label}</div>
        <div style={{fontSize:12,color:missing?'var(--grey-2)':'var(--grey-1)'}}>{missing?'Not uploaded yet':name}</div>
      </div>
      {!missing && <span className="tag tag-ok" style={{fontSize:9}}>{status}</span>}
    </div>
  );

  // ── SELECTION VIEW ────────────────────────────────────────────────────────────
  if (!chatOpen) return (
    <div className="main">
      <div className="page-header">
        <div className="page-header-row">
          <div>
            <div className="page-title">Potential Conflicts</div>
            <div className="page-sub">Select a contract — CRUX will generate a full conflicts report automatically</div>
          </div>
          <button className="btn btn-ghost" onClick={detect} disabled={loading} style={{fontSize:11}}>
            {loading ? "Loading…" : "Refresh"}
          </button>
        </div>
      </div>

      {error && <div className="login-error" style={{marginBottom:16}}>{error}</div>}

      {loading && (
        <div className="card" style={{textAlign:'center',padding:'36px'}}>
          <div style={{fontSize:12,color:'var(--grey-1)'}}>Loading contracts…</div>
        </div>
      )}

      {contracts!==null && !loading && (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16,marginBottom:24}}>
          {contracts.length===0 && (
            <div style={{fontSize:12,color:'var(--grey-1)',gridColumn:'1/-1',padding:'32px 0'}}>
              No contracts found — assign documents to a project in Evidence Vault first.
            </div>
          )}
          {contracts.map((c,i)=>(
            <div key={i} style={{
              background:'var(--charcoal-2)',
              border:`1px solid ${c.ready?'rgba(107,103,98,0.35)':'rgba(232,23,74,0.3)'}`,
              borderRadius:10,padding:'20px',display:'flex',flexDirection:'column',gap:10}}>

              {/* Contract name + doc count */}
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8}}>
                <div style={{fontSize:13,fontWeight:700,color:'var(--white)'}}>{c.name}</div>
                <span style={{fontSize:10,color:'var(--grey-2)',flexShrink:0,marginTop:2}}>
                  {(() => {
                    const included = (c.docs||[]).filter(d => !conflictExcluded[d.doc_id]);
                    const t = included.reduce((s,d) => s + tokFor(d, srcFor(d)), 0);
                    const pieces = [`${included.length}/${c.doc_count} doc${c.doc_count!==1?'s':''}`];
                    if (t > 0) pieces.push(`${(t/1e6).toFixed(2)}M tokens`);
                    return pieces.join(' · ');
                  })()}
                </span>
              </div>

              {/* GS / TS / DRC type badges (only shown if structure has been run) */}
              {c.has_structure && (
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {[['GS','has_gs'],['TS','has_ts'],['DRC','has_drc']].map(([label,key])=>(
                    <span key={label} style={{
                      padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:700,
                      letterSpacing:'0.08em',
                      background: c[key] ? 'rgba(39,174,96,0.15)' : 'rgba(232,23,74,0.1)',
                      color:       c[key] ? 'var(--success)'        : 'var(--danger)',
                      border:      `1px solid ${c[key] ? 'rgba(39,174,96,0.3)' : 'rgba(232,23,74,0.2)'}`,
                    }}>
                      {c[key] ? '✓' : '✗'} {label}
                    </span>
                  ))}
                  {c.section_count > 0 && (
                    <span style={{fontSize:10,color:'var(--grey-2)',alignSelf:'center',marginLeft:2}}>
                      {c.section_count} section{c.section_count!==1?'s':''}
                    </span>
                  )}
                </div>
              )}

              {/* Document list */}
              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                {(c.docs||[]).map((d,j)=>{
                  const curSrc = srcFor(d);
                  const shownTok = tokFor(d, curSrc);
                  const excluded = !!conflictExcluded[d.doc_id];
                  const toggleExcluded = (e) => {
                    e.stopPropagation();
                    setConflictExcluded(p => ({...p, [d.doc_id]: !p[d.doc_id]}));
                  };
                  return (
                  <div key={j} style={{display:'flex',flexDirection:'column',gap:3,
                    padding:'5px 8px',borderRadius:5,
                    background: excluded ? 'rgba(107,103,98,0.04)' : 'rgba(107,103,98,0.1)',
                    opacity: excluded ? 0.5 : 1,
                    transition:'all 0.15s'}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      {/* Include/exclude checkbox */}
                      <input type="checkbox" checked={!excluded} onClick={toggleExcluded} onChange={()=>{}}
                        title={excluded ? "Include this document in the run" : "Exclude this document from the run"}
                        style={{width:13,height:13,cursor:'pointer',accentColor:'var(--gold)',flexShrink:0}}/>
                      <span style={{width:7,height:7,borderRadius:'50%',flexShrink:0,
                        background:d.status==='extracted'?'var(--success)':'rgba(232,23,74,0.7)'}}>
                      </span>
                      <span style={{fontSize:11,color: excluded ? 'var(--grey-2)' : 'var(--grey-1)',flex:1,
                        overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                        textDecoration: excluded ? 'line-through' : 'none'}}
                        title={d.name}>{d.name}</span>
                      <span style={{fontSize:9,color:'var(--gold)',flexShrink:0,fontFamily:'monospace'}}>
                        {shownTok ? (shownTok/1e6).toFixed(2)+'M' : '—'}
                      </span>
                      <span style={{fontSize:9,color:'var(--grey-2)',flexShrink:0,
                        textTransform:'uppercase',letterSpacing:'0.08em'}}>{d.status}</span>
                    </div>
                    {!excluded && (
                      <div style={{display:'flex',gap:4,marginLeft:29}}>
                        {[
                          ['raw','Original',d.token_count,true],
                          ['compacted','Compacted', d.gemini_tokens || d.compacted_tokens, !!(d.compacted||d.gemini_trained)],
                        ].map(([key,label,tok,enabled])=>{
                          const active = curSrc === key;
                          const disabled = !enabled;
                          return (
                            <button key={key} disabled={disabled}
                              title={disabled ? 'No compacted version yet — run Compact on this doc first' : ''}
                              onClick={(e)=>{
                                e.stopPropagation();
                                if (disabled) return;
                                setConflictSource(p=>({...p,[d.doc_id]: key}));
                                // keep legacy bool in sync for servers that still only read use_compacted
                                setConflictCompacted(p=>({...p,[d.doc_id]: key==='compacted'}));
                              }} style={{
                              padding:'2px 7px',borderRadius:3,fontSize:9,
                              cursor: disabled ? 'not-allowed' : 'pointer',
                              background: active?'rgba(201,151,74,0.18)':'var(--charcoal-2)',
                              color: disabled ? 'rgba(107,103,98,0.5)' : (active?'var(--gold)':'var(--grey-2)'),
                              border:`1px solid ${active?'rgba(201,151,74,0.45)':'rgba(107,103,98,0.3)'}`,
                              fontWeight:600,letterSpacing:'0.04em',
                              opacity: disabled ? 0.45 : 1,
                            }}>
                              {label} {tok ? `(${(tok/1e6).toFixed(2)}M)` : (enabled ? '' : '—')}
                            </button>
                          );
                        })}
                      </div>
                    )}
                  </div>
                  );
                })}
              </div>

              {/* Model selector — categorised dropdown */}
              {c.ready && (
                <div style={{marginTop:4}} onClick={(e)=>e.stopPropagation()}>
                  <ModelDropdown
                    value={conflictModel}
                    onChange={setConflictModel}
                    open={conflictModelOpen}
                    setOpen={setConflictModelOpen}
                  />
                </div>
              )}
              {/* Drawing integration mode — segmented control:
                    Off    → text-only (cheapest)
                    Index  → 1-line summary per drawing (recommended)
                    Direct → full VL JSON inlined (heavy, can overflow context)
                  Estimates fetched from /conflicts/drawing-context-size on demand. */}
              {c.ready && (() => {
                const mode  = drawingsMode[c.name] || 'index';
                const sizes = drawingsSize[c.name];
                const docNames = (c.docs||[]).filter(d=>!conflictExcluded[d.doc_id]).map(d=>d.doc_id);

                const fmtTok = (n) => n == null ? '…'
                  : n >= 1_000_000 ? (n/1_000_000).toFixed(1)+'M'
                  : n >= 1_000     ? (n/1_000).toFixed(n>=10_000?0:1)+'K'
                  : String(n);

                const loadSizes = async () => {
                  if (sizes || !docNames.length) return;
                  try {
                    const r = await apiFetch('/conflicts/drawing-context-size', {
                      method:'POST',
                      headers:{'Content-Type':'application/json'},
                      body: JSON.stringify({ doc_names: docNames }),
                    });
                    if (r.ok) {
                      const d = await r.json();
                      setDrawingsSize(p=>({...p, [c.name]: d}));
                    }
                  } catch(_) {}
                };

                const opts = [
                  { id:'off',    label:'Off',    tok: 0,
                    desc:'Text-only — drawings ignored (cheapest)' },
                  { id:'index',  label:'Index',  tok: sizes?.index_tokens,
                    desc:'1-line summary per drawing + drilldown on demand (recommended)' },
                  { id:'direct', label:'Direct', tok: sizes?.direct_tokens,
                    desc:'Full VL JSON for every drawing inlined — may overflow context' },
                ];

                return (
                  <div onClick={(e)=>e.stopPropagation()}
                    onMouseEnter={loadSizes}
                    style={{marginTop:8}}>
                    {/* Header line */}
                    <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:6}}>
                      <div style={{fontSize:10,color:'var(--gold)',fontWeight:700,letterSpacing:'0.07em'}}>
                        DRAWING INTEGRATION
                      </div>
                      <div style={{fontSize:10,color:'var(--grey-2)'}}>
                        {sizes?.drawing_count != null
                          ? `${sizes.drawing_count} drawing${sizes.drawing_count===1?'':'s'} in scope`
                          : 'hover to estimate'}
                      </div>
                    </div>
                    {/* 3-way segmented control */}
                    <div style={{
                      display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:0,
                      borderRadius:6,overflow:'hidden',
                      border:'1px solid rgba(107,103,98,0.35)',
                      background:'var(--charcoal-2)',
                    }}>
                      {opts.map((o, idx) => {
                        const active = mode === o.id;
                        const overflow = o.id === 'direct' && o.tok && o.tok > 200_000;
                        return (
                          <button key={o.id}
                            onClick={(e)=>{
                              e.stopPropagation();
                              setDrawingsMode(p=>({...p, [c.name]: o.id}));
                            }}
                            title={o.desc + (overflow ? `  ⚠ ${fmtTok(o.tok)} tokens — likely too large` : '')}
                            style={{
                              padding:'8px 6px',
                              border:'none',
                              borderLeft: idx===0 ? 'none' : '1px solid rgba(107,103,98,0.35)',
                              background: active ? 'rgba(201,151,74,0.18)' : 'transparent',
                              color: active ? 'var(--gold)' : 'var(--grey-1)',
                              cursor:'pointer',
                              transition:'all 120ms ease',
                              display:'flex',flexDirection:'column',alignItems:'center',gap:2,
                            }}>
                            <span style={{fontSize:11,fontWeight:active?700:500}}>
                              {o.label}
                            </span>
                            <span style={{fontSize:9,
                              color: overflow ? 'var(--danger)' : (active ? 'var(--gold)' : 'var(--grey-2)'),
                              opacity: active ? 1 : 0.85,
                              fontVariantNumeric:'tabular-nums',
                            }}>
                              {o.id === 'off'
                                ? 'no drawings'
                                : (o.tok != null ? `~${fmtTok(o.tok)} tok` : '~? tok')}
                            </span>
                          </button>
                        );
                      })}
                    </div>
                    {/* Inline caption for the active mode */}
                    <div style={{fontSize:10,color:'var(--grey-2)',marginTop:6,minHeight:14,lineHeight:1.3}}>
                      {opts.find(o=>o.id===mode)?.desc}
                      {mode==='direct' && sizes?.direct_tokens > 200_000 && (
                        <span style={{color:'var(--danger)',marginLeft:6}}>
                          ⚠ {fmtTok(sizes.direct_tokens)} tokens — may overflow the 1M context window
                        </span>
                      )}
                    </div>
                  </div>
                );
              })()}
              {c.ready ? (() => {
                const includedCount = (c.docs||[]).filter(d => !conflictExcluded[d.doc_id]).length;
                const disabled = includedCount === 0;
                return (
                  <button className="btn btn-primary"
                    style={{width:'100%',padding:'10px',marginTop:6,
                      opacity: disabled ? 0.4 : 1,
                      cursor: disabled ? 'not-allowed' : 'pointer'}}
                    disabled={disabled}
                    onClick={()=>openAnalysis(c)}>
                    {disabled ? 'Select at least one document' : `Run New Analysis (${includedCount} doc${includedCount!==1?'s':''})`}
                  </button>
                );
              })() : (
                <div style={{padding:'8px 12px',borderRadius:6,fontSize:11,
                  background:'rgba(232,23,74,0.06)',color:'var(--danger)',
                  border:'1px solid rgba(232,23,74,0.2)',textAlign:'center'}}>
                  No extracted documents yet — wait for processing
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* ── Report History ── */}
      {(() => {
        const allReports = Object.entries(savedReports)
          .flatMap(([contractName, reports]) =>
            reports.map(r => ({ ...r, contractName }))
          )
          .sort((a, b) => new Date(b.saved_at) - new Date(a.saved_at));
        if (allReports.length === 0) return null;
        return (
          <div style={{marginTop:8}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:700,color:'var(--gold)',letterSpacing:'0.07em'}}>
                REPORT HISTORY
              </div>
              <div style={{flex:1,height:1,background:'rgba(201,151,74,0.2)'}}/>
              <span style={{fontSize:10,color:'var(--grey-2)'}}>{allReports.length} saved</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {allReports.map((rep, i) => {
                const dt = rep.saved_at ? new Date(rep.saved_at).toLocaleString() : '—';
                const contract = (contracts||[]).find(c => c.name === rep.contractName);
                const modelMeta = rep.model ? MODEL_FLAT.find(m => m.id === rep.model) : null;
                const modelTag = modelMeta ? modelMeta.label : (rep.title || rep.model || '');
                const noteKey = `${rep.contractName}/${rep.file}`;
                const isEditingNote = editingNote === noteKey;
                return (
                  <div key={i} style={{
                    display:'flex',alignItems:'center',gap:14,
                    padding:'10px 16px',borderRadius:8,
                    background:'var(--charcoal-2)',
                    border:'1px solid rgba(107,103,98,0.25)',
                  }}>
                    {/* Gold dot */}
                    <div style={{width:8,height:8,borderRadius:'50%',
                      background:'var(--gold)',flexShrink:0,opacity:0.7}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2,flexWrap:'wrap'}}>
                        <span style={{fontSize:12,fontWeight:600,color:'var(--white)'}}>
                          {rep.contractName}
                        </span>
                        {modelTag && (
                          <span style={{fontSize:9,fontWeight:700,letterSpacing:'0.04em',
                                       color:'var(--gold)',padding:'1px 7px',borderRadius:3,
                                       background:'rgba(201,151,74,0.10)',
                                       border:'1px solid rgba(201,151,74,0.35)',
                                       whiteSpace:'nowrap'}}>{modelTag}</span>
                        )}
                        {rep.strategy && (
                          <span style={{fontSize:9,color:'var(--grey-2)',letterSpacing:'0.04em',
                                       textTransform:'uppercase'}}>{rep.strategy}</span>
                        )}
                        {rep.in_progress && (
                          <span style={{fontSize:9,fontWeight:700,letterSpacing:'0.08em',
                                         color:'var(--gold)',padding:'1px 6px',borderRadius:3,
                                         background:'rgba(201,151,74,0.12)',
                                         border:'1px solid rgba(201,151,74,0.4)'}}>RUNNING</span>
                        )}
                        <span style={{fontSize:10,color:'var(--grey-2)'}}>{dt}</span>
                        {/* User note: click to edit, never overwrites existing data */}
                        {isEditingNote ? (
                          <input autoFocus value={noteDraft}
                                 onChange={e=>setNoteDraft(e.target.value)}
                                 onKeyDown={e=>{
                                   if (e.key==='Enter') saveHistoryNote(rep.contractName, rep.file, noteDraft);
                                   if (e.key==='Escape') { setEditingNote(null); setNoteDraft(""); }
                                 }}
                                 onBlur={()=>saveHistoryNote(rep.contractName, rep.file, noteDraft)}
                                 placeholder="add note…"
                                 style={{flex:'1 1 220px',minWidth:140,padding:'2px 7px',fontSize:11,
                                         background:'var(--charcoal-3)',color:'var(--gold)',
                                         border:'1px solid var(--gold)',borderRadius:3}}/>
                        ) : (
                          <span onClick={()=>{ setEditingNote(noteKey); setNoteDraft(rep.user_note || ""); }}
                                title="Click to add or edit a note. Doesn't change anything else."
                                style={{fontSize:11,fontStyle:'italic',cursor:'text',
                                        color: rep.user_note ? 'var(--white)' : 'var(--grey-2)',
                                        padding:'1px 5px',borderRadius:3,
                                        transition:'background 0.12s'}}
                                onMouseEnter={e=>e.currentTarget.style.background='rgba(201,151,74,0.06)'}
                                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                            {rep.user_note || '+ note'}
                          </span>
                        )}
                      </div>
                      <div style={{fontSize:10,color:'var(--grey-2)'}}>
                        {rep.done_items} of {rep.total_items} items written
                        {rep.doc_names?.length ? ' · ' + rep.doc_names.join(', ') : ''}
                      </div>
                    </div>
                    <button className="btn btn-ghost" style={{fontSize:11,padding:'5px 12px',flexShrink:0}}
                      onClick={()=>{
                        if (contract) {
                          // open the chat view for this contract and load the saved report
                          loadingHistoryRef.current = true;
                          setSelected(contract);
                          setMessages([]);
                          setReportReady(false);
                          setLogs([]); setThinkingLines([]);
                          setTotalItems(rep.total_items||0);
                          setDoneItems(rep.done_items||0);
                          setCurrentPart(0);
                          streamBufRef.current = '';
                          setChatOpen(true);
                          // load after chat opens
                          setTimeout(async () => {
                            const r = await apiFetch(`/conflicts/history/${encodeURIComponent(rep.contractName)}/${encodeURIComponent(rep.file)}`);
                            if (r.ok) {
                              const d = await r.json();
                              setMessages(d.messages || []);
                              setTotalItems(d.total_items || 0);
                              setDoneItems(d.done_items || 0);
                              setReportReady(true);
                            }
                          }, 100);
                        }
                      }}>
                      Open
                    </button>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}
    </div>
  );

  // ── CHAT VIEW ────────────────────────────────────────────────────────────────
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>

      {/* Header */}
      <div style={{padding:'12px 20px',borderBottom:'1px solid rgba(107,103,98,0.2)',
        display:'flex',alignItems:'center',gap:12,flexShrink:0,background:'var(--charcoal-2)'}}>
        <button className="btn btn-ghost" style={{fontSize:11,padding:'5px 10px',flexShrink:0}}
          onClick={()=>{setChatOpen(false);setMessages([]);setReportReady(false);}}>
          ← Back
        </button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--white)',marginBottom:2}}>{selected.name}</div>
          <div style={{fontSize:10,color:'var(--grey-2)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
            {contractDocNames}
          </div>
        </div>
        {/* History button */}
        <button className="btn btn-ghost" onClick={async()=>{
          const r = await apiFetch(`/conflicts/history/${encodeURIComponent(selected.name)}`);
          if(r.ok){ const d=await r.json(); setHistoryList(d.reports||[]); }
          setHistoryOpen(o=>!o);
        }} style={{fontSize:11,padding:'6px 10px',flexShrink:0,display:'flex',alignItems:'center',gap:5}}>
          🕓 History
        </button>

        {/* Word export */}
        {messages.some(m=>m.role==='assistant'&&m.content) && (
          <div ref={wordMenuRef} style={{position:'relative',flexShrink:0}}>
            <button className="btn btn-ghost" onClick={()=>setWordMenuOpen(o=>!o)}
              style={{fontSize:11,padding:'6px 12px',borderColor:'rgba(43,87,154,0.5)',color:'#5B9BD5',
                display:'flex',alignItems:'center',gap:6}}>
              <svg width="13" height="16" viewBox="0 0 13 16"><rect width="13" height="16" rx="2" fill="#2B579A"/>
                <text x="6.5" y="12.5" textAnchor="middle" fill="white" fontFamily="Arial,sans-serif" fontWeight="bold" fontSize="11">W</text>
              </svg>
              Export
              <svg width="8" height="8" viewBox="0 0 8 8"><path d="M1 2.5 L4 5.5 L7 2.5" stroke="currentColor" strokeWidth="1.4" fill="none"/></svg>
            </button>
            {wordMenuOpen && (
              <div style={{position:'absolute',right:0,top:'calc(100% + 4px)',zIndex:200,minWidth:220,
                background:'var(--charcoal-2)',border:'1px solid rgba(107,103,98,0.4)',borderRadius:8,
                boxShadow:'0 8px 24px rgba(0,0,0,0.4)',overflow:'hidden'}}>
                <button onClick={()=>{exportChatToWord(messages,selected.name,'all',citationItems);setWordMenuOpen(false);}}
                  style={{width:'100%',padding:'10px 14px',background:'none',border:'none',color:'var(--grey-1)',
                    fontSize:12,textAlign:'left',cursor:'pointer'}}>
                  Full Report (all Q&As)
                </button>
                <button onClick={()=>{exportChatToWord(messages,selected.name,'last',citationItems);setWordMenuOpen(false);}}
                  style={{width:'100%',padding:'10px 14px',background:'none',border:'none',color:'var(--grey-1)',
                    fontSize:12,textAlign:'left',cursor:'pointer',borderTop:'1px solid rgba(107,103,98,0.2)'}}>
                  This Response Only
                </button>
              </div>
            )}
          </div>
        )}
      </div>

      {/* ── History panel ── */}
      {historyOpen && (
        <div style={{padding:'12px 20px',background:'var(--charcoal-2)',
          borderBottom:'1px solid rgba(107,103,98,0.25)',flexShrink:0,maxHeight:220,overflowY:'auto'}}>
          <div style={{fontSize:11,fontWeight:600,color:'var(--gold)',marginBottom:8,letterSpacing:'0.07em'}}>
            SAVED REPORTS — {selected.name}
          </div>
          {historyList.length === 0 && (
            <div style={{fontSize:11,color:'var(--grey-2)'}}>No saved reports yet.</div>
          )}
          {historyList.map((rep,i)=>{
            const dt = rep.saved_at ? new Date(rep.saved_at).toLocaleString() : '—';
            const modelMeta = rep.model ? MODEL_FLAT.find(m => m.id === rep.model) : null;
            const tag = rep.title || (modelMeta ? modelMeta.label : rep.model) || 'Unknown model';
            const noteKey = `${selected.name}/${rep.file}`;
            const isEditingNote = editingNote === noteKey;
            return (
              <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'7px 10px',
                marginBottom:4,borderRadius:6,background:'rgba(107,103,98,0.1)',
                border:'1px solid rgba(107,103,98,0.2)'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2,flexWrap:'wrap'}}>
                    <span style={{fontSize:10,fontWeight:700,letterSpacing:'0.04em',
                                  color:'var(--gold)',padding:'1px 7px',borderRadius:3,
                                  background:'rgba(201,151,74,0.10)',
                                  border:'1px solid rgba(201,151,74,0.35)',
                                  whiteSpace:'nowrap'}}>{tag}</span>
                    {rep.strategy && (
                      <span style={{fontSize:9,color:'var(--grey-2)',letterSpacing:'0.04em',
                                    textTransform:'uppercase'}}>{rep.strategy}</span>
                    )}
                    <span style={{fontSize:11,color:'var(--white)',fontWeight:500}}>{dt}</span>
                    {/* User note display / edit */}
                    {isEditingNote ? (
                      <input autoFocus value={noteDraft}
                             onChange={e=>setNoteDraft(e.target.value)}
                             onKeyDown={e=>{
                               if (e.key==='Enter') saveHistoryNote(selected.name, rep.file, noteDraft);
                               if (e.key==='Escape') { setEditingNote(null); setNoteDraft(""); }
                             }}
                             onBlur={()=>saveHistoryNote(selected.name, rep.file, noteDraft)}
                             placeholder="add note…"
                             style={{flex:'1 1 200px',minWidth:120,padding:'1px 6px',fontSize:11,
                                     background:'var(--charcoal-3)',color:'var(--gold)',
                                     border:'1px solid var(--gold)',borderRadius:3}}/>
                    ) : (
                      <span onClick={()=>{ setEditingNote(noteKey); setNoteDraft(rep.user_note || ""); }}
                            title="Click to add or edit a note (existing data preserved)"
                            style={{fontSize:11,fontStyle:'italic',cursor:'text',
                                    color: rep.user_note ? 'var(--white)' : 'var(--grey-2)',
                                    padding:'1px 4px',borderRadius:3,
                                    transition:'background 0.12s'}}

              <div style={{display:'flex',gap:12,alignItems:'center',marginTop:3,
                justifyContent:isUser?'flex-end':'center',maxWidth:isUser?'72%':'900px',width:'100%'}}>
                {ts&&<span style={{fontSize:10,color:'var(--grey-2)',opacity:0.6}}>{ts}</span>}
                {stats&&stats.words>0&&(
                  <span style={{fontSize:10,color:'var(--grey-2)',opacity:0.55}}>
                    ~{stats.words.toLocaleString()} words
                    {stats.sections>0?` · ${stats.sections} section${stats.sections!==1?'s':''}`:'' }
                    {stats.tables>0 ?` · ${stats.tables} table${stats.tables!==1?'s':''}`:''}

        <div ref={bottomRef}/>
        {showJumpBtn&&(

            ↓
          </button>

      </div>

      {/* Right panel — Source Pages */}
      <div className="split-right" style={{width:'38%',minWidth:280,borderLeft:'1px solid rgba(107,103,98,0.3)'}}>
        <SourcePagePanel citations={selectedCitations || []} docIdMap={conflictDocIdMap} />
      </div>
      </div>{/* end split layout */}

      {/* Footer input */}
      <div style={{padding:'14px 24px',borderTop:'1px solid rgba(107,103,98,0.2)',flexShrink:0}}>
        {!reportReady ? (
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:6,
            background:'rgba(107,103,98,0.1)',border:'1px solid rgba(107,103,98,0.2)'}}>
            <div className="chat-spinner"/>
            <span style={{fontSize:12,color:'var(--grey-2)'}}>

        ) : (
          <div style={{display:'flex',gap:10,flexDirection:'column'}}>
            <div style={{fontSize:10,color:'var(--grey-2)',letterSpacing:'0.05em'}}>
              ASK ABOUT THIS REPORT — questions outside the report scope will be declined
            </div>
            <div style={{display:'flex',gap:10}}>
              <input value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()}
                placeholder="Ask about a specific conflict or item in the report…"
                disabled={streaming}
                style={{flex:1,padding:'10px 14px',borderRadius:6,background:'var(--charcoal-3)',
                  border:'1px solid rgba(107,103,98,0.4)',color:'var(--white)',fontSize:13,

                    border:'1px solid rgba(232,106,106,0.4)',borderRadius:6,cursor:'pointer',

                    transition:'all 0.15s'}}

                <button className="btn btn-primary" onClick={send} disabled={!input.trim()}
                  style={{padding:'10px 16px',fontSize:12,minWidth:70,display:'flex',

                </button>

        )}
      </div>
    </div>
  );

/* ── UNIVERSAL COMPACTOR PAGE ──
   Runs the 8-step conservative compaction pipeline (c4_universal_compaction.ipynb) with
   a live road-roller progress bar. Backend integration is optional — when no /compact
   endpoint is wired up, it falls back to a visual simulation with reasonable timings.
*/
function CompactorPage() {
  // Eight steps, drawn straight from the notebook's pipeline order.
  // Projected chars savings from the three redundancy reports (GS+TS+DRC combined).
  const STEPS = [
    { n: "STEP 1", name: "JICC legal disclaimer",         classes: "T10 / G10 / C10", est: 2_200   },
    { n: "STEP 2", name: "Running header / footer",       classes: "T4 / G4 / C3",    est: 265_000 },
    { n: "STEP 3", name: "OCR noise + orphan keys",       classes: "T9 / G9 / C8",    est: 65_000  },
    { n: "STEP 4", name: "Empty stamp figure blocks",     classes: "T6 / G6 / C6",    est: 67_000  },
    { n: "STEP 5", name: "Table JSON → pipe rows",        classes: "T1 / G1",         est: 860_000 },
    { n: "STEP 6", name: "Figure flatten + description",  classes: "T5+T3+T7 / G5+G3+G7", est: 533_000 },
    { n: "STEP 7", name: "TOC triple-render → single",    classes: "T8 / G8",         est: 75_000  },
    { n: "STEP 8", name: "Body-form duplicate removal",   classes: "T2 / G2 / C1",    est: 1_000_000 },
  ];
  const DOCS = [
    { id: "GS",  label: "GS",  chars: 1_361_495 },
    { id: "TS",  label: "TS",  chars: 2_754_728 },
    { id: "DRC", label: "DRC", chars: 2_592_816 },
  ];
  const TOTAL_CHARS = DOCS.reduce((a, d) => a + d.chars, 0);
  const BUDGET_TOKENS = 950_000;

  const [running, setRunning]   = useState(false);
  const [done, setDone]         = useState(false);
  const [progress, setProgress] = useState(0);        // 0..100, drives roller position
  const [stepIdx, setStepIdx]   = useState(-1);       // -1 = not started
  const [savings, setSavings]   = useState(0);        // running char savings
  const [docState, setDocState] = useState(
    DOCS.map(d => ({ ...d, compactChars: d.chars, status: "idle" }))
  );
  const timerRef = useRef(null);

  // jagged profile for the "uncompacted" road ahead of the roller — stable for the session
  const roadProfile = useMemo(() => {
    const pts = [];
    const N = 48;
    for (let i = 0; i <= N; i++) {
      const x = (i / N) * 100;
      const y = 30 + Math.sin(i * 1.7) * 8 + Math.cos(i * 3.1) * 5 + (Math.sin(i * 0.9) * 4);
      pts.push([x, y]);
    }
    return pts;
  }, []);

  useEffect(() => () => clearInterval(timerRef.current), []);

  const start = () => {
    if (running) return;
    setRunning(true);
    setDone(false);
    setProgress(0);
    setStepIdx(0);
    setSavings(0);
    setDocState(DOCS.map(d => ({ ...d, compactChars: d.chars, status: "running" })));

    const totalMs    = 14_000;
    const tickMs     = 80;
    const totalTicks = totalMs / tickMs;
    let t = 0;
    const stepEstTotal = STEPS.reduce((a, s) => a + s.est, 0);

    timerRef.current = setInterval(() => {
      t += 1;
      const pct = Math.min(100, (t / totalTicks) * 100);
      setProgress(pct);
      // Which step are we on? Each step's "width" is proportional to its estimated savings.
      let acc = 0, idx = STEPS.length - 1;
      for (let i = 0; i < STEPS.length; i++) {
        acc += STEPS[i].est / stepEstTotal * 100;
        if (pct <= acc) { idx = i; break; }
      }
      setStepIdx(idx);
      const saved = Math.round(stepEstTotal * (pct / 100));
      setSavings(saved);
      // Mirror savings across docs proportional to their raw size
      setDocState(prev => prev.map(d => ({
        ...d,
        compactChars: Math.max(
          Math.round(d.chars * 0.30),
          d.chars - Math.round(saved * (d.chars / TOTAL_CHARS))
        ),
        status: pct >= 100 ? "done" : "running",
      })));
      if (pct >= 100) {
        clearInterval(timerRef.current);
        setRunning(false);
        setDone(true);
        setStepIdx(STEPS.length - 1);
      }
    }, tickMs);
  };

  const reset = () => {
    clearInterval(timerRef.current);
    setRunning(false); setDone(false);
    setProgress(0); setStepIdx(-1); setSavings(0);
    setDocState(DOCS.map(d => ({ ...d, compactChars: d.chars, status: "idle" })));
  };

  // Build the two road paths: ahead (jagged, dark) and behind (smooth, amber)
  const rollerX = progress;     // 0..100 percentage
  const aheadPoints  = roadProfile.filter(([x]) => x >= rollerX);
  const behindPoints = roadProfile.filter(([x]) => x <  rollerX);
  const pathAhead  = aheadPoints.length  ? "M " + aheadPoints.map(([x, y]) => `${x} ${y}`).join(" L ")  : "";
  const pathBehind = behindPoints.length ? "M 0 40 L " + behindPoints.map(([x, y]) => `${x} 40`).join(" L ") : "";
  // Fill polygons for the dirt underneath the road line
  const dirtAhead  = aheadPoints.length  ? `M ${rollerX} 70 L ${rollerX} ${aheadPoints[0][1]} ` + aheadPoints.slice(1).map(([x, y]) => `L ${x} ${y}`).join(" ") + " L 100 70 Z" : "";
  const dirtBehind = behindPoints.length ? `M 0 70 L 0 40 L ${rollerX} 40 L ${rollerX} 70 Z` : "";

  const totalCompactChars  = docState.reduce((a, d) => a + d.compactChars, 0);
  const totalCompactTokens = Math.round(totalCompactChars / 4);
  const budgetDelta        = totalCompactTokens - BUDGET_TOKENS;

  return (
    <div className="main">
      <div className="page-header">
        <div className="page-header-row">
          <div>
            <div className="page-title">Universal Compactor</div>
            <div className="page-sub">
              Eight-step conservative pipeline from <code>c4_universal_compaction.ipynb</code> — applied uniformly to GS, TS, DRC.
              Every <i>shall</i>, numeric, clause reference, and standards reference preserved.
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            {done && <button className="btn btn-ghost" onClick={reset}>Reset</button>}
            <button
              className={`btn ${running ? 'btn-steel' : 'btn-primary'}`}
              onClick={start}
              disabled={running}
              style={running ? {opacity:0.7, cursor:'not-allowed'} : {}}
            >
              {running ? 'Compacting…' : (done ? 'Run Again' : 'Run Compactor')}
            </button>
          </div>
        </div>
      </div>

      {/* ── Road-roller stage ── */}
      <div className="compactor-stage">
        <svg className="compactor-road-svg" viewBox="0 0 100 70" preserveAspectRatio="none">
          {/* dirt fills */}
          {dirtBehind && <path d={dirtBehind} className="compactor-road-dirt-behind" />}
          {dirtAhead  && <path d={dirtAhead}  className="compactor-road-dirt-ahead" />}
          {/* road lines */}
          {pathBehind && <path d={pathBehind} className="compactor-road-behind" />}
          {pathAhead  && <path d={pathAhead}  className="compactor-road-ahead" />}
        </svg>
        <div
          className={`compactor-roller ${running ? 'running' : 'idle'}`}
          style={{ left: `${Math.max(5, Math.min(95, rollerX))}%` }}
        >
          <RoadRollerSprite />
        </div>
        <div className="compactor-dust" style={{ left: `calc(${rollerX}% - 40px)` }} />
      </div>

      <div className="compactor-percent">{progress.toFixed(1)}%</div>
      <div className="compactor-percent-label">
        {!running && !done && 'Ready'}
        {running  && `Step ${stepIdx + 1} of ${STEPS.length} · ${STEPS[stepIdx]?.name || ''}`}
        {done     && 'Compaction complete'}
      </div>

      {/* ── Two-column: steps + per-doc ── */}
      <div style={{display:'grid', gridTemplateColumns:'1.3fr 1fr', gap:20, marginTop:24}}>
        {/* Steps panel */}
        <div className="card">
          <div className="card-header"><div className="card-title">Pipeline Steps</div></div>
          <div className="card-body" style={{padding:14}}>
            {STEPS.map((s, i) => {
              const active = i === stepIdx && running;
              const completed = i < stepIdx || (done && i === stepIdx);
              return (
                <div key={s.n} className={`compactor-step-line ${active ? 'active' : ''} ${completed ? 'done' : ''}`}>
                  <span className="compactor-step-num">{s.n}</span>
                  <span style={{flex:'0 1 auto'}}>
                    <span style={{fontWeight:600}}>{s.name}</span>
                    <span style={{color:'var(--grey-2)', marginLeft:8, fontSize:11}}>· {s.classes}</span>
                  </span>
                  {(completed || active) && (
                    <span className="compactor-step-savings">
                      {completed ? '−' : ''}{s.est.toLocaleString()} chars
                    </span>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* Per-doc panel */}
        <div className="card">
          <div className="card-header"><div className="card-title">Per-Document</div></div>
          <div className="card-body" style={{display:'flex', flexDirection:'column', gap:10}}>
            {docState.map(d => {
              const delta = d.chars - d.compactChars;
              const pct = d.chars > 0 ? (delta / d.chars * 100) : 0;
              return (
                <div key={d.id} className={`compactor-doc-card ${d.status}`}>
                  <span className="compactor-doc-label">{d.label}</span>
                  <div>
                    <div className="compactor-doc-meta">
                      {d.compactChars.toLocaleString()} / {d.chars.toLocaleString()} chars
                    </div>
                    <div className="compactor-doc-meta" style={{color:'var(--bronze-light)'}}>
                      ≈ {Math.round(d.compactChars / 4).toLocaleString()} tokens
                    </div>
                  </div>
                  {delta > 0 && (
                    <span className="compactor-doc-delta">−{pct.toFixed(1)}%</span>
                  )}
                </div>
              );
            })}
            {done && (
              <div style={{
                marginTop:8, padding:'12px 14px',
                background: budgetDelta <= 0 ? 'rgba(39,174,96,0.08)' : 'rgba(232,23,74,0.06)',
                border: `1px solid ${budgetDelta <= 0 ? 'rgba(39,174,96,0.3)' : 'rgba(232,23,74,0.3)'}`,
                borderRadius: 8,
              }}>
                <div style={{fontSize:11, letterSpacing:'0.16em', textTransform:'uppercase', color:'var(--grey-1)', marginBottom:4}}>
                  Opus 4.6 Budget
                </div>
                <div style={{fontSize:14, fontWeight:700, color: budgetDelta <= 0 ? 'var(--success)' : 'var(--danger)'}}>
                  {totalCompactTokens.toLocaleString()} / {BUDGET_TOKENS.toLocaleString()} tokens
                  {budgetDelta <= 0
                    ? <> — {Math.abs(budgetDelta).toLocaleString()} tokens headroom ✓</>
                    : <> — {budgetDelta.toLocaleString()} tokens over ✗</>}
                </div>
                {budgetDelta > 0 && (
                  <div style={{fontSize:11, color:'var(--grey-1)', marginTop:4}}>
                    To close the gap, consider running F1 (fluency filler) and F2 (no-value words) — see notebook closing notes.
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Admin: User registry page (sidebar nav target) ─────────────────────────── */
function UserRegistryPage() {
  const [registry, setRegistry] = useState(null);
  const [err,      setErr]      = useState("");

  const refresh = async () => {
    try {
      const r = await apiFetch("/auth/registry");
      if (r.ok) { setRegistry(await r.json()); setErr(""); }
      else      { setErr(`HTTP ${r.status}`); }
    } catch (e) { setErr(String(e)); }
  };
  useEffect(() => { refresh(); const id = setInterval(refresh, 5000); return () => clearInterval(id); }, []);

  return (
    <div className="main">
      <div className="page-header">
        <div className="page-title">User registry</div>
        <div className="page-sub">
          {registry ? `${registry.approved_count} approved · ${registry.pending_count} pending` : "loading…"}
        </div>
      </div>
      <div style={{maxWidth:720}}>

  const [livePoll, setLivePoll] = useState(true);
  const [err,      setErr]      = useState("");

  useEffect(() => {
    let cancelled = false;
    const tick = async () => {
      if (cancelled) return;
      try {
        const url = "/admin/logs?limit=300" + (logKind ? `&kind=${logKind}` : "");
        const r = await apiFetch(url);
        if (r.ok) {

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRUX by Pramona AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── Rustic Dark Backgrounds ── */
      --charcoal:    #1B1815;
      --charcoal-2:  #232019;
      --charcoal-3:  #2D2922;
      /* ── Rustic Metals ── */
      --steel:       #6B6762;
      --steel-light: #928E88;
      --steel-bright:#A8B0B8;
      --gold:        #C9974A;
      --gold-bright: #D4AB58;
      --gold-dim:    #8B6835;
      /* ── Warm Metal Spectrum ── */
      --copper:      #B87333;
      --copper-light:#C08040;
      --bronze:      #9B7340;
      --bronze-light:#A67C52;
      --amber:       #D4A24C;
      --amber-bright:#E8B84D;
      /* ── Text ── */
      --white:       #F0EDE8;
      --grey-1:      #A09890;
      --grey-2:      #6E6860;
      /* ── Gem Glows ── */
      --ruby:        #E8174A;
      --emerald:     #27AE60;
      --sapphire:    #2980B9;
      --topaz:       #E8920F;
      --amethyst:    #8E44AD;
      /* ── Semantic ── */
      --danger:      #E8174A;
      --success:     #27AE60;
    }

    /* ── LIGHT THEME ── Warm cream + copper inspired ── */
    [data-theme="light"] {
      --charcoal:    #FAF7F2;
      --charcoal-2:  #FFFFFF;
      --charcoal-3:  #F0ECE4;
      --steel:       #B8B2AA;
      --steel-light: #9E9890;
      --steel-bright:#7A756E;
      --gold:        #B8862D;
      --gold-bright: #C9974A;
      --gold-dim:    #A07528;
      --copper:      #A5652A;
      --copper-light:#B87333;
      --bronze:      #8A6530;
      --bronze-light:#9B7340;
      --amber:       #C08A30;
      --amber-bright:#D4A24C;
      --white:       #1B1815;
      --grey-1:      #4A4540;
      --grey-2:      #8A8480;
      --ruby:        #D01040;
      --emerald:     #1E8E4E;
      --sapphire:    #2070A0;
      --topaz:       #CC7F0D;
      --amethyst:    #7A3898;
      --danger:      #D01040;
      --success:     #1E8E4E;
    }
    [data-theme="light"] body {
      background: #FAF7F2;
    }
    [data-theme="light"] .topbar {
      background: #FFFFFF;
      border-bottom-color: rgba(180,170,158,0.4);
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    }
    [data-theme="light"] .sidebar {
      background: #FFFFFF;
      border-right-color: rgba(180,170,158,0.3);
    }
    [data-theme="light"] .card,
    [data-theme="light"] .stat-card,
    [data-theme="light"] .project-card,
    [data-theme="light"] .compare-doc-card {
      background: #FFFFFF;
      border-color: rgba(180,170,158,0.35);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    [data-theme="light"] .project-card:hover {
      border-color: rgba(165,101,42,0.5);
      background: rgba(165,101,42,0.03);
      box-shadow: 0 4px 20px rgba(165,101,42,0.12), 0 2px 8px rgba(0,0,0,0.06);
    }
    [data-theme="light"] .nav-item:hover {
      background: rgba(155,115,64,0.06);
    }
    [data-theme="light"] .nav-item.active {
      background: rgba(165,101,42,0.08);
      border-color: rgba(165,101,42,0.3);
    }
    [data-theme="light"] .btn-ghost {
      color: var(--grey-1);
      border-color: rgba(180,170,158,0.5);
    }
    [data-theme="light"] .btn-ghost:hover {
      border-color: var(--bronze);
      color: var(--white);
    }
    [data-theme="light"] .btn-primary {
      box-shadow: 0 2px 8px rgba(184,134,45,0.25);
    }
    [data-theme="light"] .btn-primary:hover {
      box-shadow: 0 4px 16px rgba(184,134,45,0.35);
    }
    [data-theme="light"] .search-input {
      background: #F0ECE4;
      border-color: rgba(180,170,158,0.5);
      color: #1B1815;
    }
    [data-theme="light"] .search-input:focus {
      border-color: var(--copper);
    }
    [data-theme="light"] .upload-zone {
      border-color: rgba(180,170,158,0.5);
    }
    [data-theme="light"] .upload-zone:hover {
      border-color: var(--copper);
      background: rgba(165,101,42,0.03);
    }
    [data-theme="light"] .login-screen {
      background: #FAF7F2;
    }
    [data-theme="light"] .login-left {
      background: linear-gradient(145deg, #F5F0E8 0%, #EDE8DE 60%, #E8E2D8 100%);
      border-right-color: rgba(180,170,158,0.3);
    }
    [data-theme="light"] .login-left-glow {
      background: radial-gradient(circle, rgba(165,101,42,0.06) 0%, rgba(184,134,45,0.04) 40%, transparent 70%);
    }
    [data-theme="light"] .login-input {
      background: #F0ECE4;
      border-color: rgba(180,170,158,0.5);
      color: #1B1815;
    }
    [data-theme="light"] .login-input:focus {
      border-color: var(--copper);
    }
    [data-theme="light"] .otp-box {
      background: #F0ECE4;
      border-color: rgba(180,170,158,0.5);
      color: #1B1815;
    }
    [data-theme="light"] .otp-box:focus {
      border-color: var(--copper);
    }
    [data-theme="light"] .detail-panel {
      background: #FFFFFF;
      border-left-color: rgba(180,170,158,0.35);
    }
    [data-theme="light"] .finding-item {
      background: #F0ECE4;
      border-color: rgba(180,170,158,0.25);
    }
    [data-theme="light"] .vb-table {
      background: #FFFFFF;
    }
    [data-theme="light"] .vb-table th {
      background: rgba(155,115,64,0.1);
      border-color: rgba(180,170,158,0.3);
    }
    [data-theme="light"] .vb-table td {
      border-color: rgba(180,170,158,0.2);
    }
    [data-theme="light"] .vb-table tr:hover td {
      background: rgba(155,115,64,0.05);
    }
    [data-theme="light"] .vb-figure-placeholder {
      background: #F0ECE4;
      border-color: rgba(180,170,158,0.4);
    }
    [data-theme="light"] .vb-badge {
      background: rgba(180,170,158,0.2);
    }
    [data-theme="light"] .evidence-table th {
      border-bottom-color: rgba(180,170,158,0.4);
    }
    [data-theme="light"] .evidence-table td {
      border-bottom-color: rgba(180,170,158,0.2);
    }
    [data-theme="light"] .evidence-table tr:hover td {
      background: rgba(155,115,64,0.05);
    }
    [data-theme="light"] .crux-block {
      background: rgba(165,101,42,0.04);
      border-color: var(--copper);
    }
    [data-theme="light"] .crux-header {
      background: rgba(165,101,42,0.07);
      border-bottom-color: rgba(165,101,42,0.2);
    }
    [data-theme="light"] .page-card {
      background: #FFFFFF;
      border-color: rgba(180,170,158,0.35);
    }
    [data-theme="light"] .page-card-footer {
      background: #F0ECE4;
    }
    [data-theme="light"] .viewer-sidebar {
      background: #FFFFFF;
      border-right-color: rgba(180,170,158,0.25);
    }
    [data-theme="light"] .viewer-main-header {
      background: #FFFFFF;
      border-bottom-color: rgba(180,170,158,0.25);
    }
    [data-theme="light"] .viewer-page-thumb:hover {
      background: rgba(155,115,64,0.06);
    }
    [data-theme="light"] .viewer-page-thumb.active {
      background: rgba(165,101,42,0.08);
    }
    [data-theme="light"] .point-item:hover {
      background: #F0ECE4;
    }
    [data-theme="light"] .point-item.selected {
      background: rgba(165,101,42,0.06);
    }
    [data-theme="light"] .split-right {
      background: #FAF7F2;
    }
    [data-theme="light"] .source-pill {
      background: rgba(165,101,42,0.08);
      border-color: rgba(165,101,42,0.2);
    }
    [data-theme="light"] .source-pill:hover {
      background: rgba(165,101,42,0.15);
    }
    [data-theme="light"] .tag-warn {
      background: rgba(192,138,48,0.1);
      border-color: rgba(192,138,48,0.3);
    }
    [data-theme="light"] .tag-steel {
      background: rgba(180,170,158,0.2);
      border-color: rgba(180,170,158,0.4);
    }
    [data-theme="light"] .nav-badge {
      background: rgba(180,170,158,0.3);
    }
    [data-theme="light"] .settings-row {
      border-bottom-color: rgba(180,170,158,0.25);
    }
    [data-theme="light"] .sidebar-divider {
      background: rgba(180,170,158,0.3);
    }
    [data-theme="light"] ::-webkit-scrollbar-track {
      background: #F0ECE4;
    }
    [data-theme="light"] ::-webkit-scrollbar-thumb {
      background: rgba(155,115,64,0.3);
    }
    /* Theme toggle button */
    .theme-toggle {
      width: 34px; height: 34px; border-radius: 50%;
      background: transparent; border: 1px solid rgba(107,103,98,0.4);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--grey-1); transition: all 0.2s ease;
    }
    .theme-toggle:hover {
      border-color: var(--copper); color: var(--copper);
      background: rgba(184,115,51,0.06);
    }
    .theme-toggle svg { width: 16px; height: 16px; }

    html, body { height: 100%; background: var(--charcoal); color: var(--white); }
    body { font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.5; overflow: hidden; }
    #root { height: 100vh; display: flex; flex-direction: column; }

    /* ── POP ANIMATIONS ── */
    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.92) translateY(6px); }
      60%  { transform: scale(1.025) translateY(-1px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes popInFast {
      0%   { opacity: 0; transform: scale(0.95); }
      65%  { transform: scale(1.03); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeSlideUp {
      0%   { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes cruxPop {
      0%   { opacity: 0; transform: scale(0.97) translateY(4px); box-shadow: 0 0 0 0 rgba(184,115,51,0); }
      70%  { transform: scale(1.01) translateY(-1px); }
      100% { opacity: 1; transform: scale(1) translateY(0); box-shadow: 0 0 24px rgba(184,115,51,0.12); }
    }
    .pop-card    { animation: popIn 0.38s cubic-bezier(0.34,1.56,0.64,1) both; }
    .pop-fast    { animation: popInFast 0.28s cubic-bezier(0.34,1.56,0.64,1) both; }
    .pop-slide   { animation: fadeSlideUp 0.3s ease both; }
    .pop-crux    { animation: cruxPop 0.42s cubic-bezier(0.34,1.56,0.64,1) both; }

    @keyframes pipelinePulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.45; }
    }
    @keyframes pipelineBar {
      0%   { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    .pipeline-active-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold); flex-shrink: 0;
      animation: pipelinePulse 1.4s ease-in-out infinite;
    }
    .pipeline-bar-track {
      height: 4px; border-radius: 2px; background: rgba(107,103,98,0.25); overflow: hidden;
    }
    .pipeline-bar-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, var(--gold-dim), var(--bronze), var(--copper), var(--gold), var(--amber-bright));
      background-size: 200% 100%;
      animation: pipelineBar 2s linear infinite;
    }
    .d1  { animation-delay: 0.04s; }
    .d2  { animation-delay: 0.08s; }
    .d3  { animation-delay: 0.12s; }
    .d4  { animation-delay: 0.16s; }
    .d5  { animation-delay: 0.20s; }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--charcoal-2); }
    ::-webkit-scrollbar-thumb { background: var(--bronze); border-radius: 3px; }

    /* ── TOPBAR ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      height: 56px; padding: 0 24px;
      background: var(--charcoal-2);
      border-bottom: 1px solid rgba(107,103,98,0.4);
      flex-shrink: 0; z-index: 100;
    }
    .logo-wrap { display: flex; align-items: center; gap: 14px; user-select: none; }
    .logo-mark {
      width: 36px; height: 36px; position: relative; flex-shrink: 0;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .logo-mark svg { width: 100%; height: 100%; }
    .logo-mark:hover { transform: scale(1.1); }
    @keyframes logoPop {
      0%   { transform: scale(1); }
      30%  { transform: scale(0.85) rotate(-8deg); }
      60%  { transform: scale(1.18) rotate(4deg); }
      80%  { transform: scale(0.97) rotate(-1deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    .logo-pop { animation: logoPop 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    .logo-text { display: flex; flex-direction: column; line-height: 1; }
    .logo-crux {
      font-family: 'Cinzel', serif;
      font-weight: 900; font-size: 20px;
      letter-spacing: 0.12em;
      color: var(--white);
    }
    .logo-sub {
      font-family: 'Inter', sans-serif;
      font-weight: 300; font-size: 9px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--grey-1);
      margin-top: 3px;
    }
    .topbar-actions { display: flex; align-items: center; gap: 8px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 6px;
      font-family: 'Inter', sans-serif; font-size: 12px;
      font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; border: none; transition: all 0.15s ease;
      white-space: nowrap;
    }
    .btn-ghost {
      background: transparent; color: var(--grey-1);
      border: 1px solid var(--grey-2);
    }
    .btn-ghost:hover { border-color: var(--bronze); color: var(--white); }
    .btn-primary {
      background: var(--gold); color: var(--charcoal);
      box-shadow: 0 0 0 0 rgba(201,151,74,0);
      transition: all 0.18s ease;
    }
    .btn-primary:hover {
      background: var(--gold-bright); transform: scale(1.03);
      box-shadow: 0 0 14px rgba(201,151,74,0.45);
    }
    .btn:active { transform: scale(0.97); }
    .btn-steel {
      background: var(--steel); color: var(--white);
    }
    .btn-steel:hover { background: var(--steel-light); }
    .btn-copper {
      background: var(--copper); color: var(--charcoal);
      transition: all 0.18s ease;
    }
    .btn-copper:hover {
      background: var(--copper-light); transform: scale(1.03);
      box-shadow: 0 0 14px rgba(184,115,51,0.4);
    }
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 14px; border-radius: 20px;
      background: rgba(82, 183, 136, 0.12);
      border: 1px solid rgba(82, 183, 136, 0.3);
      font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
      color: var(--success); text-transform: uppercase;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes crux-tractor-shimmer { from { transform: translateX(-40px); } to { transform: translateX(400px); } }
    .chat-spinner {
      width: 20px; height: 20px; flex-shrink: 0;
      border: 2.5px solid rgba(184,115,51,0.2);
      border-top-color: var(--copper);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    /* ── LAYOUT ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--charcoal-2);
      border-right: 1px solid rgba(107,103,98,0.3);
      display: flex; flex-direction: column;
      padding: 16px 0; overflow-y: auto;
    }
    .sidebar-section { padding: 0 12px; margin-bottom: 24px; }
    .sidebar-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--grey-2);
      padding: 0 12px; margin-bottom: 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 7px;
      font-size: 13px; font-weight: 500; color: var(--grey-1);
      cursor: pointer; transition: all 0.12s ease;
      border: 1px solid transparent;
    }
    .nav-item:hover { background: rgba(155,115,64,0.08); color: var(--white); }
    .nav-item.active {
      background: rgba(184,115,51,0.1);
      border-color: rgba(184,115,51,0.4);
      color: var(--gold);
      border-left: 3px solid var(--copper);
      box-shadow: 0 0 8px rgba(184,115,51,0.15);
    }
    .nav-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.8; }
    .nav-badge {
      margin-left: auto; font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 10px;
      background: var(--steel); color: var(--white);
    }
    .nav-badge.warn { background: rgba(155,115,64,0.25); color: var(--bronze-light); }
    .sidebar-divider { height: 1px; background: rgba(107,103,98,0.35); margin: 8px 12px 16px; }

    /* ── MAIN ── */
    .main { flex: 1; overflow-y: auto; padding: 28px 32px; }

    /* ── PAGE HEADER ── */
    .page-header { margin-bottom: 28px; }
    .page-title {
      font-family: 'Cinzel', serif;
      font-size: 22px; font-weight: 700;
      letter-spacing: 0.08em; color: var(--white);
      margin-bottom: 6px;
    }
    .page-sub { font-size: 13px; color: var(--grey-1); font-weight: 400; }
    .page-header-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }

    /* ── STATS ROW ── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--charcoal-2);
      border: 1px solid rgba(107,103,98,0.35);
      border-radius: 10px; padding: 20px 22px;
      position: relative; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    .stat-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
    }
    .stat-card.warn::before { background: var(--gold); }
    .stat-card.ok::before { background: var(--success); }
    .stat-card.neutral::before { background: var(--steel); }
    .stat-card.danger::before { background: var(--danger); }
    .stat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--grey-2); margin-bottom: 10px; }
    .stat-value { font-family: 'Cinzel', serif; font-size: 32px; font-weight: 700; color: var(--white); line-height: 1; margin-bottom: 4px; }
    .stat-delta { font-size: 11px; color: var(--grey-1); }
    .stat-delta.up { color: var(--danger); }
    .stat-delta.down { color: var(--success); }

    /* ── SECTION CARD ── */
    .card {
      background: var(--charcoal-2);
      border: 1px solid rgba(107,103,98,0.35);
      border-radius: 10px; margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      transition: box-shadow 0.18s ease;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 22px;
      border-bottom: 1px solid rgba(107,103,98,0.25);
    }
    .card-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--amber);
    }
    .card-body { padding: 22px; }

    /* ── THE CRUX BLOCK ── */
    .crux-block {
      border: 1px solid var(--copper);
      border-radius: 10px;
      background: rgba(184,115,51,0.06);
      margin-bottom: 22px;
      overflow: hidden;
    }
    .crux-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px;
      background: rgba(184,115,51,0.1);
      border-bottom: 1px solid rgba(184,115,51,0.3);
    }
    .crux-icon {
      width: 28px; height: 28px; flex-shrink: 0;
      background: var(--gold); border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }
    .crux-icon svg { width: 16px; height: 16px; }
    .crux-label {
      font-family: 'Cinzel', serif;
      font-size: 13px; font-weight: 700; letter-spacing: 0.14em;
      color: var(--gold); text-transform: uppercase;
    }
    .crux-sublabel { font-size: 10px; color: var(--gold-dim); letter-spacing: 0.08em; font-weight: 400; margin-top: 1px; }
    .crux-body { padding: 18px 20px; }
    .crux-finding {
      font-size: 16px; font-weight: 700; color: var(--white);
      margin-bottom: 8px; letter-spacing: 0.02em;
    }
    .crux-desc { font-size: 13px; color: var(--grey-1); line-height: 1.6; margin-bottom: 14px; }
    .crux-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 20px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    }
    .tag-danger { background: rgba(232,23,74,0.15); border: 1px solid rgba(232,23,74,0.35); color: var(--danger); }
    .tag-warn   { background: rgba(212,162,76,0.15); border: 1px solid rgba(212,162,76,0.35); color: var(--amber); }
    .tag-ok     { background: rgba(39,174,96,0.12); border: 1px solid rgba(39,174,96,0.3);  color: var(--success); }
    .tag-steel  { background: rgba(107,103,98,0.3);  border: 1px solid rgba(107,103,98,0.5);   color: var(--grey-1); }

    /* ── EVIDENCE TABLE ── */
    .evidence-table { width: 100%; border-collapse: collapse; }
    .evidence-table th {
      font-size: 10px; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--grey-2);
      padding: 10px 16px; text-align: left;
      border-bottom: 1px solid rgba(107,103,98,0.3);
    }
    .evidence-table td {
      padding: 14px 16px; font-size: 13px; color: var(--grey-1);
      border-bottom: 1px solid rgba(107,103,98,0.15);
      vertical-align: middle;
    }
    .evidence-table tr:last-child td { border-bottom: none; }
    .evidence-table tr { cursor: pointer; transition: background 0.1s; }
    .evidence-table tr:hover td { background: rgba(107,103,98,0.12); color: var(--white); }
    .evidence-table tr.selected td { background: rgba(184,115,51,0.07); }
    .doc-name { font-weight: 600; color: var(--white); display: flex; align-items: center; gap: 8px; }
    .severity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .sev-critical { background: var(--danger); }
    .sev-high     { background: var(--copper); }
    .sev-medium   { background: #A8A4C0; }
    .sev-clear    { background: var(--success); }
    .progress-bar-wrap { width: 80px; height: 4px; background: var(--charcoal-3); border-radius: 2px; }
    .progress-bar { height: 100%; border-radius: 2px; }

    /* ── DETAIL PANEL ── */
    .detail-panel {
      width: 380px; flex-shrink: 0;
      background: var(--charcoal-2);
      border-left: 1px solid rgba(107,103,98,0.35);
      display: flex; flex-direction: column;
      overflow-y: auto;
    }
    .detail-header {
      padding: 20px 22px 16px;
      border-bottom: 1px solid rgba(107,103,98,0.25);
    }
    .detail-doc-name {
      font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700;
      letter-spacing: 0.06em; color: var(--white); margin-bottom: 4px;
    }
    .detail-meta { font-size: 11px; color: var(--grey-2); }
    .detail-body { padding: 20px 22px; flex: 1; overflow-y: auto; }
    .detail-section { margin-bottom: 24px; }
    .detail-section-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--grey-2); margin-bottom: 10px;
    }
    .finding-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 12px; border-radius: 8px;
      background: var(--charcoal-3);
      border: 1px solid rgba(107,103,98,0.2);
      margin-bottom: 8px;
    }
    .finding-item-icon { width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px; }
    .finding-item-text { flex: 1; }
    .finding-item-title { font-size: 13px; font-weight: 600; color: var(--white); margin-bottom: 3px; }
    .finding-item-sub { font-size: 11px; color: var(--grey-1); line-height: 1.4; }
    .finding-item.critical { border-color: rgba(232,23,74,0.3); background: rgba(232,23,74,0.05); }
    .finding-item.warning  { border-color: rgba(155,115,64,0.25); background: rgba(155,115,64,0.04); }

    /* ── UPLOAD ZONE ── */
    .upload-zone {
      border: 2px dashed rgba(107,103,98,0.5);
      border-radius: 12px; padding: 48px 32px;
      text-align: center; cursor: pointer;
      transition: all 0.2s ease;
    }
    .upload-zone:hover {
      border-color: var(--copper);
      background: rgba(184,115,51,0.03);
    }
    .upload-icon { margin: 0 auto 16px; width: 48px; height: 48px; color: var(--steel-light); }
    .upload-title { font-size: 15px; font-weight: 600; color: var(--white); margin-bottom: 6px; }
    .upload-sub { font-size: 12px; color: var(--grey-1); }
    .upload-formats { margin-top: 16px; display: flex; gap: 8px; justify-content: center; }

    /* ── SEARCH BAR ── */
    .search-wrap { position: relative; }
    .search-input {
      width: 100%; padding: 9px 14px 9px 38px;
      background: var(--charcoal-3);
      border: 1px solid rgba(107,103,98,0.4);
      border-radius: 7px; color: var(--white);
      font-family: 'Inter', sans-serif; font-size: 13px;
      outline: none; transition: border-color 0.15s;
    }
    .search-input::placeholder { color: var(--grey-2); }
    .search-input:focus { border-color: var(--steel-light); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--grey-2); width: 14px; height: 14px; }

    /* ── COMPARE PAGE ── */
    .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .compare-doc-card {
      background: var(--charcoal-3);
      border: 1px solid rgba(107,103,98,0.35);
      border-radius: 10px; padding: 20px;
    }
    .compare-doc-title { font-size: 14px; font-weight: 700; color: var(--white); margin-bottom: 4px; }
    .compare-doc-sub { font-size: 11px; color: var(--grey-1); margin-bottom: 16px; }

    /* ── SETTINGS ── */
    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 1px solid rgba(107,103,98,0.2);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { font-size: 13px; font-weight: 500; color: var(--white); margin-bottom: 3px; }
    .settings-sub { font-size: 11px; color: var(--grey-1); }
    .toggle {
      width: 40px; height: 22px; border-radius: 11px;
      border: none; cursor: pointer; position: relative; transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle::after {
      content: ''; position: absolute; top: 3px; width: 16px; height: 16px;
      border-radius: 50%; background: white; transition: left 0.2s;
    }
    .toggle.on { background: var(--gold); }
    .toggle.on::after { left: 21px; }
    .toggle.off { background: var(--steel); }
    .toggle.off::after { left: 3px; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 64px 32px; }
    .empty-icon { width: 48px; height: 48px; margin: 0 auto 16px; color: var(--steel); }
    .empty-title { font-size: 15px; font-weight: 600; color: var(--grey-1); margin-bottom: 6px; }
    .empty-sub { font-size: 12px; color: var(--grey-2); }

    /* ── CHART PLACEHOLDER ── */
    .chart-placeholder {
      height: 120px; border-radius: 3px;
      background: linear-gradient(135deg, var(--charcoal-3) 0%, rgba(107,103,98,0.1) 100%);
      border: 1px solid rgba(107,103,98,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--grey-2); letter-spacing: 0.1em;
    }
    .mini-bars { display: flex; align-items: flex-end; gap: 4px; height: 60px; padding: 0 24px; }
    .mini-bar {
      flex: 1; border-radius: 2px 2px 0 0;
      transition: opacity 0.2s;
    }
    .mini-bar:hover { opacity: 0.7; }

    /* ── ACTIVITY FEED ── */
    .activity-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(107,103,98,0.15); }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .activity-text { font-size: 12px; color: var(--grey-1); line-height: 1.5; }
    .activity-time { font-size: 10px; color: var(--grey-2); margin-top: 3px; }

    /* ── FIELD/VALUE ── */
    .kv-row { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 1px solid rgba(107,103,98,0.15); }
    .kv-row:last-child { border-bottom: none; }
    .kv-key { font-size: 11px; color: var(--grey-2); font-weight: 500; }
    .kv-val { font-size: 12px; color: var(--white); font-weight: 600; text-align: right; }

    .hidden { display: none !important; }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .gap-4 { gap: 4px; }
    .gap-8 { gap: 8px; }
    .gap-16 { gap: 16px; }
    .mt-8 { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .full-height { height: 100%; }
    .full-layout { display: flex; flex: 1; overflow: hidden; }

    /* ── LOGIN SCREEN ── */
    .login-screen {
      position: fixed; inset: 0;
      background: var(--charcoal);
      display: grid; grid-template-columns: 1fr 1fr;
      z-index: 999;
    }
    @media (max-width: 768px) {
      .login-screen { grid-template-columns: 1fr; }
      .login-left   { display: none !important; }
    }
    /* Left branding panel */
    .login-left {
      background: linear-gradient(145deg, #111113 0%, #1A1A1B 60%, #1e1e22 100%);
      border-right: 1px solid rgba(107,103,98,0.18);
      display: flex; flex-direction: column;
      justify-content: space-between; padding: 52px;
      overflow: hidden; position: relative;
    }
    .login-left-glow {
      position: absolute; width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(184,115,51,0.04) 0%, rgba(201,151,74,0.06) 40%, transparent 70%);
      top: -150px; left: -150px; pointer-events: none;
    }
    .login-left-logo { display: flex; align-items: center; gap: 14px; }
    .login-left-tagline {
      font-size: 30px; font-weight: 700; color: var(--white);
      line-height: 1.25; margin: 52px 0 14px;
    }
    .login-left-tagline span { color: var(--gold); }
    .login-left-sub { font-size: 13px; color: var(--grey-1); line-height: 1.75; margin-bottom: 44px; max-width: 380px; }
    .login-feature { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 22px; }
    .login-feature-icon {
      width: 36px; height: 36px; border-radius: 9px; flex-shrink: 0;
      background: rgba(184,115,51,0.08); border: 1px solid rgba(184,115,51,0.18);
      display: flex; align-items: center; justify-content: center;
      color: var(--copper-light);
    }
    .login-feature-title { font-size: 13px; font-weight: 600; color: var(--white); margin-bottom: 3px; }
    .login-feature-sub   { font-size: 11px; color: var(--grey-2); line-height: 1.5; }
    .login-left-footer { font-size: 10px; color: var(--grey-2); letter-spacing: 0.05em; }
    .login-stats { display: flex; gap: 36px; margin-top: 10px; }
    .login-stat-num   { font-size: 24px; font-weight: 700; color: var(--gold); }
    .login-stat-label { font-size: 10px; color: var(--grey-2); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
    /* Right form panel */
    .login-right {
      display: flex; align-items: center; justify-content: center; padding: 40px;
    }
    .login-card { width: 100%; max-width: 400px; }
    .login-card-title { font-size: 22px; font-weight: 700; color: var(--white); margin-bottom: 6px; }
    .login-card-sub   { font-size: 12px; color: var(--grey-1); margin-bottom: 32px; line-height: 1.6; }
    .login-tabs {
      display: flex; gap: 0; margin-bottom: 28px;
      border-bottom: 1px solid rgba(107,103,98,0.3);
    }
    .login-tab {
      padding: 9px 18px; font-size: 12px; font-weight: 600;
      letter-spacing: 0.07em; text-transform: uppercase;
      background: transparent; color: var(--grey-1);
      border: none; border-bottom: 2px solid transparent;
      cursor: pointer; transition: all 0.15s; margin-bottom: -1px;
    }
    .login-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .login-field { margin-bottom: 16px; }
    .login-label {
      display: block; font-size: 10px; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--grey-1); margin-bottom: 7px;
    }
    .login-input {
      width: 100%; padding: 10px 14px; background: var(--charcoal-3);
      border: 1px solid rgba(107,103,98,0.45); border-radius: 7px;
      color: var(--white); font-family: 'Inter', sans-serif; font-size: 13px;
      outline: none; transition: border-color 0.15s;
    }
    .login-input:focus { border-color: var(--copper); }
    .login-input-hint { font-size: 10px; color: var(--grey-2); margin-top: 5px; }
    .login-error {
      font-size: 11px; color: var(--danger); margin-bottom: 14px;
      background: rgba(232,23,74,0.07); border: 1px solid rgba(232,23,74,0.18);
      border-radius: 5px; padding: 7px 11px;
    }
    .login-success {
      font-size: 11px; color: var(--success); margin-bottom: 14px;
      background: rgba(39,174,96,0.07); border: 1px solid rgba(39,174,96,0.18);
      border-radius: 5px; padding: 7px 11px;
    }
    .login-submit {
      width: 100%; padding: 12px;
      background: var(--gold); color: var(--charcoal);
      font-family: 'Inter', sans-serif; font-size: 12px;
      font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      border: none; border-radius: 7px; cursor: pointer;
      transition: all 0.15s; margin-top: 8px;
    }
    .login-submit:hover:not(:disabled) { background: var(--gold-bright); box-shadow: 0 0 12px rgba(201,151,74,0.4); }
    .login-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-link {
      background: none; border: none; color: var(--copper-light); font-size: 11px;
      cursor: pointer; text-decoration: underline; padding: 0; font-family: 'Inter', sans-serif;
    }
    .login-link:hover { color: var(--amber); }
    .otp-boxes { display: flex; gap: 8px; justify-content: center; margin: 6px 0 18px; }
    .otp-box {
      width: 46px; height: 54px; text-align: center;
      font-size: 22px; font-weight: 700;
      background: var(--charcoal-3); border: 1px solid rgba(107,103,98,0.5);
      border-radius: 7px; color: var(--white); outline: none;
      transition: border-color 0.15s;
    }
    .otp-box:focus { border-color: var(--copper); }
    .login-divider { border: none; border-top: 1px solid rgba(107,103,98,0.22); margin: 22px 0; }

    /* ── DOCUMENT VIEWER ── */
    .viewer-layout { display: flex; flex: 1; overflow: hidden; }
    .viewer-sidebar {
      width: 180px; flex-shrink: 0;
      background: var(--charcoal-2); border-right: 1px solid rgba(107,103,98,0.2);
      overflow-y: auto; padding: 12px 8px;
    }
    .viewer-page-thumb {
      padding: 7px 10px; border-radius: 5px; margin-bottom: 4px;
      cursor: pointer; font-size: 11px; color: var(--grey-1);
      transition: all 0.12s;
    }
    .viewer-page-thumb:hover  { background: rgba(107,103,98,0.2); color: var(--white); }
    .viewer-page-thumb.active { background: rgba(184,115,51,0.12); color: var(--copper-light); font-weight: 600; border-left: 3px solid var(--copper); }
    .viewer-page-num { font-weight: 700; margin-right: 6px; }
    .viewer-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .viewer-main-header { flex-shrink: 0; display: flex; align-items: center; gap: 12px; padding: 16px 32px; border-bottom: 1px solid rgba(107,103,98,0.2); background: var(--charcoal-2); }
    .viewer-main-body { flex: 1; overflow-y: auto; padding: 28px 32px; }
    .viewer-page-section { margin-bottom: 40px; }
    .viewer-page-header {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--grey-2); margin-bottom: 16px; padding-bottom: 8px;
      border-bottom: 1px solid rgba(107,103,98,0.2);
      display: flex; align-items: center; gap: 10px;
    }
    .viewer-page-header span { color: var(--gold); font-weight: 700; }
    /* Block types */
    .vb-title         { font-size: 18px; font-weight: 700; color: var(--amber); margin: 12px 0 6px; }
    .vb-section-header{ font-size: 14px; font-weight: 600; color: var(--white); margin: 10px 0 4px; border-left: 3px solid var(--copper); padding-left: 10px; }
    .vb-header        { font-size: 11px; font-weight: 600; color: var(--grey-1); letter-spacing: 0.1em; text-transform: uppercase; margin: 6px 0 2px; }
    .vb-footer        { font-size: 10px; color: var(--grey-2); font-style: italic; margin: 3px 0; }
    .vb-text          { font-size: 13px; color: var(--grey-1); line-height: 1.65; margin: 4px 0 8px; }
    .vb-list          { font-size: 13px; color: var(--grey-1); line-height: 1.65; margin: 4px 0 8px; padding-left: 16px; white-space: pre-wrap; }
    /* Table */
    .vb-table-wrap { overflow-x: auto; margin: 10px 0 16px; }
    .vb-table {
      border-collapse: collapse; font-size: 12px; width: 100%;
      background: var(--charcoal-3);
    }
    .vb-table th {
      background: rgba(155,115,64,0.15); color: var(--amber); font-weight: 600;
      padding: 7px 10px; text-align: left; border: 1px solid rgba(107,103,98,0.25);
    }
    .vb-table td {
      padding: 6px 10px; color: var(--grey-1);
      border: 1px solid rgba(107,103,98,0.2); vertical-align: top;
    }
    .vb-table tr:hover td { background: rgba(107,103,98,0.1); }
    /* Form / KEY_VALUE */
    .vb-kv { display: flex; gap: 8px; font-size: 12px; margin: 3px 0; }
    .vb-kv-key { color: var(--steel-light); min-width: 0; }
    .vb-kv-val { color: var(--amber); font-weight: 500; }
    /* Figure */
    .vb-figure { margin: 10px 0 16px; }
    .vb-figure img { max-width: 100%; border-radius: 4px; border: 1px solid rgba(107,103,98,0.3); }
    .vb-figure-caption { font-size: 11px; color: var(--grey-2); margin-top: 6px; font-style: italic; }
    .vb-figure-placeholder {
      padding: 24px; background: var(--charcoal-3); border: 1px dashed rgba(107,103,98,0.4);
      border-radius: 5px; text-align: center; font-size: 12px; color: var(--grey-2);
    }
    /* Block type badge */
    .vb-badge {
      font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--steel-bright); background: rgba(107,103,98,0.2);
      border-radius: 3px; padding: 2px 5px; margin-bottom: 4px; display: inline-block;
    }

    /* ── PRINT STYLES ── */
    @media print {
      /* Reset ALL viewport/scroll constraints in the full container chain */
      html, body, #root, .layout, .full-layout, .viewer-layout, .viewer-main, .viewer-main-body {
        height: auto !important;
        max-height: none !important;
        overflow: visible !important;
        display: block !important;
        flex: none !important;
        position: static !important;
      }
      body {
        background: white !important;
        color: #1a1a1a !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      /* Hide chrome */
      .topbar, .viewer-sidebar, .viewer-main-header {
        display: none !important;
      }
      /* Content area padding for print */
      .viewer-main-body {
        padding: 0 20px !important;
      }
      /* Light theme — text */
      .vb-title          { color: #111 !important; }
      .vb-section-header { color: #222 !important; border-left-color: #8B6835 !important; }
      .vb-header         { color: #333 !important; }
      .vb-text, .vb-list { color: #333 !important; }
      .vb-footer         { color: #666 !important; }
      .vb-kv-key         { color: #666 !important; }
      .vb-kv-val         { color: #111 !important; }
      /* Light theme — tables */
      .vb-table           { background: white !important; }
      .vb-table th        { background: #e8e6e3 !important; color: #111 !important; border-color: #ccc !important; }
      .vb-table td        { color: #333 !important; border-color: #ddd !important; }
      .vb-table tr:hover td { background: transparent !important; }
      /* Light theme — page headers */
      .viewer-page-header { color: #666 !important; border-bottom-color: #ccc !important; }
      .viewer-page-header span { color: #8B6835 !important; }
      .viewer-page-section { margin-bottom: 24px !important; }
      /* Light theme — badges, figures */
      .vb-badge { color: #666 !important; background: #eee !important; }
      .vb-figure img { border-color: #ccc !important; }
      .vb-figure-caption { color: #666 !important; }
      .vb-figure-placeholder { background: #f5f5f5 !important; border-color: #ccc !important; color: #888 !important; }
      /* Page break control — avoid splitting figures and tables */
      .vb-figure, .vb-table-wrap { break-inside: avoid; page-break-inside: avoid; }
      /* Kill animations */
      * { animation: none !important; transition: none !important; }
      ::-webkit-scrollbar { display: none !important; }
    }

    /* ── GEM GLOW EFFECTS ── */
    @keyframes rubyPulse    { 0%,100%{box-shadow:0 0 8px rgba(232,23,74,0.4);}  50%{box-shadow:0 0 20px rgba(232,23,74,0.7);} }
    @keyframes emeraldPulse { 0%,100%{box-shadow:0 0 8px rgba(39,174,96,0.35);} 50%{box-shadow:0 0 18px rgba(39,174,96,0.6);} }
    @keyframes topazPulse   { 0%,100%{box-shadow:0 0 8px rgba(232,146,15,0.4);} 50%{box-shadow:0 0 18px rgba(232,146,15,0.65);} }
    .glow-ruby    { animation: rubyPulse    2s infinite; }
    .glow-emerald { animation: emeraldPulse 2s infinite; }
    .glow-topaz   { animation: topazPulse   2s infinite; }

    /* ── PROJECT CARDS (Vault & Upload) ── */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    .project-card {
      background: var(--charcoal-2);
      border: 1px solid rgba(107,103,98,0.4);
      border-radius: 12px; padding: 20px 22px;
      cursor: pointer; transition: all 0.18s ease;
      position: relative; overflow: hidden;
    }
    .project-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: var(--gold);
      transition: background 0.18s ease;
    }
    .project-card:hover {
      border-color: rgba(184,115,51,0.5);
      background: rgba(184,115,51,0.04);
      box-shadow: 0 0 18px rgba(184,115,51,0.15), 0 0 12px rgba(201,151,74,0.12), 0 4px 16px rgba(0,0,0,0.3);
      transform: translateY(-2px);
    }
    .project-card.selected {
      border-color: rgba(41,128,185,0.5);
      background: rgba(41,128,185,0.07);
      box-shadow: 0 0 18px rgba(41,128,185,0.25);
    }
    .project-card.selected::before { background: var(--sapphire); }
    .project-card-name {
      font-family: 'Cinzel', serif;
      font-size: 14px; font-weight: 700; letter-spacing: 0.06em;
      color: var(--white); margin-bottom: 10px;
    }
    .project-card-meta {
      font-size: 11px; color: var(--grey-1); margin-bottom: 12px;
    }
    .project-card-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .project-card-new {
      background: var(--charcoal-2);
      border: 2px dashed rgba(107,103,98,0.4);
      border-radius: 12px; padding: 20px 22px;
      cursor: pointer; transition: all 0.18s ease;
      display: flex; align-items: center; justify-content: center;
      gap: 10px; color: var(--grey-1);
      font-size: 13px; font-weight: 600;
      min-height: 110px;
    }
    .project-card-new:hover {
      border-color: rgba(184,115,51,0.5);
      color: var(--copper-light);
      box-shadow: 0 0 14px rgba(184,115,51,0.15);
    }

    /* ── SORT BAR ── */
    .sort-bar { display: flex; gap: 6px; }
    .sort-btn {
      padding: 5px 12px; border-radius: 5px; font-size: 11px;
      font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
      background: transparent; color: var(--grey-1);
      border: 1px solid rgba(107,103,98,0.35);
      cursor: pointer; transition: all 0.12s;
    }
    .sort-btn.active {
      background: rgba(41,128,185,0.12);
      border-color: rgba(41,128,185,0.4); color: var(--white);
    }
    .sort-btn:hover:not(.active) { border-color: rgba(107,103,98,0.6); color: var(--white); }

    /* ── USER PILL in topbar ── */
    .user-pill {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 12px; border-radius: 20px;
      background: rgba(107,103,98,0.2);
      border: 1px solid rgba(107,103,98,0.4);
      font-size: 11px; font-weight: 600; color: var(--grey-1);
    }
    .user-avatar {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--gold); display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: var(--charcoal);
    }

    /* ── 60/40 SPLIT LAYOUT ── */
    .split-left {
      width: 60%; display: flex; flex-direction: column; border-right: 1px solid rgba(107,103,98,0.3); overflow: hidden;
    }
    .split-right {
      width: 40%; overflow-y: auto; background: var(--charcoal); padding: 12px; gap: 12px; display: flex; flex-direction: column;
    }
    .point-item {
      padding: 12px 16px; cursor: pointer; border-bottom: 1px solid rgba(107,103,98,0.12); transition: background 0.1s;
    }
    .point-item.selected {
      background: rgba(184,115,51,0.07); border-left: 3px solid var(--copper); margin-left: -3px;
    }
    .point-item:hover { background: var(--charcoal-3); }
    .point-text {
      font-size: 13px; color: var(--white); line-height: 1.5; margin-bottom: 6px;
    }
    .citations-row {
      display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    }
    .source-pill {
      display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px;
      font-size: 10px; font-weight: 700; background: rgba(184,115,51,0.12); color: var(--copper-light);
      border: 1px solid rgba(184,115,51,0.25); cursor: pointer; transition: background 0.15s; white-space: nowrap;
    }
    .source-pill:hover { background: rgba(184,115,51,0.25); }

    .page-card {
      background: var(--charcoal-2); border: 1px solid rgba(107,103,98,0.35); border-radius: 8px;
      overflow: hidden; margin-bottom: 12px;
    }
    .page-card-body {
      padding: 14px; max-height: 420px; overflow-y: auto;
    }
    .page-card-footer {
      padding: 6px 14px; font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
      color: var(--copper-light); border-top: 1px solid rgba(184,115,51,0.2);
      background: var(--charcoal-3);
    }
    .block-highlight {
      background: rgba(212,162,76,0.14); border-left: 3px solid var(--amber);
      padding-left: 8px; border-radius: 0 4px 4px 0;
    }
    .right-panel-hint {
      display: flex; align-items: center; justify-content: center; flex: 1;
      color: var(--grey-2); text-align: center; font-size: 12px; padding: 20px;
    }

    /* ── UNIVERSAL COMPACTOR — road-roller progress ── */
    .compactor-stage {
      position: relative;
      width: 100%;
      height: 180px;
      background:
        radial-gradient(ellipse at 50% 120%, rgba(184,115,51,0.12), transparent 70%),
        linear-gradient(to bottom, var(--charcoal-3) 0%, var(--charcoal-2) 55%, #2a241c 55%, #231d16 100%);
      border: 1px solid rgba(184,115,51,0.35);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: inset 0 -2px 10px rgba(0,0,0,0.35), 0 2px 12px rgba(0,0,0,0.25);
      margin-bottom: 18px;
    }
    .compactor-road-svg {
      position: absolute; left: 0; right: 0; bottom: 0;
      width: 100%; height: 70px;
      pointer-events: none;
    }
    .compactor-road-ahead  { stroke: #4a3f32; stroke-width: 3; fill: none; stroke-linejoin: round; stroke-linecap: round; }
    .compactor-road-behind { stroke: var(--amber); stroke-width: 3; fill: none; stroke-linecap: round;
      filter: drop-shadow(0 0 4px rgba(212,162,76,0.4)); }
    .compactor-road-dirt-ahead  { fill: #3a3027; }
    .compactor-road-dirt-behind { fill: #5a4a38; }
    .compactor-roller {
      position: absolute;
      bottom: 32px;
      width: 110px; height: 90px;
      transform: translateX(-50%);
      transition: left 0.25s cubic-bezier(0.4,0,0.2,1);
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    }
    .compactor-roller.idle { animation: rollerBob 2.4s ease-in-out infinite; }
    @keyframes rollerBob {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%     { transform: translateX(-50%) translateY(-2px); }
    }
    .compactor-roller .drum {
      transform-origin: 28px 66px;
      transform-box: fill-box;
    }
    .compactor-roller.running .drum { animation: drumSpin 0.55s linear infinite; }
    @keyframes drumSpin { to { transform: rotate(360deg); } }
    .compactor-dust {
      position: absolute; bottom: 28px;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(155,115,64,0.45) 0%, rgba(155,115,64,0) 70%);
      opacity: 0; transform: translateX(-50%);
      pointer-events: none;
    }
    .compactor-roller.running + .compactor-dust { animation: dustPuff 0.9s ease-out infinite; }
    @keyframes dustPuff {
      0%   { opacity: 0.75; transform: translateX(-50%) scale(0.5) translateY(0); }
      100% { opacity: 0;    transform: translateX(-50%) scale(1.8) translateY(-14px); }
    }

    .compactor-percent {
      font-family: 'Cinzel', serif;
      font-size: 56px; font-weight: 700;
      color: var(--amber);
      letter-spacing: 0.06em;
      text-align: center;
      line-height: 1;
      margin-top: 18px;
      text-shadow: 0 0 18px rgba(212,162,76,0.25);
    }
    .compactor-percent-label {
      font-family: 'Inter', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--bronze-light);
      text-align: center; margin-top: 6px;
    }
    .compactor-step-line {
      font-size: 12px; color: var(--grey-1);
      font-family: 'Inter', sans-serif;
      padding: 8px 14px; border-left: 3px solid var(--bronze);
      background: rgba(155,115,64,0.06);
      margin-bottom: 4px; border-radius: 0 6px 6px 0;
      display: flex; align-items: center; gap: 10px;
    }
    .compactor-step-line.active {
      border-left-color: var(--copper);
      background: rgba(184,115,51,0.12);
      color: var(--white);
    }
    .compactor-step-line.done {
      border-left-color: var(--success);
      color: var(--grey-1);
    }
    .compactor-step-num {
      font-family: 'Cinzel', serif; font-weight: 700;
      font-size: 11px; letter-spacing: 0.12em;
      color: var(--amber); min-width: 44px;
    }
    .compactor-step-savings {
      margin-left: auto; font-size: 11px; font-weight: 600;
      color: var(--success); font-variant-numeric: tabular-nums;
    }
    .compactor-doc-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      background: var(--charcoal-3);
      border: 1px solid rgba(107,103,98,0.35);
      border-radius: 8px;
    }
    .compactor-doc-card.running { border-color: var(--copper); background: rgba(184,115,51,0.08); }
    .compactor-doc-card.done    { border-color: var(--success); background: rgba(39,174,96,0.06); }
    .compactor-doc-label {
      font-family: 'Cinzel', serif; font-weight: 700; font-size: 13px;
      color: var(--amber); letter-spacing: 0.08em; min-width: 44px;
    }
    .compactor-doc-meta { font-size: 11px; color: var(--grey-1); font-variant-numeric: tabular-nums; }
    .compactor-doc-delta { margin-left: auto; font-size: 12px; font-weight: 700; color: var(--success); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// ── Backend URL ──────────────────────────────────────────────────────────────
// TESTING  (your computer): paste ngrok URL below, e.g. "https://abc123.ngrok-free.app"
// PRODUCTION (server):      paste Railway URL below, e.g. "https://pramona-ai.up.railway.app"
const API_BASE = "http://localhost:8000";   // ← change this one line to switch backend   // ← change this one line to switch backend

async function apiFetch(path, options = {}) {
  const token = localStorage.getItem('crux_token');
  options.headers = {
    ...options.headers,
    "ngrok-skip-browser-warning": "true",
    ...(token ? { "Authorization": `Bearer ${token}` } : {}),
  };
  return fetch(`${API_BASE}${path}`, options);
}
// ────────────────────────────────────────────────────────────────────────────

const { useState, useEffect, useRef } = React;

/* ── LOGIN PAGE ── */
function LoginPage({ onLogin, theme, onToggleTheme }) {
  // step: "login" | "register" | "register-otp" | "forgot" | "forgot-otp" | "forgot-newpw"
  const [step, setStep]         = useState("login");
  const [email, setEmail]       = useState("");
  const [password, setPassword] = useState("");
  const [password2, setPassword2] = useState("");
  const [otp, setOtp]           = useState(["","","","","",""]);
  const [newPw, setNewPw]       = useState("");
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState("");
  const [info, setInfo]         = useState("");
  const [devOtp, setDevOtp]     = useState(""); // shown in UI when SMTP not configured

  const clearMessages = () => { setError(""); setInfo(""); };
  const otpValue = otp.join("");

  const post = async (path, body) => {
    const r = await fetch(`${API_BASE}${path}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const data = await r.json();
    return { ok: r.ok, data };
  };

  const doLogin = async () => {
    if (!email || !password) { setError("Enter your email and password"); return; }
    setLoading(true); clearMessages();
    try {
      const { ok, data } = await post("/auth/login", { email, password });
      if (!ok) { setError(data.detail || "Invalid email or password"); return; }
      localStorage.setItem("crux_token",    data.token);
      localStorage.setItem("crux_username", data.username);
      onLogin(data.username);
    } catch { setError("Cannot reach server — is it running?"); }
    setLoading(false);
  };

  const doSendOtp = async () => {
    if (!email || !password) { setError("Enter your email and password"); return; }
    if (password !== password2) { setError("Passwords do not match"); return; }
    if (password.length < 6)   { setError("Password must be at least 6 characters"); return; }
    setLoading(true); clearMessages();
    try {
      const { ok, data } = await post("/auth/send-otp", { email, password });
      if (!ok) { setError(data.detail || "Could not send code"); return; }
      if (data.dev_otp) setDevOtp(data.dev_otp);
      setInfo(data.message || `Your access request for ${email} has been sent to the administrator. You'll receive your code from them once approved.`);
      setStep("register-otp");
    } catch { setError("Cannot reach server — is it running?"); }
    setLoading(false);
  };

  const doVerifyOtp = async () => {
    if (otpValue.length < 6) { setError("Enter all 6 digits"); return; }
    setLoading(true); clearMessages();
    try {
      const { ok, data } = await post("/auth/verify-otp", { email, otp: otpValue });
      if (!ok) { setError(data.detail || "Incorrect or expired code"); return; }
      localStorage.setItem("crux_token",    data.token);
      localStorage.setItem("crux_username", data.username);
      onLogin(data.username);
    } catch { setError("Cannot reach server — is it running?"); }
    setLoading(false);
  };

  const doForgotSend = async () => {
    if (!email) { setError("Enter your email address"); return; }
    setLoading(true); clearMessages();
    try {
      const { ok, data } = await post("/auth/forgot-password", { email, password: "" });
      if (!ok) { setError(data.detail || "Could not send reset code"); return; }
      if (data.dev_otp) setDevOtp(data.dev_otp);
      setInfo(`Reset code sent to ${email}.`);
      setStep("forgot-otp");
    } catch { setError("Cannot reach server — is it running?"); }
    setLoading(false);
  };

  const doResetPassword = async () => {
    if (otpValue.length < 6) { setError("Enter all 6 digits"); return; }
    if (!newPw || newPw.length < 6) { setError("Password must be at least 6 characters"); return; }
    setLoading(true); clearMessages();
    try {
      const { ok, data } = await post("/auth/reset-password", { email, otp: otpValue, new_password: newPw });
      if (!ok) { setError(data.detail || "Could not reset password"); return; }
      localStorage.setItem("crux_token",    data.token);
      localStorage.setItem("crux_username", data.username);
      onLogin(data.username);
    } catch { setError("Cannot reach server — is it running?"); }
    setLoading(false);
  };

  // OTP box keyboard handling — auto-advance
  const handleOtpKey = (i, e) => {
    if (e.key === "Backspace") {
      const next = [...otp]; next[i] = "";
      setOtp(next);
      if (i > 0) document.getElementById(`otp-${i-1}`)?.focus();
      return;
    }
    if (!/^\d$/.test(e.key)) return;
    const next = [...otp]; next[i] = e.key;
    setOtp(next);
    if (i < 5) document.getElementById(`otp-${i+1}`)?.focus();
    else if (step === "register-otp") doVerifyOtp();
  };

  const switchTab = (s) => { setStep(s); clearMessages(); setOtp(["","","","","",""]); };

  const OtpBoxes = () => (
    <div className="otp-boxes">
      {otp.map((v,i) => (
        <input key={i} id={`otp-${i}`} className="otp-box" maxLength={1}
          value={v} readOnly
          onKeyDown={e=>handleOtpKey(i,e)}
          onFocus={e=>e.target.removeAttribute("readonly")}
        />
      ))}
    </div>
  );

  const features = [
    { icon: "🔍", title: "Forensic PDF Analysis", sub: "Extracts text, tables, figures and runs AI analysis on every engineering document." },
    { icon: "🧠", title: "CRUX Intelligence Engine", sub: "State-of-the-art AI understands drawing packages, specs and contracts." },
    { icon: "🗄️", title: "Evidence Vault", sub: "Every document is indexed, searchable and traceable back to source pages." },
    { icon: "🔒", title: "Per-Account Isolation", sub: "Your documents are private — never mixed with other users' data." },
  ];

  return (
    <div className="login-screen">
      {onToggleTheme && (
        <button className="theme-toggle" onClick={onToggleTheme} title={theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'}
          style={{position:'absolute',top:20,right:20,zIndex:1000}}>
          {theme === 'dark' ? <Icon.Sun /> : <Icon.Moon />}
        </button>
      )}

      {/* ── LEFT PANEL ── */}
      <div className="login-left">
        <div className="login-left-glow"/>
        <div className="login-left-logo">
          <div style={{width:40,height:40}}><Icon.PramonaLogo /></div>
          <div style={{width:1,height:36,background:'rgba(107,103,98,0.35)',margin:'0 4px'}}/>
          <div>
            <div style={{fontFamily:"'Cinzel',serif",fontWeight:900,fontSize:22,letterSpacing:'0.14em',color:'var(--white)'}}>CRUX</div>
            <div style={{fontSize:9,letterSpacing:'0.4em',textTransform:'uppercase',color:'var(--grey-1)',marginTop:2}}>by Pramona AI</div>
          </div>
        </div>

        <div>
          <div className="login-left-tagline">
            Every drawing.<br/>Every clause.<br/><span>Every risk — found.</span>
          </div>
          <div className="login-left-sub">
            CRUX is a forensic document intelligence platform for engineers, project managers, and legal teams working with complex technical PDFs.
          </div>
          {features.map((f,i) => (
            <div key={i} className="login-feature">
              <div className="login-feature-icon" style={{fontSize:16}}>{f.icon}</div>
              <div>
                <div className="login-feature-title">{f.title}</div>
                <div className="login-feature-sub">{f.sub}</div>
              </div>
            </div>
          ))}
        </div>

        <div className="login-left-footer">
          <div>Pramona AI · Built for infrastructure &amp; engineering</div>
          <div className="login-stats">
            <div><div className="login-stat-num">AWS</div><div className="login-stat-label">Textract OCR</div></div>
            <div><div className="login-stat-num">S3</div><div className="login-stat-label">Secure Storage</div></div>
            <div><div className="login-stat-num">JWT</div><div className="login-stat-label">Auth</div></div>
          </div>
        </div>
      </div>

      {/* ── RIGHT PANEL ── */}
      <div className="login-right">
        <div className="login-card">

          {/* Step: login or register (tab switch) */}
          {(step === "login" || step === "register") && (<>
            <div className="login-card-title">{step === "login" ? "Welcome back" : "Create account"}</div>
            <div className="login-card-sub">{step === "login" ? "Sign in to your CRUX account to continue." : "Register with your email — we'll send a verification code."}</div>
            <div className="login-tabs">
              <button className={`login-tab ${step==="login"?"active":""}`}    onClick={()=>switchTab("login")}>Sign In</button>
              <button className={`login-tab ${step==="register"?"active":""}`} onClick={()=>switchTab("register")}>Register</button>
            </div>
            {error && <div className="login-error">{error}</div>}
            <div className="login-field">
              <label className="login-label">Email Address</label>
              <input className="login-input" type="email" value={email} autoFocus
                onChange={e=>setEmail(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&(step==="login"?doLogin():doSendOtp())}
                placeholder="you@example.com"/>
            </div>
            <div className="login-field">
              <label className="login-label">Password</label>
              <input className="login-input" type="password" value={password}
                onChange={e=>setPassword(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&(step==="login"?doLogin():doSendOtp())}
                placeholder="••••••••"/>
              {step === "register" && <div className="login-input-hint">Minimum 6 characters</div>}
            </div>
            {step === "register" && (
              <div className="login-field">
                <label className="login-label">Confirm Password</label>
                <input className="login-input" type="password" value={password2}
                  onChange={e=>setPassword2(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&doSendOtp()}
                  placeholder="••••••••"/>
              </div>
            )}
            <button className="login-submit" disabled={loading}
              onClick={step==="login"?doLogin:doSendOtp}>
              {loading ? "Please wait…" : step === "login" ? "Sign In" : "Send Verification Code"}
            </button>
            {step === "login" && (
              <div style={{textAlign:'center',marginTop:16}}>
                <button className="login-link" onClick={()=>switchTab("forgot")}>Forgot password?</button>
              </div>
            )}
          </>)}

          {/* Step: OTP verification (register) */}
          {step === "register-otp" && (<>
            <div className="login-card-title">Awaiting administrator approval</div>
            <div className="login-card-sub">Your request for <strong style={{color:'var(--white)'}}>{email}</strong> is pending. The administrator will share a 6-digit access code with you out-of-band (call / message). Enter it below once received.</div>
            {info  && <div className="login-success">{info}</div>}
            {error && <div className="login-error">{error}</div>}
            {devOtp && <div className="login-success">Dev mode — SMTP not configured. Your code: <strong>{devOtp}</strong></div>}
            <OtpBoxes />
            <button className="login-submit" disabled={loading} onClick={doVerifyOtp}>
              {loading ? "Verifying…" : "Verify & Create Account"}
            </button>
            <hr className="login-divider"/>
            <div style={{textAlign:'center'}}>
              <button className="login-link" onClick={()=>{ clearMessages(); setStep("register"); setOtp(["","","","","",""]); }}>
                Back to registration
              </button>
              {" · "}
              <button className="login-link" onClick={()=>{ clearMessages(); doSendOtp(); }}>
                Resend code
              </button>
            </div>
          </>)}

          {/* Step: forgot password — enter email */}
          {step === "forgot" && (<>
            <div className="login-card-title">Reset password</div>
            <div className="login-card-sub">Enter your account email — we'll send a reset code.</div>
            {error && <div className="login-error">{error}</div>}
            <div className="login-field">
              <label className="login-label">Email Address</label>
              <input className="login-input" type="email" value={email} autoFocus
                onChange={e=>setEmail(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&doForgotSend()}
                placeholder="you@example.com"/>
            </div>
            <button className="login-submit" disabled={loading} onClick={doForgotSend}>
              {loading ? "Sending…" : "Send Reset Code"}
            </button>
            <hr className="login-divider"/>
            <div style={{textAlign:'center'}}>
              <button className="login-link" onClick={()=>switchTab("login")}>Back to Sign In</button>
            </div>
          </>)}

          {/* Step: forgot OTP */}
          {step === "forgot-otp" && (<>
            <div className="login-card-title">Enter reset code</div>
            <div className="login-card-sub">Code sent to <strong style={{color:'var(--white)'}}>{email}</strong>. Enter it below.</div>
            {info  && <div className="login-success">{info}</div>}
            {error && <div className="login-error">{error}</div>}
            {devOtp && <div className="login-success">Dev mode — SMTP not configured. Your code: <strong>{devOtp}</strong></div>}
            <OtpBoxes />
            <div className="login-field" style={{marginTop:8}}>
              <label className="login-label">New Password</label>
              <input className="login-input" type="password" value={newPw}
                onChange={e=>setNewPw(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&doResetPassword()}
                placeholder="••••••••"/>
              <div className="login-input-hint">Minimum 6 characters</div>
            </div>
            <button className="login-submit" disabled={loading} onClick={doResetPassword}>
              {loading ? "Resetting…" : "Reset Password & Sign In"}
            </button>
            <hr className="login-divider"/>
            <div style={{textAlign:'center'}}>
              <button className="login-link" onClick={()=>switchTab("login")}>Back to Sign In</button>
            </div>
          </>)}

        </div>
      </div>
    </div>
  );
}

const SOCSOD_STATUS_META = {
  comply:  { label:"Comply",          tag:"tag-ok",     dot:"var(--success)" },

const SOCSOD_SEVERITY_META = {
  minor:    { label:"Minor",    color:"var(--steel-light)" },
  moderate: { label:"Moderate", color:"var(--amber)"       },
  major:    { label:"Major",    color:"var(--copper-light)"},
  critical: { label:"Critical", color:"var(--danger)"      },

function SocSodPage() {
  const [project, setProject]   = useState(null);             // selected project obj
  const [view, setView]         = useState("combined");       // soc | sod | combined
  const [filter, setFilter]     = useState("all");            // all | comply | comment | deviate | noted | na | open
  const [search, setSearch]     = useState("");
  const [entries, setEntries]   = useState([]);               // populated when project chosen
  const [activeId, setActiveId] = useState(null);
  const [exporting, setExporting] = useState(false);
  const [exportToast, setExportToast] = useState("");

  const loadProject = (p) => {
    setProject(p);
    // Clone the sample so edits don't mutate the constant
    const cloned = SOCSOD_SAMPLE_CLAUSES.map(c => ({
      ...c,
      deviation: c.deviation ? { ...c.deviation } : { summary:"", reason:"", alternative:"", tech:"", sched:"", comm:"" },
      comment: c.comment || "", proposalRef: c.proposalRef || "",
    }));
    setEntries(cloned);
    setActiveId(cloned[0]?.id || null);
  };

  const reset = () => { setProject(null); setEntries([]); setActiveId(null); setView("combined"); setFilter("all"); setSearch(""); };

  const counts = entries.reduce((acc,e) => { acc[e.status] = (acc[e.status]||0)+1; return acc; }, { comply:0,comment:0,deviate:0,noted:0,na:0 });
  const total = entries.length;
  const compliant = counts.comply + counts.comment;
  const compliancePct = total > 0 ? Math.round((compliant/total)*100) : 0;

  // Filter + search + view-mode
  const visible = entries.filter(e => {
    if (view === "soc" && e.status === "deviate") return false;
    if (view === "sod" && e.status !== "deviate") return false;
    if (filter === "open"  && (e.status === "comply" || e.status === "na")) return false;
    if (filter !== "all" && filter !== "open" && e.status !== filter) return false;
    if (search) {
      const s = search.toLowerCase();
      if (!(e.ref.toLowerCase().includes(s) || e.title.toLowerCase().includes(s) || e.text.toLowerCase().includes(s))) return false;
    }
    return true;
  });

  const active = entries.find(e => e.id === activeId) || null;

  const updateActive = (patch) => {
    setEntries(prev => prev.map(e => e.id === activeId ? { ...e, ...patch } : e));
  };
  const updateActiveDeviation = (patch) => {
    setEntries(prev => prev.map(e => e.id === activeId ? { ...e, deviation: { ...e.deviation, ...patch } } : e));
  };

  const fakeExport = (label) => {
    setExporting(true);
    setExportToast("");
    setTimeout(() => {
      setExporting(false);
      setExportToast(`${label} prepared — download started`);
      setTimeout(() => setExportToast(""), 3200);
    }, 900);
  };

  // ── Empty state — no project picked ────────────────────────────────────────
  if (!project) {
    return (
      <div className="main">
        <div className="page-header">
          <div className="page-title">SOC / SOD</div>
          <div className="page-sub">Technical Support · Statement of Compliance &amp; Statement of Deviation register</div>
        </div>

        <div className="card" style={{padding:0,maxWidth:980}}>
          <div style={{padding:'24px 26px',borderBottom:'1px solid rgba(107,103,98,0.25)',display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:32,height:32,borderRadius:8,background:'rgba(184,115,51,0.12)',border:'1px solid rgba(184,115,51,0.4)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--gold)'}}>
              <Icon.Compliance/>
            </div>
            <div>
              <div style={{fontSize:11,letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--gold)',fontWeight:700}}>Build the register</div>
              <div style={{fontSize:12,color:'var(--grey-1)',marginTop:3}}>Pick a project — clauses will be extracted from its specification document.</div>
            </div>
          </div>

          <div style={{padding:'22px 26px'}}>
            <div style={{fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--grey-2)',fontWeight:700,marginBottom:10}}>Available projects</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14}}>
              {SOCSOD_MOCK_PROJECTS.map(p => (
                <div key={p.id}
                     onClick={()=>loadProject(p)}
                     style={{padding:'16px 16px',borderRadius:8,background:'var(--charcoal-3)',border:'1px solid rgba(107,103,98,0.4)',cursor:'pointer',transition:'all 0.15s'}}
                     onMouseEnter={e=>{ e.currentTarget.style.borderColor='var(--copper)'; e.currentTarget.style.boxShadow='0 0 12px rgba(184,115,51,0.18)'; }}
                     onMouseLeave={e=>{ e.currentTarget.style.borderColor='rgba(107,103,98,0.4)'; e.currentTarget.style.boxShadow='none'; }}>
                  <div style={{fontSize:13,color:'var(--white)',fontWeight:600,marginBottom:6}}>{p.name}</div>
                  <div style={{fontSize:11,color:'var(--grey-1)',lineHeight:1.5}}>{p.spec}</div>
                  <div style={{marginTop:12,fontSize:10,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--gold)',fontWeight:700}}>Open register ›</div>
                </div>
              ))}
            </div>

            <div style={{marginTop:24,padding:'16px 18px',borderRadius:8,background:'rgba(184,115,51,0.05)',border:'1px solid rgba(184,115,51,0.25)'}}>
              <div style={{fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--gold)',fontWeight:700,marginBottom:8}}>How it works</div>
              <ol style={{color:'var(--grey-1)',fontSize:12,lineHeight:1.85,paddingLeft:20,margin:0}}>
                <li>CRUX extracts numbered clauses from the spec document.</li>
                <li>Mark each clause <strong style={{color:'var(--success)'}}>Comply</strong>, <strong style={{color:'var(--amber)'}}>Comply with comment</strong>, <strong style={{color:'var(--danger)'}}>Deviate</strong>, <strong style={{color:'var(--grey-1)'}}>Noted</strong>, or <strong style={{color:'var(--grey-2)'}}>N/A</strong>.</li>
                <li>For deviations, capture reason, alternative, severity and technical / schedule / commercial impact.</li>
                <li>Export to <strong style={{color:'var(--gold)'}}>SOC.docx</strong>, <strong style={{color:'var(--gold)'}}>SOD.docx</strong>, or a combined PDF for the bid.</li>
              </ol>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── Main register view ─────────────────────────────────────────────────────
  return (
    <div className="main">
      <div className="page-header">
        <div className="page-header-row">
          <div>
            <div className="page-title">SOC / SOD</div>
            <div className="page-sub">
              <span style={{color:'var(--gold)',fontWeight:600}}>{project.name}</span>
              <span style={{margin:'0 8px',color:'var(--grey-2)'}}>·</span>
              <span>{project.spec}</span>
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost" onClick={reset} style={{fontSize:11}}>Change Project</button>
            <button className="btn btn-ghost" onClick={()=>fakeExport("SOC.docx")} disabled={exporting} style={{fontSize:11}}>Export SOC</button>
            <button className="btn btn-ghost" onClick={()=>fakeExport("SOD.docx")} disabled={exporting} style={{fontSize:11}}>Export SOD</button>
            <button className="btn btn-primary" onClick={()=>fakeExport("Combined-Register.pdf")} disabled={exporting} style={{fontSize:11}}>
              {exporting ? "Preparing…" : "Export Combined"}
            </button>
          </div>
        </div>
        {exportToast && (
          <div style={{marginTop:12,padding:'8px 14px',borderRadius:6,background:'rgba(39,174,96,0.1)',border:'1px solid rgba(39,174,96,0.35)',color:'var(--success)',fontSize:11,letterSpacing:'0.06em',display:'inline-flex',alignItems:'center',gap:8}}>
            <Icon.Check/> {exportToast}
          </div>
        )}
      </div>

      {/* ── Stats strip ─────────────────────────────────────────── */}
      <div className="stats-row" style={{gridTemplateColumns:'repeat(5, 1fr)'}}>
        <div className="stat-card neutral">
          <div className="stat-label">Total Clauses</div>
          <div className="stat-value">{total}</div>
          <div className="stat-delta">extracted from spec</div>
        </div>
        <div className="stat-card ok">
          <div className="stat-label">Comply</div>
          <div className="stat-value" style={{color:'var(--success)'}}>{counts.comply}</div>
          <div className="stat-delta">full compliance</div>
        </div>
        <div className="stat-card warn">
          <div className="stat-label">w/ Comment</div>
          <div className="stat-value" style={{color:'var(--amber)'}}>{counts.comment}</div>
          <div className="stat-delta">conditional</div>
        </div>
        <div className="stat-card danger">
          <div className="stat-label">Deviations</div>
          <div className="stat-value" style={{color:'var(--danger)'}}>{counts.deviate}</div>
          <div className="stat-delta">SOD entries</div>
        </div>
        <div className="stat-card neutral">
          <div className="stat-label">Compliance</div>
          <div className="stat-value" style={{color:compliancePct >= 90 ? 'var(--success)' : compliancePct >= 75 ? 'var(--amber)' : 'var(--danger)'}}>{compliancePct}%</div>
          <div style={{marginTop:8,height:4,background:'rgba(107,103,98,0.3)',borderRadius:2,overflow:'hidden'}}>
            <div style={{width:`${compliancePct}%`,height:'100%',background:compliancePct >= 90 ? 'var(--success)' : compliancePct >= 75 ? 'var(--amber)' : 'var(--danger)',transition:'width 0.4s ease'}}/>
          </div>
        </div>
      </div>

      {/* ── Toolbar: view + filter + search ─────────────────────── */}
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16,flexWrap:'wrap'}}>
        <div style={{display:'inline-flex',background:'var(--charcoal-2)',border:'1px solid rgba(107,103,98,0.4)',borderRadius:8,padding:3}}>
          {[
            { id:"combined", label:"Combined Register" },
            { id:"soc",      label:"SOC View" },
            { id:"sod",      label:"SOD View" },
          ].map(v => (
            <button key={v.id} onClick={()=>setView(v.id)}
                    style={{padding:'7px 14px',borderRadius:6,border:'none',cursor:'pointer',
                            background: view===v.id ? 'rgba(184,115,51,0.18)' : 'transparent',
                            color: view===v.id ? 'var(--gold)' : 'var(--grey-1)',
                            fontSize:11,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',
                            transition:'all 0.15s'}}>
              {v.label}
            </button>
          ))}
        </div>

        <div style={{display:'inline-flex',gap:6,flexWrap:'wrap'}}>
          {[
            { id:"all",     label:"All" },
            { id:"open",    label:"Open Items" },
            { id:"comply",  label:"Comply" },
            { id:"comment", label:"Comment" },
            { id:"deviate", label:"Deviate" },
            { id:"noted",   label:"Noted" },
            { id:"na",      label:"N/A" },
          ].map(f => (
            <button key={f.id} onClick={()=>setFilter(f.id)}
                    style={{padding:'5px 11px',borderRadius:14,fontSize:10,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',
                            cursor:'pointer',transition:'all 0.12s',
                            background: filter===f.id ? 'rgba(184,115,51,0.2)' : 'transparent',
                            color: filter===f.id ? 'var(--gold)' : 'var(--grey-1)',
                            border: filter===f.id ? '1px solid rgba(184,115,51,0.5)' : '1px solid rgba(107,103,98,0.4)'}}>
              {f.label}
            </button>
          ))}
        </div>

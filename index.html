<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRUX by Pramona AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --charcoal:    #1A1A1B;
      --charcoal-2:  #222224;
      --charcoal-3:  #2A2A2D;
      --steel:       #4A4E69;
      --steel-light: #5C6180;
      --gold:        #F4A261;
      --gold-dim:    #C47B3E;
      --white:       #F0EDE8;
      --grey-1:      #9A9DAE;
      --grey-2:      #5C5F72;
      --danger:      #E05C5C;
      --success:     #52B788;
    }

    html, body { height: 100%; background: var(--charcoal); color: var(--white); }
    body { font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.5; overflow: hidden; }
    #root { height: 100vh; display: flex; flex-direction: column; }

    /* ── POP ANIMATIONS ── */
    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.92) translateY(6px); }
      60%  { transform: scale(1.025) translateY(-1px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes popInFast {
      0%   { opacity: 0; transform: scale(0.95); }
      65%  { transform: scale(1.03); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeSlideUp {
      0%   { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes cruxPop {
      0%   { opacity: 0; transform: scale(0.97) translateY(4px); box-shadow: 0 0 0 0 rgba(244,162,97,0); }
      70%  { transform: scale(1.01) translateY(-1px); }
      100% { opacity: 1; transform: scale(1) translateY(0); box-shadow: 0 0 24px rgba(244,162,97,0.08); }
    }
    .pop-card    { animation: popIn 0.38s cubic-bezier(0.34,1.56,0.64,1) both; }
    .pop-fast    { animation: popInFast 0.28s cubic-bezier(0.34,1.56,0.64,1) both; }
    .pop-slide   { animation: fadeSlideUp 0.3s ease both; }
    .pop-crux    { animation: cruxPop 0.42s cubic-bezier(0.34,1.56,0.64,1) both; }
    .d1  { animation-delay: 0.04s; }
    .d2  { animation-delay: 0.08s; }
    .d3  { animation-delay: 0.12s; }
    .d4  { animation-delay: 0.16s; }
    .d5  { animation-delay: 0.20s; }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--charcoal-2); }
    ::-webkit-scrollbar-thumb { background: var(--steel); border-radius: 3px; }

    /* ── TOPBAR ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      height: 56px; padding: 0 24px;
      background: var(--charcoal-2);
      border-bottom: 1px solid rgba(74,78,105,0.4);
      flex-shrink: 0; z-index: 100;
    }
    .logo-wrap { display: flex; align-items: center; gap: 14px; user-select: none; }
    .logo-mark {
      width: 36px; height: 36px; position: relative; flex-shrink: 0;
    }
    .logo-mark svg { width: 100%; height: 100%; }
    .logo-text { display: flex; flex-direction: column; line-height: 1; }
    .logo-crux {
      font-family: 'Cinzel', serif;
      font-weight: 900; font-size: 20px;
      letter-spacing: 0.12em;
      color: var(--white);
    }
    .logo-sub {
      font-family: 'Inter', sans-serif;
      font-weight: 300; font-size: 9px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--grey-1);
      margin-top: 3px;
    }
    .topbar-actions { display: flex; align-items: center; gap: 8px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 6px;
      font-family: 'Inter', sans-serif; font-size: 12px;
      font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; border: none; transition: all 0.15s ease;
      white-space: nowrap;
    }
    .btn-ghost {
      background: transparent; color: var(--grey-1);
      border: 1px solid var(--grey-2);
    }
    .btn-ghost:hover { border-color: var(--steel-light); color: var(--white); }
    .btn-primary {
      background: var(--gold); color: var(--charcoal);
    }
    .btn-primary:hover { background: #f7b37a; transform: scale(1.03); }
    .btn:active { transform: scale(0.97); }
    .btn-steel {
      background: var(--steel); color: var(--white);
    }
    .btn-steel:hover { background: var(--steel-light); }
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 14px; border-radius: 20px;
      background: rgba(82, 183, 136, 0.12);
      border: 1px solid rgba(82, 183, 136, 0.3);
      font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
      color: var(--success); text-transform: uppercase;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    /* ── LAYOUT ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--charcoal-2);
      border-right: 1px solid rgba(74,78,105,0.3);
      display: flex; flex-direction: column;
      padding: 16px 0; overflow-y: auto;
    }
    .sidebar-section { padding: 0 12px; margin-bottom: 24px; }
    .sidebar-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--grey-2);
      padding: 0 12px; margin-bottom: 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 7px;
      font-size: 13px; font-weight: 500; color: var(--grey-1);
      cursor: pointer; transition: all 0.12s ease;
      border: 1px solid transparent;
    }
    .nav-item:hover { background: var(--charcoal-3); color: var(--white); }
    .nav-item.active {
      background: rgba(244,162,97,0.1);
      border-color: rgba(244,162,97,0.25);
      color: var(--gold);
    }
    .nav-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.8; }
    .nav-badge {
      margin-left: auto; font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 10px;
      background: var(--steel); color: var(--white);
    }
    .nav-badge.warn { background: rgba(244,162,97,0.25); color: var(--gold); }
    .sidebar-divider { height: 1px; background: rgba(74,78,105,0.25); margin: 8px 12px 16px; }

    /* ── MAIN ── */
    .main { flex: 1; overflow-y: auto; padding: 28px 32px; }

    /* ── PAGE HEADER ── */
    .page-header { margin-bottom: 28px; }
    .page-title {
      font-family: 'Cinzel', serif;
      font-size: 22px; font-weight: 700;
      letter-spacing: 0.08em; color: var(--white);
      margin-bottom: 6px;
    }
    .page-sub { font-size: 13px; color: var(--grey-1); font-weight: 400; }
    .page-header-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }

    /* ── STATS ROW ── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--charcoal-2);
      border: 1px solid rgba(74,78,105,0.35);
      border-radius: 10px; padding: 20px 22px;
      position: relative; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    .stat-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
    }
    .stat-card.warn::before { background: var(--gold); }
    .stat-card.ok::before { background: var(--success); }
    .stat-card.neutral::before { background: var(--steel); }
    .stat-card.danger::before { background: var(--danger); }
    .stat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--grey-2); margin-bottom: 10px; }
    .stat-value { font-family: 'Cinzel', serif; font-size: 32px; font-weight: 700; color: var(--white); line-height: 1; margin-bottom: 4px; }
    .stat-delta { font-size: 11px; color: var(--grey-1); }
    .stat-delta.up { color: var(--danger); }
    .stat-delta.down { color: var(--success); }

    /* ── SECTION CARD ── */
    .card {
      background: var(--charcoal-2);
      border: 1px solid rgba(74,78,105,0.35);
      border-radius: 10px; margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 22px;
      border-bottom: 1px solid rgba(74,78,105,0.25);
    }
    .card-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--grey-1);
    }
    .card-body { padding: 22px; }

    /* ── THE CRUX BLOCK ── */
    .crux-block {
      border: 1px solid var(--gold);
      border-radius: 10px;
      background: rgba(244,162,97,0.06);
      margin-bottom: 22px;
      overflow: hidden;
    }
    .crux-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px;
      background: rgba(244,162,97,0.12);
      border-bottom: 1px solid rgba(244,162,97,0.3);
    }
    .crux-icon {
      width: 28px; height: 28px; flex-shrink: 0;
      background: var(--gold); border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }
    .crux-icon svg { width: 16px; height: 16px; }
    .crux-label {
      font-family: 'Cinzel', serif;
      font-size: 13px; font-weight: 700; letter-spacing: 0.14em;
      color: var(--gold); text-transform: uppercase;
    }
    .crux-sublabel { font-size: 10px; color: var(--gold-dim); letter-spacing: 0.08em; font-weight: 400; margin-top: 1px; }
    .crux-body { padding: 18px 20px; }
    .crux-finding {
      font-size: 16px; font-weight: 700; color: var(--white);
      margin-bottom: 8px; letter-spacing: 0.02em;
    }
    .crux-desc { font-size: 13px; color: var(--grey-1); line-height: 1.6; margin-bottom: 14px; }
    .crux-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 20px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    }
    .tag-danger { background: rgba(224,92,92,0.15); border: 1px solid rgba(224,92,92,0.35); color: var(--danger); }
    .tag-warn   { background: rgba(244,162,97,0.15); border: 1px solid rgba(244,162,97,0.35); color: var(--gold); }
    .tag-ok     { background: rgba(82,183,136,0.12); border: 1px solid rgba(82,183,136,0.3);  color: var(--success); }
    .tag-steel  { background: rgba(74,78,105,0.3);  border: 1px solid rgba(74,78,105,0.5);   color: var(--grey-1); }

    /* ── EVIDENCE TABLE ── */
    .evidence-table { width: 100%; border-collapse: collapse; }
    .evidence-table th {
      font-size: 10px; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--grey-2);
      padding: 10px 16px; text-align: left;
      border-bottom: 1px solid rgba(74,78,105,0.3);
    }
    .evidence-table td {
      padding: 14px 16px; font-size: 13px; color: var(--grey-1);
      border-bottom: 1px solid rgba(74,78,105,0.15);
      vertical-align: middle;
    }
    .evidence-table tr:last-child td { border-bottom: none; }
    .evidence-table tr { cursor: pointer; transition: background 0.1s; }
    .evidence-table tr:hover td { background: rgba(74,78,105,0.12); color: var(--white); }
    .evidence-table tr.selected td { background: rgba(244,162,97,0.07); }
    .doc-name { font-weight: 600; color: var(--white); display: flex; align-items: center; gap: 8px; }
    .severity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .sev-critical { background: var(--danger); }
    .sev-high     { background: var(--gold); }
    .sev-medium   { background: #A8A4C0; }
    .sev-clear    { background: var(--success); }
    .progress-bar-wrap { width: 80px; height: 4px; background: var(--charcoal-3); border-radius: 2px; }
    .progress-bar { height: 100%; border-radius: 2px; }

    /* ── DETAIL PANEL ── */
    .detail-panel {
      width: 380px; flex-shrink: 0;
      background: var(--charcoal-2);
      border-left: 1px solid rgba(74,78,105,0.35);
      display: flex; flex-direction: column;
      overflow-y: auto;
    }
    .detail-header {
      padding: 20px 22px 16px;
      border-bottom: 1px solid rgba(74,78,105,0.25);
    }
    .detail-doc-name {
      font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700;
      letter-spacing: 0.06em; color: var(--white); margin-bottom: 4px;
    }
    .detail-meta { font-size: 11px; color: var(--grey-2); }
    .detail-body { padding: 20px 22px; flex: 1; overflow-y: auto; }
    .detail-section { margin-bottom: 24px; }
    .detail-section-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--grey-2); margin-bottom: 10px;
    }
    .finding-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 12px; border-radius: 8px;
      background: var(--charcoal-3);
      border: 1px solid rgba(74,78,105,0.2);
      margin-bottom: 8px;
    }
    .finding-item-icon { width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px; }
    .finding-item-text { flex: 1; }
    .finding-item-title { font-size: 13px; font-weight: 600; color: var(--white); margin-bottom: 3px; }
    .finding-item-sub { font-size: 11px; color: var(--grey-1); line-height: 1.4; }
    .finding-item.critical { border-color: rgba(224,92,92,0.3); background: rgba(224,92,92,0.05); }
    .finding-item.warning  { border-color: rgba(244,162,97,0.25); background: rgba(244,162,97,0.04); }

    /* ── UPLOAD ZONE ── */
    .upload-zone {
      border: 2px dashed rgba(74,78,105,0.5);
      border-radius: 12px; padding: 48px 32px;
      text-align: center; cursor: pointer;
      transition: all 0.2s ease;
    }
    .upload-zone:hover {
      border-color: var(--gold);
      background: rgba(244,162,97,0.03);
    }
    .upload-icon { margin: 0 auto 16px; width: 48px; height: 48px; color: var(--steel-light); }
    .upload-title { font-size: 15px; font-weight: 600; color: var(--white); margin-bottom: 6px; }
    .upload-sub { font-size: 12px; color: var(--grey-1); }
    .upload-formats { margin-top: 16px; display: flex; gap: 8px; justify-content: center; }

    /* ── SEARCH BAR ── */
    .search-wrap { position: relative; }
    .search-input {
      width: 100%; padding: 9px 14px 9px 38px;
      background: var(--charcoal-3);
      border: 1px solid rgba(74,78,105,0.4);
      border-radius: 7px; color: var(--white);
      font-family: 'Inter', sans-serif; font-size: 13px;
      outline: none; transition: border-color 0.15s;
    }
    .search-input::placeholder { color: var(--grey-2); }
    .search-input:focus { border-color: var(--steel-light); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--grey-2); width: 14px; height: 14px; }

    /* ── COMPARE PAGE ── */
    .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .compare-doc-card {
      background: var(--charcoal-3);
      border: 1px solid rgba(74,78,105,0.35);
      border-radius: 10px; padding: 20px;
    }
    .compare-doc-title { font-size: 14px; font-weight: 700; color: var(--white); margin-bottom: 4px; }
    .compare-doc-sub { font-size: 11px; color: var(--grey-1); margin-bottom: 16px; }

    /* ── SETTINGS ── */
    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 1px solid rgba(74,78,105,0.2);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { font-size: 13px; font-weight: 500; color: var(--white); margin-bottom: 3px; }
    .settings-sub { font-size: 11px; color: var(--grey-1); }
    .toggle {
      width: 40px; height: 22px; border-radius: 11px;
      border: none; cursor: pointer; position: relative; transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle::after {
      content: ''; position: absolute; top: 3px; width: 16px; height: 16px;
      border-radius: 50%; background: white; transition: left 0.2s;
    }
    .toggle.on { background: var(--gold); }
    .toggle.on::after { left: 21px; }
    .toggle.off { background: var(--steel); }
    .toggle.off::after { left: 3px; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 64px 32px; }
    .empty-icon { width: 48px; height: 48px; margin: 0 auto 16px; color: var(--steel); }
    .empty-title { font-size: 15px; font-weight: 600; color: var(--grey-1); margin-bottom: 6px; }
    .empty-sub { font-size: 12px; color: var(--grey-2); }

    /* ── CHART PLACEHOLDER ── */
    .chart-placeholder {
      height: 120px; border-radius: 3px;
      background: linear-gradient(135deg, var(--charcoal-3) 0%, rgba(74,78,105,0.1) 100%);
      border: 1px solid rgba(74,78,105,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--grey-2); letter-spacing: 0.1em;
    }
    .mini-bars { display: flex; align-items: flex-end; gap: 4px; height: 60px; padding: 0 24px; }
    .mini-bar {
      flex: 1; border-radius: 2px 2px 0 0;
      transition: opacity 0.2s;
    }
    .mini-bar:hover { opacity: 0.7; }

    /* ── ACTIVITY FEED ── */
    .activity-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(74,78,105,0.15); }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .activity-text { font-size: 12px; color: var(--grey-1); line-height: 1.5; }
    .activity-time { font-size: 10px; color: var(--grey-2); margin-top: 3px; }

    /* ── FIELD/VALUE ── */
    .kv-row { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 1px solid rgba(74,78,105,0.15); }
    .kv-row:last-child { border-bottom: none; }
    .kv-key { font-size: 11px; color: var(--grey-2); font-weight: 500; }
    .kv-val { font-size: 12px; color: var(--white); font-weight: 600; text-align: right; }

    .hidden { display: none !important; }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .gap-4 { gap: 4px; }
    .gap-8 { gap: 8px; }
    .gap-16 { gap: 16px; }
    .mt-8 { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .full-height { height: 100%; }
    .full-layout { display: flex; flex: 1; overflow: hidden; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ── SVG ICONS ── */
const Icon = {
  PramonaLogo: () => (
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="pramonaGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor="#1e3a8a"/>
          <stop offset="50%" stopColor="#2563eb"/>
          <stop offset="100%" stopColor="#60a5fa"/>
        </linearGradient>
        <linearGradient id="pramonaGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stopColor="#1e40af"/>
          <stop offset="100%" stopColor="#93c5fd"/>
        </linearGradient>
      </defs>
      <g transform="translate(20,20)">
        {[0,1,2,3,4,5,6].map(i => (
          <path
            key={i}
            d="M 1.5,-4 C 0.5,-9 -2,-14 -1,-17.5 C 0,-19.5 2,-19.5 3.5,-17.5 C 4.5,-14 3,-9 1.5,-4 Z"
            transform={`rotate(${i * 51.43})`}
            fill={i < 3 ? "url(#pramonaGrad1)" : "url(#pramonaGrad2)"}
            opacity={0.7 + (i * 0.04)}
          />
        ))}
        <circle cx="0" cy="0" r="3.5" fill="#1e3a8a"/>
        <circle cx="0" cy="0" r="2" fill="#3b82f6"/>
      </g>
    </svg>
  ),
  Dashboard: () => (
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5">
      <rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/>
      <rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/>
    </svg>

              className="upload-zone"
              style={dragging?{borderColor:'var(--gold)',background:'rgba(244,162,97,0.05)'}:{}}
              onDragOver={e=>{e.preventDefault();setDragging(true)}}
              onDragLeave={()=>setDragging(false)}
              onDrop={e=>{e.preventDefault();setDragging(false)}}
            >
              <div className="upload-icon">
                <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" strokeWidth="1.5">
                  <rect x="6" y="10" width="36" height="30" rx="3"/>
                  <polyline points="17,24 24,17 31,24"/>
                  <line x1="24" y1="17" x2="24" y2="34"/>
                  <line x1="8" y1="8" x2="40" y2="8"/>
                </svg>
              </div>
              <div className="upload-title">Drop drawing package here</div>
              <div className="upload-sub">or click to browse files</div>
              <div className="upload-formats">
                {["PDF","DWG (soon)","TIFF (soon)"].map(f=>(
                  <span key={f} className="tag tag-steel">{f}</span>
                ))}
              </div>
            </div>

            <div style={{marginTop:24}}>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--grey-2)',marginBottom:12}}>
                Analysis Configuration
              </div>
              {[
                {label:"Run Crux Detection",    sub:"Automatically identify the single most important forensic finding",  on:true},
                {label:"Vision Model (Figures)", sub:"Describe all extracted figures using AI vision model",               on:true},
                {label:"Cross-Reference Check",  sub:"Validate spec references and revision history for consistency",      on:true},
                {label:"Signature Verification", sub:"Check all title blocks and approval fields for signatures",           on:false},
              ].map((s,i)=>(
                <div key={i} className="settings-row">
                  <div>
                    <div className="settings-label">{s.label}</div>
                    <div className="settings-sub">{s.sub}</div>
                  </div>
                  <div className={`toggle ${s.on?'on':'off'}`} onClick={()=>{}}/>
                </div>
              ))}
            </div>

            <div style={{marginTop:24,display:'flex',gap:12}}>
              <button className="btn btn-primary" style={{flex:1,padding:'12px 0',fontSize:13,letterSpacing:'0.1em'}}>
                Begin Forensic Audit
              </button>
            </div>
          </div>
        </div>

        <div className="card">
          <div className="card-header"><span className="card-title">Processing Pipeline</span></div>
          <div className="card-body">
            <div style={{display:'flex',flexDirection:'column',gap:0}}>
              {[
                {step:"01", label:"Textract Extraction",  sub:"AWS Textract extracts all text blocks, tables, and figure locations",   color:"var(--success)"},
                {step:"02", label:"Figure Description",   sub:"Vision model (Qwen3-VL or Gemini) describes each extracted diagram",    color:"var(--success)"},
                {step:"03", label:"Crux Detection",       sub:"Claude Opus 4.6 identifies the single most critical forensic finding",  color:"var(--gold)"},
                {step:"04", label:"Findings Compilation", sub:"Full findings list generated and structured for Evidence Vault",         color:"var(--steel)"},
              ].map((s,i)=>(
                <div key={i} style={{display:'flex',gap:14,paddingBottom:i<3?16:0,position:'relative'}}>
                  {i<3 && <div style={{position:'absolute',left:13,top:28,bottom:0,width:1,background:'rgba(74,78,105,0.3)'}}/>}
                  <div style={{
                    width:26,height:26,borderRadius:13,flexShrink:0,
                    background:s.color,color:'var(--charcoal)',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:9,fontWeight:800,letterSpacing:'0.05em'
                  }}>{s.step}</div>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:'var(--white)',marginBottom:2}}>{s.label}</div>
                    <div style={{fontSize:11,color:'var(--grey-1)'}}>{s.sub}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── COMPARE PAGE ── */
function ComparePage({ docs }) {
  const [docA, setDocA] = useState(docs[0]);
  const [docB, setDocB] = useState(docs[1]);

  return (
    <div className="main">
      <div className="page-header">
        <div className="page-title">Document Comparison</div>
        <div className="page-sub">Side-by-side forensic delta analysis between two drawing packages</div>
      </div>

      <div className="compare-grid" style={{marginBottom:20}}>
        {[{doc:docA,label:"Document A"},{doc:docB,label:"Document B"}].map(({doc,label},idx)=>(
          <div key={idx} className="compare-doc-card">
            <div style={{fontSize:9,letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--grey-2)',marginBottom:8}}>{label}</div>
            <div className="compare-doc-title">{doc.name}</div>
            <div className="compare-doc-sub">{doc.pages} pages · {doc.figures} figures · {doc.uploaded}</div>
            <div style={{display:'flex',gap:8,marginTop:12}}>
              <span className={`tag ${doc.severity==='critical'?'tag-danger':doc.severity==='high'?'tag-warn':doc.severity==='medium'?'tag-steel':'tag-ok'}`}>
                {doc.status}
              </span>
            </div>
          </div>
        ))}
      </div>

      <div className="card" style={{marginBottom:20}}>
        <div className="card-header"><span className="card-title">Crux Comparison</span></div>
        <div className="card-body">
          <div className="compare-grid">
            {[docA,docB].map((d,i)=>(
              <div key={i}>
                <CruxBlock crux={d.crux}/>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <span className="card-title">Statistical Delta</span>
          <button className="btn btn-steel">Generate Charts</button>
        </div>
        <div className="card-body">
          <div className="compare-grid">
            {[
              {label:"Pages",       a:docA.pages,   b:docB.pages},
              {label:"Figures",     a:docA.figures, b:docB.figures},
              {label:"Findings",    a:docA.findings.length, b:docB.findings.length},
            ].map((r,i)=>(
              <div key={i} className="kv-row">
                <span className="kv-key">{r.label}</span>
                <span className="kv-val" style={{display:'flex',gap:16}}>
                  <span style={{color:'var(--steel-light)'}}>{r.a}</span>
                  <span style={{color:'var(--grey-2)'}}>vs</span>
                  <span style={{color:'var(--gold)'}}>{r.b}</span>
                </span>
              </div>
            ))}
          </div>
          <div className="chart-placeholder" style={{marginTop:16}}>
            Chart output renders here after API connection
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── SETTINGS PAGE ── */
function SettingsPage() {
  const [tog, setTog] = useState({crux:true,vision:true,sig:false,cache:true});
  return (
    <div className="main">
      <div className="page-header">
        <div className="page-title">Settings</div>
        <div className="page-sub">System configuration and AI model preferences</div>
      </div>
      <div style={{maxWidth:600}}>
        {[
          {section:"AI Models", rows:[
            {key:"model",    label:"Primary Model",      sub:"Claude Opus 4.6 — advanced reasoning for forensic analysis", control:<span className="tag tag-steel">Opus 4.6</span>},
            {key:"vision",   label:"Vision Model",       sub:"Qwen3-VL-32B via RunPod serverless for figure descriptions",  control:<div className={`toggle ${tog.vision?'on':'off'}`} onClick={()=>setTog(t=>({...t,vision:!t.vision}))}/>},
            {key:"cache",    label:"Prompt Caching",     sub:"Use Anthropic prompt caching to reduce API costs on repeat queries", control:<div className={`toggle ${tog.cache?'on':'off'}`} onClick={()=>setTog(t=>({...t,cache:!t.cache}))}/>},
          ]},
          {section:"Audit Behaviour", rows:[
            {key:"crux",     label:"Auto-Crux Detection", sub:"Automatically run Crux detection on every new document",        control:<div className={`toggle ${tog.crux?'on':'off'}`} onClick={()=>setTog(t=>({...t,crux:!t.crux}))}/>},
            {key:"sig",      label:"Signature Scan",      sub:"Scan all title blocks for missing or mismatched signatures",     control:<div className={`toggle ${tog.sig?'on':'off'}`} onClick={()=>setTog(t=>({...t,sig:!t.sig}))}/>},
          ]},
          {section:"Infrastructure", rows:[
            {key:"aws",      label:"AWS Region",          sub:"Amazon Textract extraction region", control:<span className="tag tag-steel">us-east-1</span>},
            {key:"storage",  label:"Storage",             sub:"Local filesystem — /output", control:<span className="tag tag-steel">Local</span>},
          ]},
        ].map((sec,i)=>(
          <div key={i} className="card" style={{marginBottom:16}}>
            <div className="card-header"><span className="card-title">{sec.section}</span></div>
            <div className="card-body" style={{padding:'4px 22px'}}>
              {sec.rows.map((r,j)=>(
                <div key={j} className="settings-row">
                  <div>
                    <div className="settings-label">{r.label}</div>
                    <div className="settings-sub">{r.sub}</div>
                  </div>
                  {r.control}
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── APP ── */
function App() {
  const [page, setPage] = useState("dashboard");
  const [uploadOpen, setUploadOpen] = useState(false);

  const goToDoc = (doc) => setPage("vault");

  return (
    <div id="root" style={{display:'flex',flexDirection:'column',height:'100vh'}}>
      <Topbar onUpload={()=>setPage("upload")}/>
      <div className="layout">
        <Sidebar page={page} setPage={setPage}/>
        {page==="dashboard" && <DashboardPage docs={MOCK_DOCS} onSelectDoc={goToDoc}/>}
        {page==="vault"     && <VaultPage docs={MOCK_DOCS}/>}
        {page==="upload"    && <UploadPage/>}
        {page==="compare"   && <ComparePage docs={MOCK_DOCS}/>}
        {page==="settings"  && <SettingsPage/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
